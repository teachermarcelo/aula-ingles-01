<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Numbers - English Lesson</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .back-btn { display: inline-block; padding: 10px 20px; background: #333; color: white; text-decoration: none; border-radius: 10px; margin-bottom: 20px; }
        h1 { text-align: center; color: #333; }
        .list { list-style: none; padding: 0; }
        .list li { background: #e0e7ff; margin: 10px 0; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .list li:hover { background: #c7d2fe; }
        .num { font-weight: bold; font-size: 1.2em; color: #4338ca; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">⬅️ Voltar ao Menu</a>
        <h1>🔢 Numbers (1-5)</h1>
        <p style="text-align:center">Clique para ouvir o número!</p>

        <ul class="list">
            <li onclick="speak('One')"><span class="num">1</span> <span>One</span> 🔊</li>
            <li onclick="speak('Two')"><span class="num">2</span> <span>Two</span> 🔊</li>
            <li onclick="speak('Three')"><span class="num">3</span> <span>Three</span> 🔊</li>
            <li onclick="speak('Four')"><span class="num">4</span> <span>Four</span> 🔊</li>
            <li onclick="speak('Five')"><span class="num">5</span> <span>Five</span> 🔊</li>
        </ul>
    </div>

    <script>
        function speak(text) {
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }
    </script>

</body>
</html>
