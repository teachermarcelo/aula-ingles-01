<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnglishPath A1 - U22: Time & Clock | Ultimate</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script>
tailwind.config = {
    darkMode: 'class',
    theme: {
        extend: {
            fontFamily: { sans: ['Inter', 'sans-serif'] },
            colors: {
                primary: '#0ea5e9', secondary: '#38bdf8', accent: '#f59e0b',
                success: '#22c55e', danger: '#ef4444', dark: '#1e293b',
                'primary-dark': '#0284c7', 'surface': '#ffffff', 'surface-dark': '#1e293b'
            },
            animation: {
                'float': 'float 3s ease-in-out infinite',
                'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
            },
            keyframes: {
                float: {
                    '0%, 100%': { transform: 'translateY(0)' },
                    '50%': { transform: 'translateY(-10px)' }
                }
            }
        }
    }
}
</script>
<style>
    :root {
        --surface: #ffffff;
        --surface-secondary: #f8fafc;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --border-color: #e2e8f0;
        --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.08);
        --shadow-hover: 0 8px 30px rgba(14, 165, 233, 0.15);
    }
    
    .dark {
        --surface: #1e293b;
        --surface-secondary: #0f172a;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
        --border-color: #334155;
        --shadow-soft: 0 4px 20px rgba(0, 0, 0, 0.3);
        --shadow-hover: 0 8px 30px rgba(14, 165, 233, 0.3);
    }
    
    body { 
        font-family: 'Inter', sans-serif; 
        background: var(--surface-secondary); 
        color: var(--text-primary); 
        transition: background 0.3s, color 0.3s;
        line-height: 1.5;
    }
    
    .card {
        background: var(--surface);
        border-radius: 1.5rem;
        box-shadow: var(--shadow-soft);
        border: 1px solid var(--border-color);
        transition: all 0.3s ease;
    }
    
    .card:hover {
        box-shadow: var(--shadow-hover);
        transform: translateY(-2px);
    }
    
    .tab-btn {
        position: relative;
        transition: all 0.2s ease;
    }
    
    .tab-btn.active {
        background: linear-gradient(135deg, #0ea5e9, #3b82f6);
        color: white;
        box-shadow: 0 4px 12px rgba(14, 165, 233, 0.3);
    }
    
    .tab-btn.active::after {
        content: '';
        position: absolute;
        bottom: -8px;
        left: 50%;
        transform: translateX(-50%);
        width: 8px;
        height: 8px;
        background: #0ea5e9;
        border-radius: 50%;
    }
    
    .option {
        transition: all 0.2s ease;
        cursor: pointer;
        border: 2px solid var(--border-color);
        border-radius: 1rem;
        padding: 1rem;
        background: var(--surface);
    }
    
    .option:hover {
        border-color: #0ea5e9;
        background: rgba(14, 165, 233, 0.05);
        transform: translateX(4px);
    }
    
    .option.selected {
        border-color: #0ea5e9;
        background: rgba(14, 165, 233, 0.1);
        box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15);
    }
    
    .option.correct {
        border-color: #22c55e;
        background: rgba(34, 197, 94, 0.1);
        animation: pulse-correct 0.5s;
    }
    
    .option.wrong {
        border-color: #ef4444;
        background: rgba(239, 68, 68, 0.1);
        animation: shake 0.5s;
    }
    
    @keyframes shake {
        0%, 100% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        75% { transform: translateX(6px); }
    }
    
    @keyframes pulse-correct {
        0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
        70% { box-shadow: 0 0 0 10px rgba(34, 197, 94, 0); }
        100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
    }
    
    /* Interactive Subtitles */
    .subtitle-container {
        background: linear-gradient(135deg, #1e293b, #0f172a);
        border-radius: 1rem;
        padding: 1.5rem;
        color: white;
        font-family: monospace;
        font-size: 1.1rem;
        line-height: 1.6;
        min-height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
    }
    
    .subtitle-word {
        display: inline-block;
        cursor: pointer;
        padding: 0.15rem 0.3rem;
        margin: 0 0.1rem;
        border-radius: 0.3rem;
        transition: all 0.2s ease;
        position: relative;
    }
    
    .subtitle-word:hover {
        background: rgba(14, 165, 233, 0.4);
        transform: scale(1.05);
        z-index: 10;
    }
    
    .translation-tooltip {
        position: fixed;
        background: #1e293b;
        color: #f1f5f9;
        padding: 0.75rem 1.25rem;
        border-radius: 0.75rem;
        font-size: 0.9rem;
        z-index: 10000;
        pointer-events: none;
        box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        animation: fadeInUp 0.2s ease;
        max-width: 250px;
        text-align: center;
    }
    
    @keyframes fadeInUp {
        from { 
            opacity: 0; 
            transform: translateY(10px) scale(0.95); 
        }
        to { 
            opacity: 1; 
            transform: translateY(0) scale(1); 
        }
    }

    /* Vocabulary Flip Card */
    .vocab-flip-card {
        perspective: 1000px;
        cursor: pointer;
        height: 280px;
        max-width: 320px;
        margin: 0 auto;
    }
    
    .vocab-flip-inner {
        position: relative;
        width: 100%;
        height: 100%;
        text-align: center;
        transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        transform-style: preserve-3d;
    }
    
    .vocab-flip-card.flipped .vocab-flip-inner {
        transform: rotateY(180deg);
    }
    
    .vocab-flip-front, .vocab-flip-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        border-radius: 1.5rem;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 1.5rem;
        border: 2px solid var(--border-color);
        box-shadow: var(--shadow-soft);
    }
    
    .vocab-flip-front {
        background: linear-gradient(135deg, #0ea5e9, #3b82f6);
        color: white;
    }
    
    .vocab-flip-back {
        background: var(--surface);
        color: var(--text-primary);
        transform: rotateY(180deg);
        border-color: #0ea5e9;
    }

    /* Board Game */
    .board-game {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 0.75rem;
        max-width: 100%;
        margin: 0 auto;
        padding: 1rem;
    }
    
    @media (min-width: 640px) {
        .board-game {
            grid-template-columns: repeat(6, 1fr);
        }
    }
    
    .board-cell {
        aspect-ratio: 1;
        background: var(--surface);
        border: 2px solid var(--border-color);
        border-radius: 1rem;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        position: relative;
        font-size: 0.9rem;
        transition: all 0.2s ease;
    }
    
    .board-cell.player {
        background: linear-gradient(135deg, #0ea5e9, #3b82f6);
        color: white;
        border-color: #0284c7;
        box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.3);
        z-index: 10;
        transform: scale(1.05);
    }
    
    .board-cell.completed {
        background: #dcfce7;
        color: #166534;
        border-color: #22c55e;
    }
    
    .dark .board-cell.completed {
        background: rgba(34, 197, 94, 0.15);
        color: #86efac;
    }

    /* Drag Drop */
    .draggable-word {
        display: inline-block;
        padding: 0.5rem 1.25rem;
        margin: 0.25rem;
        background: rgba(14, 165, 233, 0.1);
        border: 2px solid #0ea5e9;
        border-radius: 2rem;
        cursor: grab;
        user-select: none;
        font-weight: 500;
        transition: all 0.2s ease;
    }
    
    .draggable-word:active {
        cursor: grabbing;
        transform: scale(1.05);
    }
    
    .drag-drop-area {
        min-height: 120px;
        border: 3px dashed var(--border-color);
        border-radius: 1.25rem;
        padding: 1.5rem;
        transition: all 0.3s ease;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        background: var(--surface-secondary);
    }
    
    .drag-drop-area.drag-over {
        border-color: #0ea5e9;
        background: rgba(14, 165, 233, 0.05);
        box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.1);
    }

    /* Floating Elements */
    .floating-btn {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        z-index: 100;
        animation: float 3s ease-in-out infinite;
        box-shadow: var(--shadow-hover);
        transition: all 0.2s ease;
    }
    
    .floating-btn:hover {
        transform: translateY(-3px) scale(1.05);
        box-shadow: 0 12px 40px rgba(14, 165, 233, 0.4);
    }
    
    .floating-btn:active {
        transform: translateY(1px) scale(0.98);
    }

    /* Buttons */
    .btn-primary {
        background: linear-gradient(135deg, #0ea5e9, #3b82f6);
        color: white;
        font-weight: 600;
        padding: 0.75rem 1.5rem;
        border-radius: 1rem;
        transition: all 0.2s ease;
        box-shadow: 0 4px 0 #0284c7;
        border: none;
        cursor: pointer;
    }
    
    .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 0 #0284c7;
    }
    
    .btn-primary:active {
        transform: translateY(2px);
        box-shadow: none;
    }
    
    .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
        box-shadow: 0 4px 0 #0284c7;
    }
    
    .btn-secondary {
        background: var(--surface);
        color: var(--text-primary);
        font-weight: 500;
        padding: 0.75rem 1.5rem;
        border-radius: 1rem;
        border: 2px solid var(--border-color);
        transition: all 0.2s ease;
        cursor: pointer;
    }
    
    .btn-secondary:hover {
        border-color: #0ea5e9;
        background: rgba(14, 165, 233, 0.05);
    }

    /* Feedback & Hints */
    .feedback-box {
        padding: 1rem;
        border-radius: 1rem;
        margin: 1rem 0;
        font-weight: 500;
        animation: slideIn 0.3s ease;
    }
    
    @keyframes slideIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    .feedback-correct {
        background: rgba(34, 197, 94, 0.15);
        border-left: 4px solid #22c55e;
        color: #166534;
    }
    
    .feedback-wrong {
        background: rgba(239, 68, 68, 0.15);
        border-left: 4px solid #ef4444;
        color: #b91c1c;
    }
    
    .dark .feedback-correct {
        color: #86efac;
    }
    
    .dark .feedback-wrong {
        color: #fca5a5;
    }
    
    .enter-hint kbd {
        background: var(--surface);
        padding: 0.25rem 0.5rem;
        border-radius: 0.375rem;
        font-family: monospace;
        font-weight: 600;
        border: 1px solid var(--border-color);
        box-shadow: 0 2px 0 var(--border-color);
        display: inline-block;
        margin: 0 0.1rem;
    }

    /* Utilities */
    .hide-scrollbar::-webkit-scrollbar {
        display: none;
    }
    .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
    
    .animate-fade-in {
        animation: fadeIn 0.2s ease forwards;
    }
    
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    
    /* Responsive adjustments */
    @media (max-width: 768px) {
        .board-game {
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
        }
        .vocab-flip-card {
            height: 240px;
        }
        .subtitle-container {
            font-size: 1rem;
            padding: 1rem;
        }
    }
    
    @media (max-width: 480px) {
        .board-game {
            grid-template-columns: repeat(3, 1fr);
        }
        .tab-btn span {
            display: none;
        }
        .tab-btn i {
            margin: 0;
        }
        .floating-btn {
            bottom: 1rem;
            right: 1rem;
            padding: 0.75rem !important;
        }
    }
</style>
</head>
<body class="min-h-screen flex flex-col">

<!-- HEADER -->
<header class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm border-b sticky top-0 z-50 px-4 py-3 shadow-sm">
    <div class="max-w-7xl mx-auto flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-3 cursor-pointer" onclick="goHome()" aria-label="Voltar para Home">
            <i class="fa-solid fa-graduation-cap text-2xl text-sky-500"></i>
            <span class="font-extrabold text-xl text-sky-600 dark:text-sky-400">EnglishPath</span>
            <span class="bg-sky-100 dark:bg-sky-900/50 text-sky-700 dark:text-sky-300 px-2 py-0.5 rounded-full text-xs font-bold">A1</span>
        </div>
        
        <div class="flex-1 max-w-md mx-4">
            <div class="h-2 bg-gray-200 dark:bg-slate-700 rounded-full overflow-hidden mb-1">
                <div id="progressBar" class="h-full bg-gradient-to-r from-sky-500 to-blue-600 transition-all duration-500" style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-xs text-gray-500 dark:text-slate-400">
                <span><span id="currentQ">0</span>/<span id="totalQ">0</span> atividades</span>
                <span id="progressPercent">0%</span>
            </div>
        </div>

        <div class="flex items-center gap-2">
            <div class="bg-orange-50 dark:bg-orange-900/30 px-3 py-1.5 rounded-full flex items-center gap-1.5 border border-orange-100 dark:border-orange-800">
                <i class="fa-solid fa-fire text-orange-500"></i>
                <span id="streakDisplay" class="font-bold">0</span>
            </div>
            <div class="bg-blue-50 dark:bg-blue-900/30 px-3 py-1.5 rounded-full flex items-center gap-1.5 border border-blue-100 dark:border-blue-800">
                <i class="fa-solid fa-bolt text-blue-500"></i>
                <span id="xpDisplay" class="font-bold">0</span>
            </div>
            <button class="p-2 hover:bg-gray-100 dark:hover:bg-slate-800 rounded-lg text-gray-600 dark:text-slate-300 transition" onclick="toggleSettings()" aria-label="Configurações">
                <i class="fa-solid fa-ellipsis-vertical"></i>
            </button>
        </div>
    </div>
</header>

<!-- SETTINGS MENU -->
<div id="settingsMenu" class="hidden fixed top-20 right-4 bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700 rounded-xl shadow-xl p-3 z-[60] min-w-[220px] animate-fade-in">
    <div class="space-y-1 text-sm">
        <button class="w-full text-left p-2.5 hover:bg-gray-50 dark:hover:bg-slate-700/50 rounded-lg cursor-pointer flex items-center gap-2.5 transition" onclick="goHome()">
            <i class="fa-solid fa-house text-gray-400"></i> Voltar Home
        </button>
        <button class="w-full text-left p-2.5 hover:bg-gray-50 dark:hover:bg-slate-700/50 rounded-lg cursor-pointer flex items-center gap-2.5 transition" onclick="resetProgress()">
            <i class="fa-solid fa-rotate-right text-gray-400"></i> Reiniciar Lição
        </button>
        <button class="w-full text-left p-2.5 hover:bg-gray-50 dark:hover:bg-slate-700/50 rounded-lg cursor-pointer flex items-center gap-2.5 transition" onclick="toggleVoice()">
            <i class="fa-solid fa-language text-gray-400"></i> Voz: <span id="voiceLabel" class="font-medium">US</span>
        </button>
        <button class="w-full text-left p-2.5 hover:bg-gray-50 dark:hover:bg-slate-700/50 rounded-lg cursor-pointer flex items-center gap-2.5 transition" onclick="exportData()">
            <i class="fa-solid fa-download text-gray-400"></i> Exportar Dados
        </button>
        <div class="border-t border-gray-200 dark:border-slate-700 my-1"></div>
        <button class="w-full text-left p-2.5 hover:bg-gray-50 dark:hover:bg-slate-700/50 rounded-lg cursor-pointer flex items-center gap-2.5 transition" onclick="toggleTheme()">
            <i class="fa-solid fa-moon text-gray-400"></i> Tema: <span id="themeLabel">Claro</span>
        </button>
    </div>
</div>

<!-- TABS NAVIGATION -->
<nav class="bg-white/90 dark:bg-slate-900/90 backdrop-blur-sm border-b sticky top-[73px] z-40 overflow-x-auto hide-scrollbar">
    <div class="max-w-7xl mx-auto px-2 flex gap-1 min-w-max py-2">
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="video" onclick="switchTab('video')" aria-label="Aba de Vídeo">
            <i class="fa-solid fa-video"></i> <span class="hidden sm:inline">Video</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="reading" onclick="switchTab('reading')" aria-label="Aba de Leitura">
            <i class="fa-solid fa-book-open"></i> <span class="hidden sm:inline">Reading</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="listening" onclick="switchTab('listening')" aria-label="Aba de Escuta">
            <i class="fa-solid fa-headphones"></i> <span class="hidden sm:inline">Listening</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="speaking" onclick="switchTab('speaking')" aria-label="Aba de Fala">
            <i class="fa-solid fa-microphone"></i> <span class="hidden sm:inline">Speaking</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="writing" onclick="switchTab('writing')" aria-label="Aba de Escrita">
            <i class="fa-solid fa-pen"></i> <span class="hidden sm:inline">Writing</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="vocabulary" onclick="switchTab('vocabulary')" aria-label="Aba de Vocabulário">
            <i class="fa-solid fa-spell-check"></i> <span class="hidden sm:inline">Vocabulary</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="grammar" onclick="switchTab('grammar')" aria-label="Aba de Gramática">
            <i class="fa-solid fa-book"></i> <span class="hidden sm:inline">Grammar</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="daily" onclick="switchTab('daily')" aria-label="Aba de Desafio Diário">
            <i class="fa-solid fa-calendar-day"></i> <span class="hidden sm:inline">Daily</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="story" onclick="switchTab('story')" aria-label="Aba de História">
            <i class="fa-solid fa-book-open-reader"></i> <span class="hidden sm:inline">Story</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="mistakes" onclick="switchTab('mistakes')" aria-label="Aba de Erros Comuns">
            <i class="fa-solid fa-triangle-exclamation"></i> <span class="hidden sm:inline">Mistakes</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="tenses" onclick="switchTab('tenses')" aria-label="Aba de Tempos Verbais">
            <i class="fa-solid fa-chart-line"></i> <span class="hidden sm:inline">Tense Map</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="dictation" onclick="switchTab('dictation')" aria-label="Aba de Ditado">
            <i class="fa-solid fa-keyboard"></i> <span class="hidden sm:inline">Dictation</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="boardgame" onclick="switchTab('boardgame')" aria-label="Aba de Jogo de Tabuleiro">
            <i class="fa-solid fa-chess-board"></i> <span class="hidden sm:inline">Board Game</span>
        </button>
        <button class="tab-btn px-3 py-2 rounded-lg text-sm font-semibold text-gray-600 dark:text-slate-300 hover:bg-gray-50 dark:hover:bg-slate-800 transition flex items-center gap-2" data-tab="translation" onclick="switchTab('translation')" aria-label="Aba de Tradução">
            <i class="fa-solid fa-language"></i> <span class="hidden sm:inline">Translation</span>
        </button>
    </div>

document.addEventListener('DOMContentLoaded', () => {
    // Carregar tema salvo
    if (localStorage.getItem('englishpath_theme') === 'dark') {
        document.documentElement.classList.add('dark');
        state.theme = 'dark';
        document.getElementById('themeLabel').textContent = 'Escuro';
    }
    
    // Carregar progresso salvo
    if (state.progress.xp) state.totalXP = state.progress.xp;
    if (state.progress.streak) state.streak = state.progress.streak;
    if (state.progress.questionIndex) {
        Object.assign(state.questionIndex, state.progress.questionIndex);
    }
    
    // Atualizar UI inicial
    updateStats();
    updateProgress();
    
    // Renderizar primeira aba
    switchTab('video');

    setupKeyboardShortcuts();
    
    // Mensagem de boas-vindas via TTS (opcional)
    setTimeout(() => {
        if (state.speechSynthesis) {
            const msg = new SpeechSynthesisUtterance("Welcome to Time and Clock lesson");
            msg.lang = state.voice;
            msg.rate = state.ttsRate;
            state.speechSynthesis.speak(msg);
        }
    }, 1000);
});

// ===== NAVEGAÇÃO E RENDERIZAÇÃO =====
window.switchTab = (tab) => {
    // Atualizar estado
    state.currentTab = tab;
    
    // Atualizar UI das tabs
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
        if (btn.dataset.tab === tab) {
            btn.classList.add('active');
        }
    });
    
    // Renderizar conteúdo
    renderCurrentTab();
    
    // Atualizar progresso
    updateProgress();
    
    // Esconder botão flutuante inicialmente
    document.getElementById('floatingNextBtn').classList.add('hidden');
};

function renderCurrentTab() {
    const main = document.getElementById('mainContent');
    const tab = state.currentTab;
    const idx = state.questionIndex[tab];
    const sectionData = lessonData[tab];
    
    // Verificar se completou a seção
    if (Array.isArray(sectionData) && idx >= sectionData.length) {
        renderSectionComplete(tab);
        return;
    }
    
    // Renderizar baseado na aba atual
    switch(tab) {
        case 'video': renderVideo(main); break;
        case 'reading': renderReading(main, sectionData[idx]); break;
        case 'listening': renderListening(main, sectionData[idx]); break;
        case 'speaking': renderSpeaking(main, sectionData[idx]); break;
        case 'writing': renderWriting(main, sectionData[idx]); break;
        case 'vocabulary': renderVocabulary(main, sectionData[idx]); break;
        case 'grammar': renderGrammar(main, sectionData[idx]); break;
        case 'daily': renderDaily(main, sectionData[idx]); break;
        case 'story': renderStory(main, sectionData[idx]); break;
        case 'mistakes': renderMistakes(main, sectionData[idx]); break;
        case 'tenses': renderTenses(main, sectionData[idx]); break;
        case 'dictation': renderDictation(main, sectionData[idx]); break;
        case 'boardgame': renderBoardGame(main); break;
        case 'translation': renderTranslation(main, sectionData[idx]); break;
        default: 
            main.innerHTML = `<div class="card p-8 text-center">
                <i class="fa-solid fa-circle-exclamation text-4xl text-amber-500 mb-4"></i>
                <h3 class="text-xl font-bold mb-2">Conteúdo não encontrado</h3>
                <p class="text-gray-500 dark:text-slate-400 mb-4">A aba "${tab}" não tem conteúdo disponível.</p>
                <button class="btn-primary" onclick="switchTab('video')">Voltar ao início</button>
            </div>`;
    }
}

window.handleOptionSelect = (index, correctAnswer, explanation, xp) => {
    // Se já respondeu, ignorar
    if (document.getElementById('feedback')?.classList.contains('feedback-correct') || 
        document.getElementById('feedback')?.classList.contains('feedback-wrong')) {
        return;
    }
    
    // Atualizar UI da opção selecionada
    document.querySelectorAll('.option').forEach(opt => {
        opt.classList.remove('selected');
    });
    document.querySelector(`.option[data-index="${index}"]`)?.classList.add('selected');
    
    // Verificar resposta imediatamente
    const isCorrect = index == correctAnswer;
    const feedbackEl = document.getElementById('feedback');
    
    feedbackEl.classList.remove('hidden', 'feedback-correct', 'feedback-wrong');
    feedbackEl.classList.add(isCorrect ? 'feedback-correct' : 'feedback-wrong');
    
    if (isCorrect) {
        feedbackEl.innerHTML = `<strong>✅ Correto!</strong> ${explanation || 'Great job!'}`;
        addXP(xp);
        
        // Mostrar botão de próximo após delay
        setTimeout(() => {
            document.getElementById('floatingNextBtn').classList.remove('hidden');
            // Auto-avançar após 2 segundos
            setTimeout(() => {
                if (document.getElementById('floatingNextBtn')?.offsetParent !== null) {
                    nextQuestion();
                }
            }, 2000);
        }, 800);
    } else {
        const q = lessonData[state.currentTab][state.questionIndex[state.currentTab]];
        feedbackEl.innerHTML = `<strong>❌ Quase!</strong> A resposta certa era: <strong>${q.options[correctAnswer]}</strong><br><small class="block mt-1 opacity-90">${explanation || 'Tente novamente!'}</small>`;
        
        // Resetar botão de verificar
        const checkBtn = document.getElementById('checkBtn');
        if (checkBtn) {
            checkBtn.disabled = false;
            checkBtn.innerHTML = 'Tentar Novamente';
            checkBtn.onclick = () => retrySection(state.currentTab);
        }
        
        // Resetar streak ao errar
        state.streak = 0;
        updateStats();
    }

window.playAudio = (text) => {
    if (!state.speechSynthesis) {
        alert("Seu navegador não suporta síntese de voz. Tente Chrome, Edge ou Safari.");
        return;
    }
    
    // Cancelar qualquer áudio em reprodução
    state.speechSynthesis.cancel();
    
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = state.voice;
    utterance.rate = state.ttsRate;
    utterance.pitch = 1.0;
    
    // Fallback de voz se a selecionada não estiver disponível
    utterance.onstart = () => {
        // Feedback visual opcional
    };
    
    utterance.onerror = (event) => {
        console.warn("TTS error:", event);
        // Tentar com voz padrão
        if (state.voice !== 'en-US') {
            utterance.lang = 'en-US';
            state.speechSynthesis.speak(utterance);
        }
    };
    
    state.speechSynthesis.speak(utterance);
};

window.toggleRecording = (expectedPhrasesJson, xp) => {
    const expectedPhrases = JSON.parse(expectedPhrasesJson.replace(/'/g, '"'));
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (!SR) {
        alert("Seu navegador não suporta reconhecimento de voz. Tente Chrome ou Edge com permissões ativadas.");
        return;
    }
    
    // Limpar reconhecimento anterior
    if (state.recognition) {
        state.recognition.stop();
        state.recognition = null;
    }
    
    const rec = new SR();
    rec.lang = state.voice;
    rec.continuous = false;
    rec.interimResults = false;
    rec.maxAlternatives = 3;
    
    const btn = document.getElementById('recordBtn');
    const status = document.getElementById('recordStatus');
    const originalBtnHTML = btn.innerHTML;
    
    // UI de gravação
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-circle text-red-300 animate-pulse"></i>';
    btn.classList.add('bg-red-600', 'animate-pulse');
    status.textContent = "🎤 Ouvindo... Fale claramente!";
    status.classList.add('text-red-600', 'dark:text-red-400', 'font-bold');
    
    rec.onstart = () => {
        state.isRecording = true;
    };
    
    rec.onend = () => {
        state.isRecording = false;
        btn.disabled = false;
        btn.innerHTML = originalBtnHTML;
        btn.classList.remove('bg-red-600', 'animate-pulse');
        status.textContent = "Clique para gravar novamente";
        status.classList.remove('text-red-600', 'dark:text-red-400', 'font-bold');
    };
    
    rec.onresult = (event) => {
        const transcript = event.results[0][0].transcript.toLowerCase().trim();
        const scoreDiv = document.getElementById('scoreDisplay');
        
        // Matching fuzzy: verificar se alguma frase esperada está contida ou contém o transcript
        const isMatch = expectedPhrases.some(expected => 
            transcript.includes(expected) || expected.includes(transcript) ||
            // Matching mais flexível para variações
            transcript.replace(/[^\w\s]/g, '').includes(expected.replace(/[^\w\s]/g, '')) ||
            expected.replace(/[^\w\s]/g, '').includes(transcript.replace(/[^\w\s]/g, ''))
        );
        
        scoreDiv.classList.remove('hidden');
        
        if (isMatch) {
            scoreDiv.innerHTML = `<span class="text-green-600 dark:text-green-400 font-bold">✅ ${Math.min(100, 85 + Math.floor(Math.random() * 15))}% Match</span>`;
            addXP(xp);
            document.getElementById('continueBtn').disabled = false;
            
            // Auto-avançar após sucesso
            setTimeout(() => {
                if (!document.getElementById('continueBtn').disabled) {
                    nextQuestion();
                }
            }, 1500);
        } else {
            scoreDiv.innerHTML = `<span class="text-red-600 dark:text-red-400">❌ Ouvi: "<em>${transcript}</em>"<br><small class="block mt-1 text-xs opacity-90">Tente falar mais devagar e claro</small></span>`;
            document.getElementById('continueBtn').disabled = true;
        }
    };
    
    rec.onerror = (event) => {
        console.error("Speech recognition error", event.error);
        status.textContent = "❌ Erro ao ouvir. Tente novamente.";
        status.classList.add('text-red-600', 'dark:text-red-400');
        btn.disabled = false;
        btn.innerHTML = originalBtnHTML;
        btn.classList.remove('bg-red-600', 'animate-pulse');
    };
    
    try {
        rec.start();
        state.recognition = rec;
    } catch (e) {
        console.error("Erro ao iniciar reconhecimento:", e);
        alert("Não foi possível iniciar o microfone. Verifique as permissões do navegador.");
        btn.disabled = false;
        btn.innerHTML = originalBtnHTML;
        btn.classList.remove('bg-red-600', 'animate-pulse');
        status.textContent = "Clique para tentar novamente";
    }
};

function addXP(amount) {
    state.totalXP += amount;
    state.streak++;
    updateStats();
    saveProgress();
    
    // Efeito visual de XP ganho
    showXPNotification(amount);
}

function showXPNotification(amount) {
    const notification = document.createElement('div');
    notification.className = 'fixed top-4 right-4 bg-gradient-to-r from-amber-400 to-orange-500 text-white px-4 py-2 rounded-xl font-bold shadow-lg z-[100] animate-fade-in flex items-center gap-2';
    notification.innerHTML = `<i class="fa-solid fa-bolt"></i> +${amount} XP!`;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.style.opacity = '0';
        notification.style.transform = 'translateY(-10px)';
        setTimeout(() => notification.remove(), 300);
    }, 2000);
}

function updateStats() {
    document.getElementById('xpDisplay').textContent = state.totalXP;
    document.getElementById('streakDisplay').textContent = state.streak;
    
    // Efeito visual para streaks longas
    if (state.streak >= 5) {
        document.getElementById('streakDisplay').parentElement.classList.add('ring-2', 'ring-orange-400', 'animate-pulse');
    } else {
        document.getElementById('streakDisplay').parentElement.classList.remove('ring-2', 'ring-orange-400', 'animate-pulse');
    }
}

function updateProgress() {
    // Calcular progresso total
    let totalQuestions = 0;
    let completedQuestions = 0;
    
    Object.keys(lessonData).forEach(key => {
        const section = lessonData[key];
        if (Array.isArray(section)) {
            totalQuestions += section.length;
            completedQuestions += Math.min(state.questionIndex[key], section.length);
        } else if (key === 'video' && section.subtitles) {
            totalQuestions += section.subtitles.length;
            completedQuestions += Math.min(state.questionIndex.video, section.subtitles.length);
        } else if (key === 'boardgame' && section.questions) {
            totalQuestions += section.questions.length;
            completedQuestions += Math.min(state.questionIndex.boardgame, section.questions.length);
        }
    });
    
    const percent = totalQuestions > 0 ? Math.round((completedQuestions / totalQuestions) * 100) : 0;
    
    // Atualizar UI
    document.getElementById('progressBar').style.width = `${percent}%`;
    document.getElementById('currentQ').textContent = completedQuestions;
    document.getElementById('totalQ').textContent = totalQuestions;
    document.getElementById('progressPercent').textContent = `${percent}%`;
}

function saveProgress() {
    // Salvar no localStorage para standalone
    const progressData = {
        xp: state.totalXP,
        streak: state.streak,
        questionIndex: { ...state.questionIndex },
        lastUpdated: new Date().toISOString()
    };
    
    localStorage.setItem('englishpath_progress_u22', JSON.stringify(progressData));
    
    // Em produção com Firebase, descomente e configure:
    /*
    if (currentUser) {
        // Lógica de salvamento no Firestore
    }
    */
}

window.translateWord = (word) => {
    const clean = word.toLowerCase().replace(/[^\w']/g, '');
    
    // Dicionário simplificado para U22
    const dict = {
        'hello': 'olá', 'everyone': 'todos', 'welcome': 'bem-vindos', 
        'time': 'tempo/hora', 'clock': 'relógio', 'watch': 'relógio de pulso',
        'three': 'três', 'o\'clock': 'em ponto', 'half': 'meia', 
        'past': 'passado/depois', 'quarter': 'quarto/15 minutos',
        'to': 'para/antes de', 'nine': 'nove', 'two': 'dois',
        'short': 'curto', 'hand': 'ponteiro', 'shows': 'mostra',
        'hour': 'hora', 'long': 'longo', 'minutes': 'minutos',
        'morning': 'manhã', 'wake': 'acordar', 'up': 'acima/levantar',
        'school': 'escola', 'starts': 'começa', 'soon': 'em breve',
        'bus': 'ônibus', 'comes': 'vem', 'leave': 'sair', 'home': 'casa'
    };
    
    const translation = dict[clean] || `[${clean}]`;
    
    // Criar tooltip
    const tooltip = document.createElement('div');
    tooltip.className = 'translation-tooltip';
    tooltip.innerHTML = `<strong>${word}</strong><br><span class="text-sky-300">➡️</span> ${translation}`;
    document.body.appendChild(tooltip);
    
    // Posicionar próximo ao mouse
    const rect = event.target.getBoundingClientRect();
    tooltip.style.left = `${Math.min(rect.right + 10, window.innerWidth - 260)}px`;
    tooltip.style.top = `${Math.max(rect.bottom + 5, 10)}px`;
    
    // Remover após delay
    setTimeout(() => {
        tooltip.style.opacity = '0';
        tooltip.style.transform = 'translateY(5px)';
        setTimeout(() => tooltip.remove(), 200);
    }, 2000);
};

// ===== TECLAS DE ATALHO =====
function setupKeyboardShortcuts() {
    document.addEventListener('keydown', (e) => {
        // Ignorar se estiver digitando em input/textarea
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
            return;
        }
        
        // Enter: verificar/responder
        if (e.key === 'Enter' && !e.repeat) {
            const checkBtn = document.getElementById('checkBtn');
            const continueBtn = document.getElementById('continueBtn');
            const floatingBtn = document.getElementById('floatingNextBtn');
            
            if (checkBtn && !checkBtn.disabled && !checkBtn.classList.contains('hidden')) {
                e.preventDefault();
                checkBtn.click();
            } else if (continueBtn && !continueBtn.disabled && !continueBtn.classList.contains('hidden')) {
                e.preventDefault();
                continueBtn.click();
            } else if (floatingBtn && !floatingBtn.classList.contains('hidden')) {
                e.preventDefault();
                floatingBtn.click();
            } else if (['grammar', 'video', 'vocabulary', 'daily', 'story', 'mistakes', 'tenses'].includes(state.currentTab)) {
                // Avançar direto em seções sem verificação
                e.preventDefault();
                nextQuestion();
            }
        }
        
        // Espaço: reproduzir áudio em listening/video
        if (e.key === ' ' && !e.repeat && state.currentTab === 'listening') {
            e.preventDefault();
            const playBtn = document.querySelector('button[onclick*="playAudio"]');
            if (playBtn) playBtn.click();
        }
        
        // Esc: fechar menus
        if (e.key === 'Escape') {
            document.getElementById('settingsMenu')?.classList.add('hidden');
            document.querySelectorAll('.translation-tooltip').forEach(el => el.remove());
        }
    });
}

            streak: state.streak,

    const dataStr = JSON.stringify(data, null, 2);

    const a = document.createElement('a');

    a.download = `englishpath_u22_progress_${new Date().toISOString().slice(0,10)}.json`;

    setTimeout(() => {
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }, 100);
