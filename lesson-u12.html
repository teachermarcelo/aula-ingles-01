            }
            return;
        }

        if (index >= section.length) { renderSectionComplete(currentTab); return; }
        
        switch(currentTab) {
            case 'reading': renderReading(section[index]); break;
            case 'listening': renderListening(section[index]); break;
            case 'speaking': renderSpeaking(section[index]); break;
            case 'writing': renderWriting(section[index]); break;
            case 'grammar': renderGrammar(section[index]); break;
        }
        updateProgress();
    }

    function speakText(text) {
        if(!('speechSynthesis' in window)){ alert('TTS not supported'); return null; }
        window.speechSynthesis.cancel();
        const u=new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g,''));
        u.lang=voice; u.rate=ttsRate;
        const voices=window.speechSynthesis.getVoices(), v=voices.find(x=>x.lang===voice);
        if(v) u.voice=v;
        window.speechSynthesis.speak(u);
        return window.speechSynthesis;
    }
    
    window.changeSpeed = (rate) => { ttsRate=parseFloat(rate); };

    window.toggleRecording = (expected) => {
        const btn=document.getElementById('recordBtn'), status=document.getElementById('recordStatus'), scoreDiv=document.getElementById('scoreDisplay'), continueBtn=document.getElementById('continueBtn');
        if(!btn) return;
        if(!btn.classList.contains('recording')){
            const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
            if(!SR){ alert('Use Chrome/Edge'); return; }
            recognition=new SR(); recognition.lang=voice; recognition.continuous=false;
            recognition.onspeechend=()=>recognition.stop();
            btn.classList.add('recording'); status.textContent='🎤 Listening...'; if(scoreDiv) scoreDiv.style.display='none'; if(continueBtn) continueBtn.disabled=true;
            recognition.onresult=(e)=>{
                const transcript=e.results[0][0].transcript.trim().toLowerCase(), conf=e.results[0][0].confidence;
                const clean=normalizeText(transcript), exp=normalizeText(expected||'');
                const match=clean.includes(exp)||exp.includes(clean)||clean.replace(/[-\s]/g,'')===exp.replace(/[-\s]/g,'');
                const acc=match?Math.round(conf*100):0;
                if(scoreDiv){ scoreDiv.textContent=`${acc}% Accuracy`; scoreDiv.className=`score-display ${acc>=60?'good':'bad'}`; scoreDiv.style.display='block'; }
                status.textContent=acc>=60?'✅ Great!':'🔄 Try again'; btn.classList.remove('recording');
                if(acc>=50){ addXP(10); if(continueBtn) continueBtn.disabled=false; }
            };
            recognition.onerror=()=>{ btn.classList.remove('recording'); status.textContent='❌ Error. Try again.'; };
            recognition.start();
        }
    };
    
    function normalizeText(t){ const map={'1':'one','2':'two','3':'three','4':'four','5':'five','6':'six','7':'seven','8':'eight','9':'nine','10':'ten','11':'eleven','12':'twelve','13':'thirteen','14':'fourteen','15':'fifteen','20':'twenty','30':'thirty','40':'forty','50':'fifty','100':'one hundred'}; let clean=t.toLowerCase().replace(/[^a-z0-9\s-]/g,''); Object.keys(map).forEach(k=>clean=clean.replace(new RegExp(`\\b${k}\\b`,'g'),map[k])); return clean; }

        const section=lessonData.tabs[currentTab], q=section[questionIndex[currentTab]], options=document.querySelectorAll('.option'), feedback=document.getElementById('feedback');

        else{ 
            options[selectedOption].classList.add('wrong'); 
            options[q.answer].classList.add('correct'); 
            feedback.className='feedback wrong show'; 
            feedback.innerHTML=`<strong style="color:#991b1b;"><i class="fa-solid fa-xmark"></i> Not quite</strong><br>${q.explanation?.theory||q.explanation||`Correct: ${q.options[q.answer]}`}`; 
            streak=0; streakDisplay.textContent='0'; 
        }
        document.getElementById('checkBtn').disabled=true; 
        document.getElementById('checkBtn').innerHTML=correct?'<i class="fa-solid fa-check"></i> Correct!':'<i class="fa-solid fa-xmark"></i> Review';
        saveProgress();
    };

    window.retryQuestion = () => { isAnswered=false; selectedOption=null; renderCurrentTab(); };
    window.nextQuestion = () => { questionIndex[currentTab]++; isAnswered=false; selectedOption=null; hintsUsed=0; saveProgress(); renderCurrentTab(); };
    window.skipQuestion = () => { questionIndex[currentTab]++; isAnswered=false; selectedOption=null; hintsUsed=0; saveProgress(); renderCurrentTab(); };
    window.nextSection = () => { const sections=['reading','listening','speaking','writing','vocabulary','grammar'], i=sections.indexOf(currentTab); if(i<sections.length-1) switchTab(sections[i+1]); else showCompletion(); };

    function showCompletion() {
        const bonus=totalXP>=600?200:0, final=totalXP+600+bonus;
        mainContent.innerHTML = `
            <div class="completion-screen">
                <i class="fa-solid fa-trophy"></i>
                <h2 style="font-size:2rem;font-weight:800;margin-bottom:0.5rem;">🎉 Lesson Complete!</h2>
                <p style="color:#64748b;margin-bottom:1rem;">${lessonData.unitInfo.theme} - ${lessonData.unitInfo.level}</p>
                <div class="xp-reward">+600 XP</div>
                ${bonus>0?`<p style="color:#f59e0b;font-weight:700;">+${bonus} XP Perfect Score!</p>`:''}
                
                <div class="report-card">
                    <h3 style="font-size:1.5rem;font-weight:800;margin-bottom:1rem;">📊 Performance Report</h3>
                    <div class="report-grid">
                        <div class="report-item">
                            <div class="report-value">${final}</div>
                            <div class="report-label">Total XP Earned</div>
                        </div>
                        <div class="report-item">
                            <div class="report-value">${streak}</div>
                            <div class="report-label">Day Streak</div>
                        </div>
                        <div class="report-item">
                            <div class="report-value">65</div>
                            <div class="report-label">Questions Completed</div>
                        </div>
                        <div class="report-item">
                            <div class="report-value">${Math.round((final/800)*100)}%</div>
                            <div class="report-label">Success Rate</div>
                        </div>
                    </div>
                    <div style="margin-top:2rem;">
                        <h4 style="font-weight:700;margin-bottom:1rem;">Skills Breakdown:</h4>
                        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;">
                            <div style="text-align:center;padding:1rem;background:#f8fafc;border-radius:8px;">
                                <div style="font-weight:700;color:#22c55e;">Reading</div>
                                <div style="font-size:1.5rem;font-weight:800;">10/10</div>
                            </div>
                            <div style="text-align:center;padding:1rem;background:#f8fafc;border-radius:8px;">
                                <div style="font-weight:700;color:#3b82f6;">Listening</div>
                                <div style="font-size:1.5rem;font-weight:800;">10/10</div>
                            </div>
                            <div style="text-align:center;padding:1rem;background:#f8fafc;border-radius:8px;">
                                <div style="font-weight:700;color:#f59e0b;">Speaking</div>
                                <div style="font-size:1.5rem;font-weight:800;">10/10</div>
                            </div>
                            <div style="text-align:center;padding:1rem;background:#f8fafc;border-radius:8px;">
                                <div style="font-weight:700;color:#ef4444;">Writing</div>
                                <div style="font-size:1.5rem;font-weight:800;">10/10</div>
                            </div>
                            <div style="text-align:center;padding:1rem;background:#f8fafc;border-radius:8px;">
                                <div style="font-weight:700;color:#8b5cf6;">Vocabulary</div>
                                <div style="font-size:1.5rem;font-weight:800;">30 Words</div>
                            </div>
                             <div style="text-align:center;padding:1rem;background:#f8fafc;border-radius:8px;">
                                <div style="font-weight:700;color:#6366f1;">Grammar</div>
                                <div style="font-size:1.5rem;font-weight:800;">10 Topics</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <p style="color:#64748b;margin:2rem 0;">Progress saved automatically!</p>
                <div class="actions" style="justify-content:center;">
                    <button class="btn btn-primary" onclick="goHome()"><i class="fa-solid fa-house"></i> Back to Home</button>
                </div>
            </div>
        `;
        if(currentUser) updateDoc(doc(db,"usuarios",currentUser.uid),{[`progresso.u12_completed`]:true,[`progresso.u12_date`]:new Date().toISOString(),[`progresso.u12_score`]:final}).catch(console.error);
    }

    function addXP(amount){ totalXP+=amount; score+=amount; streak++; xpDisplay.textContent=String(totalXP); streakDisplay.textContent=String(streak); checkBadges(); }
    function checkBadges(){ if(streak>=7) unlockBadge('streak_master'); if(totalXP>=1000) unlockBadge('xp_1000'); }
    function unlockBadge(id){ console.log(`Badge: ${id}`); }
    
    function getOverallProgress(){
        const total = 65;
        const rawDone = Object.values(questionIndex).reduce((acc, value) => acc + Number(value || 0), 0);
        const done = Math.max(0, Math.min(rawDone, total));
        const pct = Math.max(0, Math.min(Math.round((done / total) * 100), 100));
        return { total, done, pct };
    }

    function updateProgress(){
        const { total, done, pct } = getOverallProgress();
        progressBar.style.width = `${pct}%`;
        currentQEl.textContent = String(done);
        totalQEl.textContent = String(total);
        progressPercentEl.textContent = `${pct}%`;

        document.querySelectorAll('.tab-btn').forEach((btn) => {
            btn.classList.remove('completed');
            const sec = btn.dataset.tab;
            if (!sec || sec === 'video') return;
            if (sec === 'vocabulary') {
                if (questionIndex.vocabulary > lessonData.tabs.vocabulary.length) btn.classList.add('completed');
                return;
            }
            if (questionIndex[sec] >= lessonData.tabs[sec].length) btn.classList.add('completed');
        });
    }

    function saveProgress(){
        if(!currentUser) return;
        const data = {};
        const prefix = 'u12_';
        Object.keys(questionIndex).forEach(sec => {
            data[`progresso.${prefix}${sec}`] = Number(questionIndex[sec] || 0);
        });

        const { total, done, pct } = getOverallProgress();
        const status = pct >= 100 ? 'Concluído' : done > 0 ? 'Em andamento' : 'Começar';

        updateDoc(doc(db, "usuarios", currentUser.uid), {
            xp: Number(score || 0),
            streak: Number(streak || 0),
            totalXP: Number(totalXP || 0),
            ...data,
            'progresso.u12_total': total,
            'progresso.u12_done': done,
            'progresso.u12_percent': pct,
            'progresso.u12_status': status,
            'progresso.u12_completed': pct >= 100,
            'progresso.lastUpdate': new Date().toISOString(),
            'notes.u12': userNotes
        }).catch(console.error);
    }

    window.saveCurrentNote = (questionId, value) => {
        userNotes[questionId] = value;
    };

    window.showHint = () => {
        if(hintsUsed>=3){ alert('Max hints reached'); return; }
        const cost=hintsUsed===0?5:hintsUsed===1?10:20;
        if(totalXP<cost){ alert(`Need ${cost} XP`); return; }
        totalXP-=cost; hintsUsed++; xpDisplay.textContent=String(totalXP);
        const hints=['Look for the weather adjective (sunny, rainy).','Check the temperature words (hot, cold, degrees).','Identify the clothes (umbrella, coat).'];
        document.getElementById('hintText').textContent=hints[hintsUsed-1]||'Review the lesson.';
        document.getElementById('hintBox').classList.add('show');
        saveProgress();
    };

    window.goHome = () => { saveProgress(); window.location.href='index.html'; };
    window.toggleSettings = () => document.getElementById('settingsMenu').classList.toggle('show');
    window.toggleVoice = () => { voice=voice==='en-US'?'en-GB':'en-US'; document.getElementById('voiceLabel').textContent=voice==='en-US'?'US':'UK'; saveProgress(); };
    window.showNotes = () => alert('Notes saved per question. Review in each question\'s notes section.');
    window.resetProgress = () => { if(confirm('Restart lesson?')){ Object.keys(questionIndex).forEach(k=>questionIndex[k]=0); score=0; streak=0; vocabQuizSet=[]; saveProgress(); renderCurrentTab(); } };

    document.addEventListener('click',(e)=>{ if(!e.target.closest('.menu-btn')&&!e.target.closest('.settings-menu')) document.getElementById('settingsMenu').classList.remove('show'); });

    document.addEventListener('keydown',(e)=>{
        if(e.key==='Enter'&&!e.repeat&&currentTab!=='video'){
            e.preventDefault();
            const checkBtn=document.getElementById('checkBtn'), continueBtn=document.getElementById('continueBtn');

            if(currentTab==='writing' && checkBtn && !checkBtn.disabled){
                checkWriting();
                return;
            }

            if(currentTab==='grammar'){
                nextQuestion();
                return;
            }

            if(currentTab==='speaking' && continueBtn && !continueBtn.disabled){
                nextQuestion();
                return;
            }

            if(checkBtn && !checkBtn.disabled && !isAnswered){
                if(currentTab==='vocabulary' && typeof checkVocabAnswer === 'function') checkVocabAnswer();
                else checkAnswer();
            } else if((checkBtn && (checkBtn.textContent.includes('Correct') || checkBtn.textContent.includes('Next Question'))) || (continueBtn && !continueBtn.disabled)){
                if(['speaking','writing','grammar'].includes(currentTab)) nextQuestion();
                else{ questionIndex[currentTab]++; isAnswered=false; selectedOption=null; hintsUsed=0; saveProgress(); renderCurrentTab(); }
            }
        }
    });

    window.addEventListener('beforeunload', () => {
        try { saveProgress(); } catch (error) { console.error(error); }
    });

    if('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged=()=>{};
</script>
</body>
</html>
