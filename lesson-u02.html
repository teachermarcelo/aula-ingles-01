        { type: 'question', skill: 'writing', question: 'Escreva: 21', answer: 'twenty-one' },
        { type: 'question', skill: 'writing', question: 'Escreva: 22', answer: 'twenty-two' },
        { type: 'question', skill: 'writing', question: 'Escreva: 23', answer: 'twenty-three' },
        { type: 'question', skill: 'writing', question: 'Escreva: 24', answer: 'twenty-four' },
        { type: 'question', skill: 'writing', question: 'Escreva: 25', answer: 'twenty-five' },
        { type: 'question', skill: 'writing', question: 'Escreva: 26', answer: 'twenty-six' },
        { type: 'question', skill: 'writing', question: 'Escreva: 27', answer: 'twenty-seven' },
        { type: 'question', skill: 'writing', question: 'Escreva: 28', answer: 'twenty-eight' },
        { type: 'question', skill: 'writing', question: 'Escreva: 29', answer: 'twenty-nine' },
        { type: 'question', skill: 'writing', question: 'Escreva: 30', answer: 'thirty' },
        { type: 'question', skill: 'writing', question: 'Escreva: 40', answer: 'forty' },
        { type: 'question', skill: 'writing', question: 'Escreva: 50', answer: 'fifty' },
        { type: 'dialogue', speaker: 'narrator', name: '📚 Professor', text: 'Agora vamos aprender as regras gramaticais dos números!' },
        { type: 'question', skill: 'grammar', question: 'Regra para 21-99?', options: ['Sem hífen', 'Com hífen', 'Espaço'], answer: 1 },
        { type: 'question', skill: 'grammar', question: '1º em inglês?', options: ['Oneth', 'First', 'One'], answer: 1 },
        { type: 'question', skill: 'grammar', question: '2º em inglês?', options: ['Twoth', 'Second', 'Two'], answer: 1 },
        { type: 'question', skill: 'grammar', question: '3º em inglês?', options: ['Threeth', 'Third', 'Three'], answer: 1 },
        { type: 'question', skill: 'grammar', question: 'Qual está certo?', options: ['Fourty', 'Forty', 'Forte'], answer: 1 },
        { type: 'question', skill: 'grammar', question: 'Qual está certo?', options: ['Fivety', 'Fifty', 'Five-ty'], answer: 1 },
        { type: 'question', skill: 'grammar', question: 'Como escreve 100?', options: ['Ten tens', 'One hundred', 'Hundred one'], answer: 1 },
        { type: 'question', skill: 'grammar', question: 'UK: 105 é?', options: ['One hundred five', 'One hundred and five', 'One-oh-five'], answer: 1 },
        { type: 'question', skill: 'grammar', question: 'Ordinal de 5?', options: ['Fiveth', 'Fifth', 'Five'], answer: 1 },
        { type: 'question', skill: 'grammar', question: 'Ordinal de 10?', options: ['Tenth', 'Ten', 'Tenty'], answer: 0 },
        { type: 'question', skill: 'grammar', question: 'Ordinal de 20?', options: ['Twentyth', 'Twentieth', 'Twenty'], answer: 1 },
        { type: 'question', skill: 'grammar', question: '100º é?', options: ['Hundredth', 'Hundred', 'One hundredth'], answer: 0 },
        { type: 'dialogue', speaker: 'narrator', name: '🎉 Professor', text: 'Parabéns! Você completou todos os exercícios! Continue praticando!' }
    ];

    let currentStepIndex = 0;
    let selectedOption = null;
    let score = 0;
    let streak = 0;
    let isAnswered = false;
    let recognition = null;

    const gameArea = document.getElementById('gameArea');
    const actionBtn = document.getElementById('actionBtn');
    const progressBar = document.getElementById('progressBar');
    const currentStepEl = document.getElementById('currentStep');
    const totalStepsEl = document.getElementById('totalSteps');
    const xpDisplay = document.getElementById('xpDisplay');
    const streakDisplay = document.getElementById('streakDisplay');

    totalStepsEl.textContent = lessonSteps.length;

    // THEME
    window.toggleTheme = () => {
        const html = document.documentElement;
        const isDark = html.dataset.theme === 'dark';
        html.dataset.theme = isDark ? 'light' : 'dark';
        document.getElementById('themeIcon').className = isDark ? 'fa-solid fa-moon' : 'fa-solid fa-sun';
        localStorage.setItem('ep_theme', html.dataset.theme);
    };
    (function() {
        const saved = localStorage.getItem('ep_theme') || 'light';
        document.documentElement.dataset.theme = saved;
        document.getElementById('themeIcon').className = saved === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
    })();

    // KEYBOARD
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.repeat) {
            e.preventDefault();
            handleAction();
        }
    });

    // LOAD PROGRESS
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            try {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    score = data.xp || 0;
                    streak = data.streak || 0;
                    xpDisplay.textContent = score;
                    streakDisplay.textContent = streak;
                    if (data['progresso.u02_step'] !== undefined) {
                        currentStepIndex = data['progresso.u02_step'];
                    }
                }
            } catch (error) {
                console.error("Error loading progress:", error);
            }
        }
        renderStep();
    });

    // SAVE PROGRESS
    async function saveProgressToFirebase() {
        if (!currentUser) return;
        try {
            await updateDoc(doc(db, "usuarios", currentUser.uid), {
                xp: score,
                streak: streak,
                'progresso.u02_step': currentStepIndex,
                'progresso.u02_lastUpdate': new Date().toISOString()
            });
        } catch (error) {
            console.error("Error saving progress:", error);
        }
    }

    window.saveAndExit = async () => {
        actionBtn.disabled = true;
        actionBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...';
        await saveProgressToFirebase();
        window.location.href = 'index.html';
    };

    function renderStep() {
        if (currentStepIndex >= lessonSteps.length) {
            showCompletion();
            return;
        }

        const step = lessonSteps[currentStepIndex];
        isAnswered = false;
        selectedOption = null;
        
        currentStepEl.textContent = currentStepIndex + 1;
        const pct = (currentStepIndex / lessonSteps.length) * 100;
        progressBar.style.width = `${pct}%`;

        gameArea.innerHTML = '';

        if (step.type === 'video') renderVideo(step);
        else if (step.type === 'dialogue') renderDialogue(step);
        else if (step.type === 'question') renderQuestion(step);
    }

    function renderVideo(step) {
        gameArea.innerHTML = `
            <div style="text-align: center; margin-bottom: 2rem;">
                <span class="skill-badge" style="background: #fee2e2; color: #b91c1c;">
                    <i class="fa-solid fa-video"></i> Video Lesson
                </span>
            </div>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/${step.videoId}" frameborder="0" allowfullscreen></iframe>
            </div>
            <p style="text-align: center; color: var(--text-light); font-size: 1.1rem;">${step.title}</p>
        `;
        actionBtn.textContent = "Começar Exercícios";
        actionBtn.disabled = false;
        actionBtn.onclick = nextStep;
    }

    function renderDialogue(step) {
        const avatarClass = step.speaker === 'maria' ? 'speaker-maria' : 'speaker-john';
        const icon = step.speaker === 'maria' ? '👩' : '👨';
        
        gameArea.innerHTML = `
            <div class="dialogue-box">
                <div class="speaker-info">
                    <div class="speaker-avatar ${avatarClass}">${icon}</div>
                    <div style="font-weight: 800; font-size: 1.2rem;">${step.name}</div>
                    <button onclick="speakText('${step.text.replace(/<[^>]*>/g, '')}')" style="margin-left: auto; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: var(--secondary);">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                </div>
                <div class="speech-bubble">
                    <p style="font-size: 1.2rem; line-height: 1.6;">${step.text}</p>
                </div>
            </div>
        `;
        actionBtn.textContent = "Continuar";
        actionBtn.disabled = false;
        actionBtn.onclick = nextStep;
    }

    function renderQuestion(step) {
        const skillClasses = {
            reading: 'skill-reading',
            listening: 'skill-listening',
            speaking: 'skill-speaking',
            writing: 'skill-writing',
            grammar: 'skill-grammar'
        };
        const skillIcons = {
            reading: '<i class="fa-solid fa-book"></i>',
            listening: '<i class="fa-solid fa-headphones"></i>',
            speaking: '<i class="fa-solid fa-microphone"></i>',
            writing: '<i class="fa-solid fa-pen"></i>',
            grammar: '<i class="fa-solid fa-graduation-cap"></i>'
        };

        let html = `
            <div style="text-align: center; margin-bottom: 2rem;">
                <span class="skill-badge ${skillClasses[step.skill]}">
                    ${skillIcons[step.skill]} ${step.skill.charAt(0).toUpperCase() + step.skill.slice(1)}
                </span>
            </div>
            <div class="question-container">
                <h2 class="question-title">${step.question}</h2>
        `;

        if (step.textToSpeak) {
            html += `<button class="audio-btn" onclick="speakText('${step.textToSpeak}')"><i class="fa-solid fa-volume-high"></i></button>`;
        }

        if (step.options) {
            html += `<div class="options-grid">`;
            step.options.forEach((opt, i) => {
                html += `<div class="option-card" onclick="selectOption(this, ${i})">${opt}</div>`;
            });
            html += `</div>`;
        } else if (step.expectedPhrase) {
            html += `
                <button class="record-btn" id="recordBtn" onclick="toggleRecording('${step.expectedPhrase}')">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <p style="text-align: center; color: var(--text-light);">Clique no microfone e fale</p>
                <div id="speakingScore" style="text-align: center; margin-top: 1rem; font-weight: 700; display: none;"></div>
            `;
        } else if (step.answer && !step.options) {
            html += `
                <input type="text" id="writingInput" class="writing-input" placeholder="Digite sua resposta..." oninput="enableCheck()" autocomplete="off">
            `;
        }

        html += `</div>`;
        gameArea.innerHTML = html;

        actionBtn.textContent = "Verificar";
        actionBtn.onclick = checkAnswer;
        actionBtn.disabled = true;
        
        if (step.answer && !step.options) {
            setTimeout(() => document.getElementById('writingInput').focus(), 100);
        }
    }

    window.selectOption = (el, index) => {
        if (isAnswered) return;
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedOption = index;
        actionBtn.disabled = false;
    };

    window.enableCheck = () => {
        const val = document.getElementById('writingInput').value.trim();
        actionBtn.disabled = val.length === 0;
    };

    window.handleAction = () => {
        if (isAnswered) nextStep();
        else checkAnswer();
    };

    window.checkAnswer = () => {
        if (isAnswered) return;
        isAnswered = true;
        
        const step = lessonSteps[currentStepIndex];
        let isCorrect = false;

        if (step.options) {
            const cards = document.querySelectorAll('.option-card');
            if (selectedOption === step.answer) {
                cards[selectedOption].classList.add('correct');
                isCorrect = true;
            } else {
                cards[selectedOption].classList.add('wrong');
                cards[step.answer].classList.add('correct');
            }
        } else if (step.answer && !step.options) {
            const input = document.getElementById('writingInput');
            if (input.value.trim().toLowerCase() === step.answer.toLowerCase()) {
                input.style.borderColor = 'var(--primary)';
                input.style.background = '#dcfce7';
                isCorrect = true;
            } else {
                input.style.borderColor = 'var(--danger)';
                input.style.background = '#fee2e2';
            }
        } else if (step.expectedPhrase) {
            return;
        }

        showFeedback(isCorrect, step);
    };

    window.toggleRecording = (expectedPhrase) => {
        const btn = document.getElementById('recordBtn');
        const scoreDiv = document.getElementById('speakingScore');
        
        if (!btn.classList.contains('recording')) {
            if (!('webkitSpeechRecognition' in window)) {
                alert('Use Chrome ou Edge para reconhecimento de voz.');
                return;
            }
            
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            
            btn.classList.add('recording');
            btn.innerHTML = '<i class="fa-solid fa-stop"></i>';
            scoreDiv.style.display = 'block';
            scoreDiv.innerHTML = '<span style="color: var(--secondary);"><i class="fa-solid fa-spinner fa-spin"></i> Ouvindo...</span>';
            
            recognition.onresult = (event) => {
                let transcript = event.results[0][0].transcript.trim().toLowerCase();
                const confidence = event.results[0][0].confidence;
                
                const numMap = {
                    '0':'zero', '1':'one', '2':'two', '3':'three', '4':'four', '5':'five',
                    '6':'six', '7':'seven', '8':'eight', '9':'nine', '10':'ten',
                    '11':'eleven', '12':'twelve', '13':'thirteen', '14':'fourteen', '15':'fifteen',
                    '16':'sixteen', '17':'seventeen', '18':'eighteen', '19':'nineteen',
                    '20':'twenty', '21':'twenty-one', '22':'twenty-two', '23':'twenty-three',
                    '24':'twenty-four', '25':'twenty-five', '26':'twenty-six', '27':'twenty-seven',
                    '28':'twenty-eight', '29':'twenty-nine', '30':'thirty',
                    '40':'forty', '50':'fifty', '60':'sixty', '70':'seventy', '80':'eighty',
                    '90':'ninety', '100':'one hundred'
                };
                
                Object.keys(numMap).forEach(num => {
                    const regex = new RegExp(`\\b${num}\\b`, 'g');
                    transcript = transcript.replace(regex, numMap[num]);
                });
                
                transcript = transcript.replace(/[.,!?]/g, '').trim();
                const expected = expectedPhrase.toLowerCase().replace(/[.,!?]/g, '');
                
                const isMatch = transcript.includes(expected) || expected.includes(transcript) ||
                               transcript.replace(/[-\s]/g, '') === expected.replace(/[-\s]/g, '');
                
                const accuracy = Math.round((isMatch ? 1 : 0) * confidence * 100);
                
                scoreDiv.innerHTML = `
                    <div style="margin-bottom: 0.5rem;">
                        <span style="color: ${accuracy >= 60 ? 'var(--primary)' : 'var(--danger)'}; font-size: 1.2rem;">
                            ${accuracy}% de precisão
                        </span>
                    </div>
                    <div style="font-size: 0.9rem; color: var(--text-light);">
                        Você disse: "${transcript}"
                    </div>
                `;
                
                showFeedback(accuracy >= 50, lessonSteps[currentStepIndex]);
                
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
            };
            
            recognition.onerror = () => {
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                scoreDiv.innerHTML = '<span style="color: var(--danger);">Erro ao ouvir. Tente novamente.</span>';
            };
            
            recognition.start();
        }
    };

    function showFeedback(isCorrect, step) {
        const overlay = document.getElementById('feedbackOverlay');
        const sheet = document.getElementById('feedbackSheet');
        const icon = document.getElementById('feedbackIcon');
        const title = document.getElementById('feedbackTitle');
        const msg = document.getElementById('feedbackMsg');

        overlay.classList.add('show');
        sheet.classList.remove('correct', 'wrong');
        
        if (isCorrect) {
            sheet.classList.add('correct');
            icon.innerHTML = '<i class="fa-solid fa-check" style="color: var(--primary);"></i>';
            title.textContent = "Correto! 🎉";
            title.style.color = '#15803d';
            msg.textContent = `+10 XP • Sequência: ${streak + 1}`;
            
            score += 10;
            streak++;
            xpDisplay.textContent = score;
            streakDisplay.textContent = streak;
            
            saveProgressToFirebase();
            if (currentUser) {
                updateDoc(doc(db, "usuarios", currentUser.uid), {
                    xp: increment(10),
                    streak: streak
                }).catch(console.error);
            }
        } else {
            sheet.classList.add('wrong');
            icon.innerHTML = '<i class="fa-solid fa-rotate-right" style="color: var(--danger);"></i>';
            title.textContent = "Quase lá! 💪";
            title.style.color = '#b91c1c';
            
            let correctAnswer = '';
            if (step.options) correctAnswer = step.options[step.answer];
            else if (step.answer) correctAnswer = step.answer;
            else if (step.expectedPhrase) correctAnswer = step.expectedPhrase;
            
            msg.textContent = `Resposta correta: ${correctAnswer}`;
            
            streak = 0;
            streakDisplay.textContent = streak;
        }

        sheet.classList.add('show');
        actionBtn.style.display = 'none';
    }

    window.closeFeedback = () => {
        document.getElementById('feedbackOverlay').classList.remove('show');
        document.getElementById('feedbackSheet').classList.remove('show');
    };

    window.nextStep = () => {
        closeFeedback();
        currentStepIndex++;
        saveProgressToFirebase();
        setTimeout(() => {
            renderStep();
            actionBtn.style.display = 'block';
        }, 300);
    };

    window.speakText = (text) => {
        if ('speechSynthesis' in window) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            speechSynthesis.speak(utterance);
        }
    };

    function showCompletion() {
        gameArea.innerHTML = `
            <div style="text-align: center; padding: 3rem 1rem;">
                <div style="font-size: 6rem; margin-bottom: 2rem; animation: bounce 2s infinite;">🏆</div>
                <h2 style="font-size: 2.5rem; font-weight: 800; margin-bottom: 1rem; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    Lição Completa!
                </h2>
                <p style="font-size: 1.5rem; margin-bottom: 2rem;">Você ganhou <strong style="color: var(--primary);">${score} XP</strong></p>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 300px; margin: 0 auto 2rem;">
                    <div style="background: var(--card); padding: 1.5rem; border-radius: 16px; border: 3px solid var(--primary);">
                        <div style="font-size: 2rem; font-weight: 800; color: var(--primary);">${streak}</div>
                        <div style="font-size: 0.875rem; color: var(--text-light);">Melhor Sequência</div>
                    </div>
                    <div style="background: var(--card); padding: 1.5rem; border-radius: 16px; border: 3px solid var(--secondary);">
                        <div style="font-size: 2rem; font-weight: 800; color: var(--secondary);">${currentStepIndex}</div>
                        <div style="font-size: 0.875rem; color: var(--text-light);">Exercícios</div>
                    </div>
                </div>
                
                <p style="color: var(--text-light); margin-bottom: 2rem;">Progresso salvo automaticamente!</p>
                
                <button onclick="window.location.href='index.html'" class="action-btn btn-continue" style="max-width: 300px; margin: 0 auto; display: block;">
                    <i class="fa-solid fa-house mr-2"></i> Voltar para Home
                </button>
            </div>
        `;
        document.querySelector('.bottom-bar').style.display = 'none';
        progressBar.style.width = '100%';
        currentStepEl.textContent = lessonSteps.length;
        
        if (currentUser) {
            updateDoc(doc(db, "usuarios", currentUser.uid), {
                'progresso.u02_completed': true,
                'progresso.u02_date': new Date().toISOString()
            }).catch(console.error);
        }
    }
</script>
</body>
</html>
