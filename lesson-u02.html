<html lang="pt-BR">
<head>

    <title>U02: Numbers 1-100 | EnglishPath</title>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #f7f7f7;
            color: #4b4b4b;
            min-height: 100vh;
        }
        
        /* TOP BAR */
        .top-bar {
            background: white;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 2px solid #e5e5e5;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .progress-wrapper { flex: 1; }
        .progress-track {
            height: 16px;
            background: #e5e5e5;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #58cc02;
            border-radius: 10px;
            transition: width 0.5s;
        }
        .progress-text {
            font-size: 0.75rem;
            color: #777;
            text-align: center;
            margin-top: 0.25rem;
            font-weight: 700;
        }
        
        .stats { display: flex; gap: 0.5rem; }
        .stat-badge {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.4rem 0.75rem;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.9rem;
        }
        .stat-streak { background: #ff9600; color: white; }
        .stat-xp { background: #ffc800; color: #78350f; }
        
        /* TABS */
        .tabs-container {
            background: white;
            border-bottom: 2px solid #e5e5e5;
            padding: 0.5rem;
            overflow-x: auto;
            position: sticky;
            top: 60px;
            z-index: 99;
        }
        .tabs-wrapper {
            display: flex;
            gap: 0.5rem;
            min-width: max-content;
        }
        .tab-btn {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            border: 2px solid #e5e5e5;
            background: white;
            color: #777;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tab-btn:hover { border-color: #1cb0f6; color: #1cb0f6; }
        .tab-btn.active {
            background: #1cb0f6;
            border-color: #1cb0f6;
            color: white;
            box-shadow: 0 4px 0 #1899d6;
        }
        .tab-btn.completed {
            background: #dcfce7;
            border-color: #58cc02;
            color: #15803d;
        }
        .tab-btn.completed::after {
            content: '✓';
            font-size: 0.8rem;
        }
        
        /* MAIN CONTENT */
        .main-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem 140px;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* EXERCISES */
        .exercise-card {
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .question-title {
            font-size: 1.3rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }
        @media (min-width: 640px) { .options-grid { grid-template-columns: 1fr 1fr; } }
        
        .option-btn {
            padding: 1.25rem;
            border-radius: 16px;
            border: 2px solid #e5e5e5;
            background: white;
            color: #4b4b4b;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 2px 0 #e5e5e5;
        }
        .option-btn:hover { border-color: #1cb0f6; background: #f0f9ff; }
        .option-btn:active { transform: translateY(2px); box-shadow: none; }
        .option-btn.selected {
            border-color: #1cb0f6;
            background: #e0f2fe;
            box-shadow: 0 2px 0 #1cb0f6;
        }
        .option-btn.correct {
            border-color: #58cc02;
            background: #dcfce7;
            box-shadow: 0 2px 0 #58cc02;
        }
        .option-btn.wrong {
            border-color: #ff4b4b;
            background: #fee2e2;
            box-shadow: 0 2px 0 #ff4b4b;
        }
        
        .audio-btn {
            background: #1cb0f6;
            color: white;
            border: none;
            width: 100%;
            max-width: 250px;
            padding: 1.25rem;
            border-radius: 16px;
            font-size: 2rem;
            cursor: pointer;
            margin: 0 auto 1.5rem;
            display: block;
            box-shadow: 0 4px 0 #1899d6;
            transition: all 0.1s;
        }
        .audio-btn:active { transform: translateY(4px); box-shadow: none; }
        .audio-btn.playing { animation: pulse 0.5s; }
        @keyframes pulse { 50% { transform: scale(1.05); } }
        
        .record-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4b4b, #dc2626);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 1.5rem auto;
            cursor: pointer;
            box-shadow: 0 6px 0 #b91c1c;
            border: none;
            transition: all 0.15s;
        }
        .record-btn:active { transform: translateY(6px); box-shadow: none; }
        .record-btn.recording { animation: pulse-record 1s infinite; }
        @keyframes pulse-record { 50% { transform: scale(1.1); } }
        
        .writing-input {
            width: 100%;
            padding: 1.25rem;
            font-size: 1.2rem;
            border: 2px solid #e5e5e5;
            border-radius: 16px;
            background: white;
            text-align: center;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .writing-input:focus {
            outline: none;
            border-color: #1cb0f6;
        }
        
        /* BOTTOM BAR */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 2px solid #e5e5e5;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 100;
        }
        
        .action-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
            transition: all 0.1s;
        }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-check { background: #58cc02; color: white; box-shadow: 0 4px 0 #46a302; }
        .btn-check:disabled { background: #e5e5e5; color: #afafaf; box-shadow: none; cursor: not-allowed; }
        .btn-home { background: #e5e5e5; color: #777; font-size: 0.85rem; }
        
        /* FEEDBACK */
        .feedback-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
        }
        .feedback-overlay.show { display: block; }
        
        .feedback-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 201;
        }
        .feedback-sheet.show { transform: translateY(0); }
        .feedback-sheet.correct { background: #d7ffb8; border-top: 3px solid #58cc02; }
        .feedback-sheet.wrong { background: #ffdfe0; border-top: 3px solid #ff4b4b; }
        
        .video-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            background: #000;
            margin-bottom: 1.5rem;
        }
        .video-wrapper iframe { width: 100%; height: 100%; }
        
        .dialogue-box {
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .speaker-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .speaker-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .speaker-maria { background: linear-gradient(135deg, #ec4899, #f472b6); }
        .speaker-john { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
        
        @media (max-width: 480px) {
            .main-content { padding: 1.5rem 0.75rem 160px; }
            .tab-btn { padding: 0.6rem 1rem; font-size: 0.85rem; }
        }
    </style>
</head>

            html += `<button class="record-btn" id="recordBtn" onclick="toggleRecording('${exercise.phrase}')"><i class="fa-solid fa-microphone"></i></button>`;
            html += `<p style="text-align:center;color:#777;">Clique no microfone e fale</p>`;
            html += `<div id="speakingResult" style="text-align:center;margin-top:1rem;font-weight:700;display:none;"></div>`;
            html += `</div>`;
            
            actionBtn.textContent = "Continuar";
            actionBtn.disabled = true;
            actionBtn.onclick = nextExercise;
            
        } else if (currentTab === 'writing') {
            html += `<div class="exercise-card">`;
            html += `<h3 class="question-title">${exercise.q}</h3>`;
            html += `<input type="text" id="writingInput" class="writing-input" placeholder="Digite sua resposta..." oninput="enableCheck()">`;
            html += `</div>`;
            
            actionBtn.textContent = "Verificar";
            actionBtn.disabled = true;
            actionBtn.onclick = checkAnswer;
        }
        
        document.getElementById(`tab-${currentTab}`).innerHTML = html;
    }

    window.selectOption = (index) => {
        if (isAnswered) return;
        document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
        document.querySelectorAll('.option-btn')[index].classList.add('selected');
        selectedOption = index;
        actionBtn.disabled = false;
    };

    window.enableCheck = () => {
        const val = document.getElementById('writingInput')?.value.trim();
        actionBtn.disabled = !val;
    };

    window.handleAction = () => {
        if (isAnswered) nextExercise();
        else checkAnswer();
    };

    window.checkAnswer = () => {
        if (isAnswered) return;
        isAnswered = true;
        
        const data = tabsData[currentTab];
        const exercise = data[currentIndex[currentTab]];
        let isCorrect = false;
        
        if (currentTab === 'writing') {
            const input = document.getElementById('writingInput');
            if (input.value.trim().toLowerCase() === exercise.answer.toLowerCase()) {
                input.style.borderColor = '#58cc02';
                input.style.background = '#dcfce7';
                isCorrect = true;
            } else {
                input.style.borderColor = '#ff4b4b';
                input.style.background = '#fee2e2';
            }
        } else {
            const buttons = document.querySelectorAll('.option-btn');
            if (selectedOption === exercise.answer) {
                buttons[selectedOption].classList.add('correct');
                isCorrect = true;
            } else {
                buttons[selectedOption].classList.add('wrong');
                buttons[exercise.answer].classList.add('correct');
            }
        }
        
        showFeedback(isCorrect, exercise);
    };

    window.playAudio = (text) => {
        // Cancel any current speech
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            
            // Get English voice
            const voices = window.speechSynthesis.getVoices();
            const enVoice = voices.find(v => v.lang === 'en-US') || voices.find(v => v.lang.startsWith('en'));
            if (enVoice) utterance.voice = enVoice;
            
            const btn = document.querySelector('.audio-btn');
            if (btn) {
                btn.classList.add('playing');
                setTimeout(() => btn.classList.remove('playing'), 500);
            }
            
            window.speechSynthesis.speak(utterance);
        } else {
            alert('Seu navegador não suporta áudio. Use Chrome ou Edge.');
        }
    };

    window.toggleRecording = (expectedPhrase) => {
        const btn = document.getElementById('recordBtn');
        const resultDiv = document.getElementById('speakingResult');
        
        if (!btn.classList.contains('recording')) {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Use Chrome ou Edge para reconhecimento de voz.');
                return;
            }
            
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            
            btn.classList.add('recording');
            btn.innerHTML = '<i class="fa-solid fa-stop"></i>';
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<span style="color:#1cb0f6;"><i class="fa-solid fa-spinner fa-spin"></i> Ouvindo...</span>';
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.trim().toLowerCase();
                const confidence = event.results[0][0].confidence;
                
                // Convert numbers to words
                const numMap = { '11':'eleven','12':'twelve','13':'thirteen','14':'fourteen','15':'fifteen',
                    '16':'sixteen','17':'seventeen','18':'eighteen','19':'nineteen','20':'twenty' };
                let cleanTranscript = transcript;
                Object.keys(numMap).forEach(k => {
                    cleanTranscript = cleanTranscript.replace(k, numMap[k]);
                });
                
                const isMatch = cleanTranscript.includes(expectedPhrase) || expectedPhrase.includes(cleanTranscript);
                const accuracy = Math.round((isMatch ? 1 : 0) * confidence * 100);
                
                resultDiv.innerHTML = `
                    <div style="margin-bottom:0.5rem;">
                        <span style="color:${accuracy >= 60 ? '#58cc02' : '#ff4b4b'};">
                            ${accuracy}% de precisão
                        </span>
                    </div>
                    <div style="font-size:0.85rem;color:#777;">Você disse: "${transcript}"</div>
                `;
                
                if (accuracy >= 50) {
                    score += 10;
                    streak++;
                    xpDisplay.textContent = score;
                    streakDisplay.textContent = streak;
                    saveProgress();
                }
                
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                actionBtn.disabled = false;
            };
            
            recognition.onerror = () => {
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                resultDiv.innerHTML = '<span style="color:#ff4b4b;">Erro. Tente novamente.</span>';
            };
            
            recognition.start();
        }
    };

    function showFeedback(isCorrect, exercise) {
        const overlay = document.getElementById('feedbackOverlay');
        const sheet = document.getElementById('feedbackSheet');
        const icon = document.getElementById('feedbackIcon');
        const title = document.getElementById('feedbackTitle');
        const msg = document.getElementById('feedbackMsg');
        
        overlay.classList.add('show');
        sheet.classList.remove('correct', 'wrong');
        
        if (isCorrect) {
            sheet.classList.add('correct');
            icon.innerHTML = '<i class="fa-solid fa-check" style="color:#58cc02;"></i>';
            title.textContent = "Correto! 🎉";
            title.style.color = '#15803d';
            msg.textContent = `+10 XP • Sequência: ${streak + 1}`;
            
            score += 10;
            streak++;
            xpDisplay.textContent = score;
            streakDisplay.textContent = streak;
            saveProgress();
        } else {
            sheet.classList.add('wrong');
            icon.innerHTML = '<i class="fa-solid fa-rotate-right" style="color:#ff4b4b;"></i>';
            title.textContent = "Não foi dessa vez 💪";
            title.style.color = '#b91c1c';
            
            let correctAnswer = '';
            if (exercise.options) correctAnswer = exercise.options[exercise.answer];
            else if (exercise.answer) correctAnswer = exercise.answer;
            
            msg.textContent = `Resposta correta: ${correctAnswer}`;
            streak = 0;
            streakDisplay.textContent = streak;
        }
        
        sheet.classList.add('show');
        actionBtn.style.display = 'none';
    }

    window.closeFeedback = () => {
        document.getElementById('feedbackOverlay').classList.remove('show');
        document.getElementById('feedbackSheet').classList.remove('show');
        nextExercise();
    };

    function nextExercise() {
        currentIndex[currentTab]++;
        saveProgress();
        renderExercise();
        updateProgress();
        actionBtn.style.display = 'block';
    }

    function saveProgress() {
        if (!currentUser) return;
        
        const progressData = {};
        Object.keys(currentIndex).forEach(tab => {
            progressData[`progresso.u02_${tab}`] = currentIndex[tab];
        });
        
        updateDoc(doc(db, "usuarios", currentUser.uid), {
            xp: score,
            streak: streak,
            ...progressData,
            'progresso.u02_lastUpdate': new Date().toISOString()
        }).catch(console.error);
    }

    function updateProgress() {
        const totalExercises = Object.values(tabsData).reduce((acc, tab) => {
            if (Array.isArray(tab)) return acc + tab.length;
            return acc;
        }, 0);
        
        const completedExercises = Object.values(currentIndex).reduce((a, b) => a + b, 0);
        const pct = totalExercises > 0 ? Math.round((completedExercises / totalExercises) * 100) : 0;
        
        progressBar.style.width = `${pct}%`;
        progressText.textContent = `${pct}% completo (${completedExercises}/${totalExercises})`;
        
        // Update tab completion indicators
        document.querySelectorAll('.tab-btn').forEach(btn => {
            const tabName = btn.textContent.toLowerCase().split(' ')[0];
            const tabData = tabsData[tabName];
            if (tabData && Array.isArray(tabData) && currentIndex[tabName] >= tabData.length) {
                btn.classList.add('completed');
            }
        });
    }

    window.saveAndExit = async () => {
        actionBtn.disabled = true;
        actionBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...';
        await saveProgress();
        window.location.href = 'index.html';
    };

    // Load voices on page load
    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = () => {};
    }
</script>
</body>
</html>
