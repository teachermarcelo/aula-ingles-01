<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>U02: Numbers 1-100 | EnglishPath</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #f7f7f7;
            color: #4b4b4b;
            min-height: 100vh;
        }
        
        .top-bar {
            background: white;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            border-bottom: 2px solid #e5e5e5;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #afafaf;
            cursor: pointer;
            padding: 0.25rem;
            border-radius: 50%;
        }
        .close-btn:hover { color: #ff4b4b; background: #fee2e2; }
        
        .progress-wrapper { flex: 1; }
        .progress-track {
            height: 16px;
            background: #e5e5e5;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #58cc02;
            border-radius: 10px;
            transition: width 0.5s;
        }
        .progress-text {
            font-size: 0.75rem;
            color: #777;
            text-align: center;
            margin-top: 0.25rem;
            font-weight: 700;
        }
        
        .stats { display: flex; gap: 0.5rem; }
        .stat-badge {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.4rem 0.75rem;
            border-radius: 10px;
            font-weight: 800;
            font-size: 0.9rem;
        }
        .stat-streak { background: #ff9600; color: white; }
        .stat-xp { background: #ffc800; color: #78350f; }
        
        .tabs-container {
            background: white;
            border-bottom: 2px solid #e5e5e5;
            padding: 0.5rem;
            overflow-x: auto;
            position: sticky;
            top: 60px;
            z-index: 99;
        }
        .tabs-wrapper {
            display: flex;
            gap: 0.5rem;
        }
        .tab-btn {
            padding: 0.75rem 1.25rem;
            border-radius: 12px;
            border: 2px solid #e5e5e5;
            background: white;
            color: #777;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .tab-btn:hover { border-color: #1cb0f6; color: #1cb0f6; }
        .tab-btn.active {
            background: #1cb0f6;
            border-color: #1cb0f6;
            color: white;
            box-shadow: 0 4px 0 #1899d6;
        }
        .tab-btn.completed {
            background: #dcfce7;
            border-color: #58cc02;
            color: #15803d;
        }
        .tab-btn.completed::after {
            content: '✓';
            font-size: 0.8rem;
            margin-left: 0.25rem;
        }
        
        .main-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem 140px;
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .exercise-card {
            background: white;
            border: 2px solid #e5e5e5;
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        
        .question-title {
            font-size: 1.3rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 1.5rem;
            color: #333;
        }
        
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }
        @media (min-width: 640px) { .options-grid { grid-template-columns: 1fr 1fr; } }
        
        .option-btn {
            padding: 1.25rem;
            border-radius: 16px;
            border: 2px solid #e5e5e5;
            background: white;
            color: #4b4b4b;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 2px 0 #e5e5e5;
        }
        .option-btn:hover { border-color: #1cb0f6; background: #f0f9ff; }
        .option-btn:active { transform: translateY(2px); box-shadow: none; }
        .option-btn.selected {
            border-color: #1cb0f6;
            background: #e0f2fe;
            box-shadow: 0 2px 0 #1cb0f6;
        }
        .option-btn.correct {
            border-color: #58cc02;
            background: #dcfce7;
            box-shadow: 0 2px 0 #58cc02;
        }
        .option-btn.wrong {
            border-color: #ff4b4b;
            background: #fee2e2;
            box-shadow: 0 2px 0 #ff4b4b;
        }
        
        .audio-btn {
            background: #1cb0f6;
            color: white;
            border: none;
            width: 100%;
            max-width: 250px;
            padding: 1.25rem;
            border-radius: 16px;
            font-size: 2rem;
            cursor: pointer;
            margin: 0 auto 1.5rem;
            display: block;
            box-shadow: 0 4px 0 #1899d6;
        }
        .audio-btn:active { transform: translateY(4px); box-shadow: none; }
        
        .record-btn {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff4b4b, #dc2626);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 1.5rem auto;
            cursor: pointer;
            box-shadow: 0 6px 0 #b91c1c;
            border: none;
        }
        .record-btn:active { transform: translateY(6px); box-shadow: none; }
        .record-btn.recording { animation: pulse 1s infinite; }
        @keyframes pulse { 50% { transform: scale(1.1); } }
        
        .writing-input {
            width: 100%;
            padding: 1.25rem;
            font-size: 1.2rem;
            border: 2px solid #e5e5e5;
            border-radius: 16px;
            background: white;
            text-align: center;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }
        .writing-input:focus { outline: none; border-color: #1cb0f6; }
        
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 2px solid #e5e5e5;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            z-index: 100;
        }
        
        .action-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 rgba(0,0,0,0.15);
        }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-check { background: #58cc02; color: white; box-shadow: 0 4px 0 #46a302; }
        .btn-check:disabled { background: #e5e5e5; color: #afafaf; box-shadow: none; cursor: not-allowed; }
        .btn-home { background: #e5e5e5; color: #777; font-size: 0.85rem; }
        
        .feedback-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            display: none;
        }
        .feedback-overlay.show { display: block; }
        
        .feedback-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1.5rem;
            transform: translateY(100%);
            transition: transform 0.3s;
            z-index: 201;
        }
        .feedback-sheet.show { transform: translateY(0); }
        .feedback-sheet.correct { background: #d7ffb8; border-top: 3px solid #58cc02; }
        .feedback-sheet.wrong { background: #ffdfe0; border-top: 3px solid #ff4b4b; }
        
        .video-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            background: #000;
            margin-bottom: 1.5rem;
        }
        .video-wrapper iframe { width: 100%; height: 100%; }
        
        .completion-msg {
            text-align: center;
            padding: 3rem 1rem;
        }
        .completion-msg i {
            font-size: 4rem;
            color: #58cc02;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <button class="close-btn" onclick="saveAndExit()">
            <i class="fa-solid fa-xmark"></i>
        </button>
        
        <div class="progress-wrapper">
            <div class="progress-track">
                <div id="progressBar" class="progress-fill" style="width: 0%"></div>
            </div>
            <div class="progress-text" id="progressText">Carregando...</div>
        </div>
        
        <div class="stats">
            <div class="stat-badge stat-streak">
                <i class="fa-solid fa-fire"></i>
                <span id="streakDisplay">0</span>
            </div>
            <div class="stat-badge stat-xp">
                <i class="fa-solid fa-bolt"></i>
                <span id="xpDisplay">0</span>
            </div>
        </div>
    </div>

    <div class="tabs-container">
        <div class="tabs-wrapper">
            <button class="tab-btn active" onclick="switchTab('video')">
                <i class="fa-solid fa-video"></i> Video
            </button>
            <button class="tab-btn" onclick="switchTab('reading')">
                <i class="fa-solid fa-book"></i> Reading
            </button>
            <button class="tab-btn" onclick="switchTab('listening')">
                <i class="fa-solid fa-headphones"></i> Listening
            </button>
            <button class="tab-btn" onclick="switchTab('speaking')">
                <i class="fa-solid fa-microphone"></i> Speaking
            </button>
            <button class="tab-btn" onclick="switchTab('writing')">
                <i class="fa-solid fa-pen"></i> Writing
            </button>
            <button class="tab-btn" onclick="switchTab('grammar')">
                <i class="fa-solid fa-graduation-cap"></i> Grammar
            </button>
        </div>
    </div>

    <div class="main-content">
        <div id="tab-video" class="tab-content active"></div>
        <div id="tab-reading" class="tab-content"></div>
        <div id="tab-listening" class="tab-content"></div>
        <div id="tab-speaking" class="tab-content"></div>
        <div id="tab-writing" class="tab-content"></div>
        <div id="tab-grammar" class="tab-content"></div>
    </div>

    <div class="bottom-bar">
        <button id="actionBtn" class="action-btn btn-check" onclick="handleAction()" disabled>
            Carregando...
        </button>
        <button onclick="saveAndExit()" class="action-btn btn-home">
            <i class="fa-solid fa-house mr-2"></i> Salvar e Voltar
        </button>
    </div>

    <div class="feedback-overlay" id="feedbackOverlay" onclick="closeFeedback()"></div>
    <div class="feedback-sheet" id="feedbackSheet">
        <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
            <div id="feedbackIcon" style="width:56px;height:56px;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-size:1.75rem;"></div>
            <div>
                <div id="feedbackTitle" style="font-size:1.25rem;font-weight:800;"></div>
                <div id="feedbackMsg" style="font-size:0.95rem;"></div>
            </div>
        </div>
        <button class="action-btn btn-check" onclick="closeFeedback()">Continuar</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCwnWDz0aCImvQNKdW6xzSRjkK_VVomGq4",
        authDomain: "englishpath-2d558.firebaseapp.com",
        projectId: "englishpath-2d558",
        storageBucket: "englishpath-2d558.firebasestorage.app",
        messagingSenderId: "384301599670",
        appId: "1:384301599670:web:f16d2adf8a1714fd034f17"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;

    // ===== DATA =====
    const tabsData = {
        video: { type: 'video', videoId: 'YuXFxvTbviI' },
        reading: [
            { q: 'Quem é do Brasil?', options: ['John', 'Maria', 'Ambos'], answer: 1 },
            { q: 'Quantos anos Maria tem?', options: ['15', '25', '35'], answer: 1 },
            { q: 'Quantos irmãos John tem?', options: ['2', '3', '4'], answer: 1 },
            { q: 'Qual o telefone de Maria?', options: ['555-4321', '555-1234', '555-5678'], answer: 1 },
            { q: 'Número favorito de John?', options: ['7', '17', '70'], answer: 0 },
            { q: 'Maria acha 12 o quê?', options: ['Azarado', 'Sortudo', 'Comum'], answer: 1 },
            { q: 'Onde John mora?', options: ['42nd Street', '24th Street', '14th Street'], answer: 0 },
            { q: 'Quantas pessoas trabalham com Maria?', options: ['15', '50', '500'], answer: 1 },
            { q: 'Como eles se despedem?', options: ['Good night', 'Goodbye', 'See you tomorrow'], answer: 1 },
            { q: 'Complete: "I\'m _____ years old"', options: ['twenty', 'twenty-five', 'thirty'], answer: 1 }
        ],
        listening: [
            { audio: 'one', q: 'Qual número?', options: ['1', '10', '11'], answer: 0 },
            { audio: 'five', q: 'O que ouviu?', options: ['5', '15', '50'], answer: 0 },
            { audio: 'ten', q: 'Qual número?', options: ['10', '11', '12'], answer: 0 },
            { audio: 'twenty', q: 'O que foi dito?', options: ['12', '20', '2'], answer: 1 },
            { audio: 'thirty', q: 'Qual número?', options: ['13', '30', '3'], answer: 1 },
            { audio: 'forty', q: 'O que ouviu?', options: ['14', '40', '4'], answer: 1 },
            { audio: 'fifty', q: 'Qual número?', options: ['15', '50', '5'], answer: 1 },
            { audio: 'sixty', q: 'O que foi falado?', options: ['16', '60', '6'], answer: 1 },
            { audio: 'seventy', q: 'Qual número?', options: ['17', '70', '7'], answer: 1 },
            { audio: 'eighty', q: 'O que ouviu?', options: ['18', '80', '8'], answer: 1 }
        ],
        speaking: [
            { phrase: 'eleven', q: 'Diga: "Onze"' },
            { phrase: 'twelve', q: 'Diga: "Doze"' },
            { phrase: 'thirteen', q: 'Diga: "Treze"' },
            { phrase: 'fourteen', q: 'Diga: "Quatorze"' },
            { phrase: 'fifteen', q: 'Diga: "Quinze"' },
            { phrase: 'sixteen', q: 'Diga: "Dezesseis"' },
            { phrase: 'seventeen', q: 'Diga: "Dezessete"' },
            { phrase: 'eighteen', q: 'Diga: "Dezoito"' },
            { phrase: 'nineteen', q: 'Diga: "Dezenove"' },
            { phrase: 'twenty', q: 'Diga: "Vinte"' }
        ],
        writing: [
            { q: 'Escreva: 21', answer: 'twenty-one' },
            { q: 'Escreva: 22', answer: 'twenty-two' },
            { q: 'Escreva: 23', answer: 'twenty-three' },
            { q: 'Escreva: 24', answer: 'twenty-four' },
            { q: 'Escreva: 25', answer: 'twenty-five' },
            { q: 'Escreva: 26', answer: 'twenty-six' },
            { q: 'Escreva: 27', answer: 'twenty-seven' },
            { q: 'Escreva: 28', answer: 'twenty-eight' },
            { q: 'Escreva: 29', answer: 'twenty-nine' },
            { q: 'Escreva: 30', answer: 'thirty' }
        ],
        grammar: [
            { q: 'Regra para 21-99?', options: ['Sem hífen', 'Com hífen', 'Espaço'], answer: 1 },
            { q: '1º em inglês?', options: ['Oneth', 'First', 'One'], answer: 1 },
            { q: '2º em inglês?', options: ['Twoth', 'Second', 'Two'], answer: 1 },
            { q: '3º em inglês?', options: ['Threeth', 'Third', 'Three'], answer: 1 },
            { q: 'Qual correto?', options: ['Fourty', 'Forty', 'Forte'], answer: 1 },
            { q: 'Qual correto?', options: ['Fivety', 'Fifty', 'Five-ty'], answer: 1 },
            { q: '100 em inglês?', options: ['Ten tens', 'One hundred', 'Hundred one'], answer: 1 },
            { q: 'UK: 105?', options: ['One hundred five', 'One hundred and five', 'One-oh-five'], answer: 1 },
            { q: 'Ordinal de 5?', options: ['Fiveth', 'Fifth', 'Five'], answer: 1 },
            { q: 'Ordinal de 10?', options: ['Tenth', 'Ten', 'Tenty'], answer: 0 }
        ]
    };

    let currentTab = 'video';
    let currentIndex = { reading: 0, listening: 0, speaking: 0, writing: 0, grammar: 0 };
    let score = 0;
    let streak = 0;
    let isAnswered = false;
    let selectedOption = null;
    let recognition = null;

    // ===== INIT =====
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            try {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    score = data.xp || 0;
                    streak = data.streak || 0;
                    xpDisplay.textContent = String(score);
                    streakDisplay.textContent = String(streak);
                    
                    if (data.progresso) {
                        ['reading', 'listening', 'speaking', 'writing', 'grammar'].forEach(tab => {
                            const key = `u02_${tab}`;
                            if (typeof data.progresso[key] === 'number') {
                                currentIndex[tab] = data.progresso[key];
                            }
                        });
                    }
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }
        renderCurrentTab();
        updateProgress();
    });

    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.remove('active');
            if (btn.textContent.toLowerCase().includes(tab)) btn.classList.add('active');
        });
        renderCurrentTab();
    };

    function renderCurrentTab() {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.getElementById(`tab-${currentTab}`).classList.add('active');
        
        if (currentTab === 'video') {
            renderVideo();
        } else {
            renderExercise();
        }
        updateProgress();
    }

    function renderVideo() {
        const container = document.getElementById('tab-video');
        container.innerHTML = `
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/${tabsData.video.videoId}" frameborder="0" allowfullscreen></iframe>
            </div>
            <p style="text-align:center;color:#777;">Assista e clique em "Começar Exercícios"</p>
        `;
        actionBtn.textContent = "Começar Exercícios";
        actionBtn.disabled = false;
        actionBtn.onclick = () => switchTab('reading');
    }

    function renderExercise() {
        const data = tabsData[currentTab];
        const index = currentIndex[currentTab];
        const container = document.getElementById(`tab-${currentTab}`);
        
        if (!data || !Array.isArray(data) || data.length === 0) {
            container.innerHTML = '<p style="text-align:center;color:red;">Erro: Sem dados</p>';
            actionBtn.style.display = 'none';
            return;
        }
        
        if (index >= data.length) {
            container.innerHTML = `
                <div class="completion-msg">
                    <i class="fa-solid fa-check-circle"></i>
                    <h3 style="font-size:1.5rem;font-weight:800;margin-bottom:0.5rem;">Completo!</h3>
                    <p style="color:#777;">Você terminou ${currentTab}!</p>
                </div>
            `;
            actionBtn.style.display = 'none';
            return;
        }
        
        const ex = data[index];
        isAnswered = false;
        selectedOption = null;
        actionBtn.style.display = 'block';
        
        let html = '<div class="exercise-card">';
        html += `<h3 class="question-title">${ex.q}</h3>`;
        
        if (currentTab === 'listening' && ex.audio) {
            html += `<button class="audio-btn" onclick="playAudio('${ex.audio}')"><i class="fa-solid fa-volume-high"></i></button>`;
        }
        
        if (ex.options) {
            html += '<div class="options-grid">';
            ex.options.forEach((opt, i) => {
                html += `<button class="option-btn" onclick="selectOption(${i})">${opt}</button>`;
            });
            html += '</div>';
            actionBtn.textContent = "Verificar";
            actionBtn.disabled = true;
            actionBtn.onclick = checkAnswer;
        } else if (ex.answer) {
            html += `<input type="text" id="writingInput" class="writing-input" placeholder="Digite..." oninput="enableCheck()">`;
            actionBtn.textContent = "Verificar";
            actionBtn.disabled = true;
            actionBtn.onclick = checkAnswer;
        } else if (ex.phrase) {
            html += `<button class="record-btn" id="recordBtn" onclick="toggleRecording('${ex.phrase}')"><i class="fa-solid fa-microphone"></i></button>`;
            html += `<p style="text-align:center;color:#777;">Clique e fale</p>`;
            html += `<div id="speakingResult" style="text-align:center;margin-top:1rem;font-weight:700;display:none;"></div>`;
            actionBtn.textContent = "Continuar";
            actionBtn.disabled = true;
            actionBtn.onclick = nextExercise;
        }
        
        html += '</div>';
        container.innerHTML = html;
    }

    window.selectOption = (i) => {
        if (isAnswered) return;
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        document.querySelectorAll('.option-btn')[i].classList.add('selected');
        selectedOption = i;
        actionBtn.disabled = false;
    };

    window.enableCheck = () => {
        const input = document.getElementById('writingInput');
        if (input) actionBtn.disabled = !input.value.trim();
    };

    window.handleAction = () => {
        if (isAnswered) nextExercise();
        else checkAnswer();
    };

    window.checkAnswer = () => {
        if (isAnswered) return;
        isAnswered = true;
        
        const data = tabsData[currentTab];
        const ex = data[currentIndex[currentTab]];
        let correct = false;
        
        if (ex.answer) {
            const input = document.getElementById('writingInput');
            if (input && input.value.trim().toLowerCase() === ex.answer.toLowerCase()) {
                input.style.borderColor = '#58cc02';
                input.style.background = '#dcfce7';
                correct = true;
            } else if (input) {
                input.style.borderColor = '#ff4b4b';
                input.style.background = '#fee2e2';
            }
        } else {
            const btns = document.querySelectorAll('.option-btn');
            if (selectedOption === ex.answer) {
                btns[selectedOption].classList.add('correct');
                correct = true;
            } else {
                btns[selectedOption].classList.add('wrong');
                btns[ex.answer].classList.add('correct');
            }
        }
        
        showFeedback(correct, ex);
    };

    window.playAudio = (text) => {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'en-US';
            u.rate = 0.85;
            const voices = window.speechSynthesis.getVoices();
            const v = voices.find(x => x.lang === 'en-US') || voices.find(x => x.lang.startsWith('en'));
            if (v) u.voice = v;
            window.speechSynthesis.speak(u);
        }
    };

    window.toggleRecording = (phrase) => {
        const btn = document.getElementById('recordBtn');
        const res = document.getElementById('speakingResult');
        if (!btn || !res) return;
        
        if (!btn.classList.contains('recording')) {
            if (!('webkitSpeechRecognition' in window)) {
                alert('Use Chrome ou Edge');
                return;
            }
            const rec = new webkitSpeechRecognition();
            rec.lang = 'en-US';
            btn.classList.add('recording');
            btn.innerHTML = '<i class="fa-solid fa-stop"></i>';
            res.style.display = 'block';
            res.innerHTML = '<span style="color:#1cb0f6;">Ouvindo...</span>';
            
            rec.onresult = (e) => {
                const t = e.results[0][0].transcript.toLowerCase();
                const match = t.includes(phrase) || phrase.includes(t);
                const acc = match ? Math.round(e.results[0][0].confidence * 100) : 0;
                res.innerHTML = `<span style="color:${acc>=60?'#58cc02':'#ff4b4b'}">${acc}% - "${t}"</span>`;
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                if (acc >= 50) {
                    score += 10; streak++;
                    xpDisplay.textContent = String(score);
                    streakDisplay.textContent = String(streak);
                    saveProgress();
                }
                actionBtn.disabled = false;
            };
            rec.onerror = () => {
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                res.innerHTML = '<span style="color:#ff4b4b;">Erro</span>';
            };
            rec.start();
        }
    };

    function showFeedback(correct, ex) {
        document.getElementById('feedbackOverlay').classList.add('show');
        const sheet = document.getElementById('feedbackSheet');
        sheet.classList.remove('correct', 'wrong');
        
        if (correct) {
            sheet.classList.add('correct');
            document.getElementById('feedbackIcon').innerHTML = '<i class="fa-solid fa-check" style="color:#58cc02;"></i>';
            document.getElementById('feedbackTitle').textContent = 'Correto! 🎉';
            document.getElementById('feedbackMsg').textContent = `+10 XP • Sequência: ${streak + 1}`;
            score += 10; streak++;
            xpDisplay.textContent = String(score);
            streakDisplay.textContent = String(streak);
            saveProgress();
        } else {
            sheet.classList.add('wrong');
            document.getElementById('feedbackIcon').innerHTML = '<i class="fa-solid fa-rotate-right" style="color:#ff4b4b;"></i>';
            document.getElementById('feedbackTitle').textContent = 'Tente novamente';
            const ans = ex.options ? ex.options[ex.answer] : (ex.answer || ex.phrase);
            document.getElementById('feedbackMsg').textContent = `Resposta: ${ans}`;
            streak = 0;
            streakDisplay.textContent = '0';
        }
        sheet.classList.add('show');
        actionBtn.style.display = 'none';
    }

    window.closeFeedback = () => {
        document.getElementById('feedbackOverlay').classList.remove('show');
        document.getElementById('feedbackSheet').classList.remove('show');
        nextExercise();
    };

    function nextExercise() {
        currentIndex[currentTab]++;
        saveProgress();
        renderExercise();
        updateProgress();
        actionBtn.style.display = 'block';
    }

    function saveProgress() {
        if (!currentUser) return;
        const data = {};
        ['reading', 'listening', 'speaking', 'writing', 'grammar'].forEach(t => {
            data[`progresso.u02_${t}`] = currentIndex[t];
        });
        updateDoc(doc(db, "usuarios", currentUser.uid), {
            xp: score, streak: streak, ...data
        }).catch(console.error);
    }

    function updateProgress() {
        let total = 0;
        Object.keys(tabsData).forEach(k => {
            if (Array.isArray(tabsData[k])) total += tabsData[k].length;
        });
        
        let completed = 0;
        Object.keys(currentIndex).forEach(k => {
            completed += currentIndex[k];
        });
        
        const pct = total > 0 ? Math.round((completed / total) * 100) : 0;
        document.getElementById('progressBar').style.width = `${pct}%`;
        document.getElementById('progressText').textContent = `${pct}% completo (${completed}/${total})`;
        
        document.querySelectorAll('.tab-btn').forEach(btn => {
            const name = btn.textContent.toLowerCase().split(' ')[0];
            const data = tabsData[name];
            if (data && Array.isArray(data) && currentIndex[name] >= data.length) {
                btn.classList.add('completed');
            }
        });
    }

    window.saveAndExit = async () => {
        actionBtn.disabled = true;
        actionBtn.innerHTML = 'Salvando...';
        await saveProgress();
        window.location.href = 'index.html';
    };

    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = () => {};
    }
</script>
</body>
</html>
