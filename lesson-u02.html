                    totalXP = Number(data.totalXP) || 0;
                    xpDisplay.textContent = String(totalXP);
                    streakDisplay.textContent = String(streak);
                    cefrBadge.textContent = lessonData.unitInfo.level;
                    
                    if (data.progresso) {
                        const prefix = 'u02_';
                        Object.keys(questionIndex).forEach(sec => {

                            if (typeof data.progresso[key] === 'number') questionIndex[sec] = data.progresso[key];

                    userNotes = data.notes?.u02 || {};

    };

    function renderCurrentTab() {
        if (currentTab === 'video') { renderVideo(); return; }
        const section = lessonData.tabs[currentTab];
        const index = questionIndex[currentTab];
        if (index >= section.length) { renderSectionComplete(section[0]?.title || currentTab); return; }
        
        switch(currentTab) {
            case 'reading': renderReading(section[index]); break;
            case 'listening': renderListening(section[index]); break;
            case 'speaking': renderSpeaking(section[index]); break;
            case 'writing': renderWriting(section[index]); break;
            case 'grammar': renderGrammar(section[index]); break;
        }
        updateProgress();
    }

                <p style="font-size:1.1rem;margin-bottom:1rem;color:#475569;">${q.prompt}</p>
                ${q.model ? `<button class="tts-btn" onclick="playAudio('${q.model}')"><i class="fa-solid fa-volume-high"></i> Hear Example</button>` : ''}
                <button class="record-btn" id="recordBtn" onclick="toggleRecording('${q.expected||''}')"><i class="fa-solid fa-microphone"></i></button>
                <p id="recordStatus" style="color:#64748b;margin-bottom:1rem;">Click mic & speak. Auto-stops when you pause.</p>
                <div id="scoreDisplay" class="score-display" style="display:none;"></div>
                ${q.minWords ? `<p style="font-size:0.85rem;color:#64748b;margin-top:1rem;">Minimum ${q.minWords} words</p>` : ''}
            </div>
            <div class="actions">
                <button class="btn btn-retry" onclick="retryQuestion()"><i class="fa-solid fa-rotate-right"></i> Retry</button>
                <button class="btn btn-primary" id="continueBtn" onclick="nextQuestion()" disabled>Continue</button>
                <button class="btn btn-skip" onclick="skipQuestion()">Skip ➡️</button>
            </div>
            <div class="enter-hint">Press <kbd>Enter</kbd> to continue</div>
        `;
    }

    function renderWriting(q) {
        mainContent.innerHTML = `
            <h1 class="section-title">✍️ Writing</h1>
            <p class="section-subtitle">Practice writing</p>
            <div class="difficulty ${q.difficulty}"><i class="fa-solid fa-star"></i> ${q.difficulty.toUpperCase()} • +${q.xp} XP</div>
            <div class="card">
                <h3 style="font-size:1.25rem;font-weight:700;margin-bottom:1rem;">${q.prompt}</h3>
                ${q.example ? `<p style="color:#64748b;font-style:italic;margin-bottom:1rem;">Example: ${q.example}</p>` : ''}
                <textarea class="writing-area" id="writingInput" placeholder="Write your answer..." oninput="updateCharCount('${q.minLength||0}', '${q.maxLength||200}')"></textarea>
                <div class="char-count"><span id="charCount">0</span>${q.maxLength?` / ${q.maxLength}`:''} characters</div>
                <div class="tts-controls"><button class="tts-btn" onclick="readAloud('writingInput')"><i class="fa-solid fa-volume-high"></i> Read My Answer</button></div>
            </div>
            <div class="actions">
                <button class="btn btn-retry" onclick="retryQuestion()"><i class="fa-solid fa-rotate-right"></i> Retry</button>
                <button class="btn btn-primary" id="checkBtn" onclick="checkWriting()" disabled>Submit Answer</button>
                <button class="btn btn-skip" onclick="skipQuestion()">Skip ➡️</button>
            </div>
            <div class="enter-hint">Press <kbd>Enter</kbd> to submit</div>
        `;
    }

    function renderGrammar(q) {
        const exp = q.explanation;
        mainContent.innerHTML = `
            <h1 class="section-title"> Grammar</h1>
            <p class="section-subtitle">Learn & practice</p>
            <div class="difficulty ${q.difficulty}"><i class="fa-solid fa-star"></i> ${q.difficulty.toUpperCase()}</div>
            <div class="card">
                <h3 style="font-size:1.25rem;font-weight:700;margin-bottom:1rem;">${q.title}</h3>
            </div>
            <div class="grammar-explanation">
                <h4><i class="fa-solid fa-book"></i> Complete Explanation</h4>
                <div class="rule"><strong>📖 Rule:</strong> ${exp.theory}</div>
                <div class="formula"><strong>📐 Formula:</strong> ${exp.formula}</div>
                <div><strong> Examples:</strong><ul>${exp.examples.map(e => `<li>${e}</li>`).join('')}</ul></div>
                ${exp.exceptions ? `<div><strong>️ Exceptions:</strong> ${exp.exceptions}</div>` : ''}
                <div class="tip"><strong> Memory Tip:</strong> ${exp.tip}</div>
                <div><strong> When to Use:</strong> ${exp.usage}</div>
            </div>
            <div class="actions">
                <button class="btn btn-primary" onclick="nextQuestion()">Next Topic ️</button>
            </div>
            <div class="enter-hint">Press <kbd>Enter</kbd> to continue</div>
        `;
    }

    // ===== INTERACTIONS =====
    window.selectOption = (i) => { if(isAnswered) return; document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected')); document.querySelectorAll('.option')[i].classList.add('selected'); selectedOption=i; document.getElementById('checkBtn').disabled=false; };
    window.enableCheck = () => { const input=document.getElementById('fillInput'); if(input) document.getElementById('checkBtn').disabled=!input.value.trim(); };
    window.updateCharCount = (min,max) => { const input=document.getElementById('writingInput'), count=document.getElementById('charCount'); if(input&&count){count.textContent=input.value.length; document.getElementById('checkBtn').disabled=input.value.length<(min||0);} };
    
    window.toggleTTS = (text) => {
        const btn=document.getElementById('ttsBtn'); if(!btn) return;
        if(ttsPlaying){ if(currentTTS) currentTTS.cancel(); ttsPlaying=false; btn.classList.remove('playing'); btn.innerHTML='<i class="fa-solid fa-volume-high"></i> Listen'; }
        else { currentTTS=speakText(text); if(currentTTS){ ttsPlaying=true; btn.classList.add('playing'); btn.innerHTML='<i class="fa-solid fa-stop"></i> Stop'; } }
    };
    
    window.playAudio = (text) => { const btn=document.getElementById('audioBtn'); if(btn){ btn.classList.add('playing'); setTimeout(()=>btn.classList.remove('playing'),1000); } speakText(text); };
    window.readAloud = (id) => { const el=document.getElementById(id); if(el?.value) speakText(el.value); };
    window.toggleTranscript = () => { const el=document.getElementById('transcript'); if(el) el.classList.toggle('show'); };
    
    function speakText(text) {
        if(!('speechSynthesis' in window)){ alert('TTS not supported'); return null; }
        window.speechSynthesis.cancel();
        const u=new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g,''));
        u.lang=voice; u.rate=ttsRate;
        const voices=window.speechSynthesis.getVoices(), v=voices.find(x=>x.lang===voice);
        if(v) u.voice=v;
        window.speechSynthesis.speak(u);
        return window.speechSynthesis;
    }
    
    window.changeSpeed = (rate) => { ttsRate=parseFloat(rate); };

    window.toggleRecording = (expected) => {
        const btn=document.getElementById('recordBtn'), status=document.getElementById('recordStatus'), scoreDiv=document.getElementById('scoreDisplay'), continueBtn=document.getElementById('continueBtn');
        if(!btn) return;
        if(!btn.classList.contains('recording')){
            const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
            if(!SR){ alert('Use Chrome/Edge'); return; }
            recognition=new SR(); recognition.lang=voice; recognition.continuous=false;
            recognition.onspeechend=()=>recognition.stop();
            btn.classList.add('recording'); status.textContent='🎤 Listening...'; if(scoreDiv) scoreDiv.style.display='none'; if(continueBtn) continueBtn.disabled=true;
            recognition.onresult=(e)=>{
                const transcript=e.results[0][0].transcript.trim().toLowerCase(), conf=e.results[0][0].confidence;
                const clean=normalizeText(transcript), exp=normalizeText(expected||'');
                const match=clean.includes(exp)||exp.includes(clean)||clean.replace(/[-\s]/g,'')===exp.replace(/[-\s]/g,'');
                const acc=match?Math.round(conf*100):0;
                if(scoreDiv){ scoreDiv.textContent=`${acc}% Accuracy`; scoreDiv.className=`score-display ${acc>=60?'good':'bad'}`; scoreDiv.style.display='block'; }
                status.textContent=acc>=60?'✅ Great!':'🔄 Try again'; btn.classList.remove('recording');
                if(acc>=50){ addXP(10); if(continueBtn) continueBtn.disabled=false; }
            };
            recognition.onerror=()=>{ btn.classList.remove('recording'); status.textContent='❌ Error. Try again.'; };
            recognition.start();
        }
    };
    
    function normalizeText(t){ const map={'1':'one','2':'two','3':'three','4':'four','5':'five','6':'six','7':'seven','8':'eight','9':'nine','10':'ten','11':'eleven','12':'twelve','13':'thirteen','14':'fourteen','15':'fifteen','20':'twenty','30':'thirty','40':'forty','50':'fifty','100':'one hundred'}; let clean=t.toLowerCase().replace(/[^a-z0-9\s-]/g,''); Object.keys(map).forEach(k=>clean=clean.replace(new RegExp(`\\b${k}\\b`,'g'),map[k])); return clean; }

    // ===== ANSWER CHECKING =====
    window.checkAnswer = () => {
        if(isAnswered||selectedOption===null) return; isAnswered=true;
        const section=lessonData.tabs[currentTab], q=section[questionIndex[currentTab]], options=document.querySelectorAll('.option'), feedback=document.getElementById('feedback');
        const correct=selectedOption===q.answer;
        if(correct){ options[selectedOption].classList.add('correct'); feedback.className='feedback correct show'; feedback.innerHTML=`<strong style="color:#166534;"><i class="fa-solid fa-check"></i> Correct!</strong><br>${q.explanation?.theory||q.explanation||'Well done!'}`; addXP(q.xp); }
        else{ options[selectedOption].classList.add('wrong'); options[q.answer].classList.add('correct'); feedback.className='feedback wrong show'; feedback.innerHTML=`<strong style="color:#991b1b;"><i class="fa-solid fa-xmark"></i> Not quite</strong><br>${q.explanation?.theory||q.explanation||`Correct: ${q.options[q.answer]}`}`; streak=0; streakDisplay.textContent='0'; }
        document.getElementById('checkBtn').disabled=true; document.getElementById('checkBtn').innerHTML=correct?'<i class="fa-solid fa-check"></i> Correct! Press Enter':'<i class="fa-solid fa-xmark"></i> Review & Press Enter';
        saveProgress();
    };

    window.checkWriting = () => {
        const input=document.getElementById('writingInput'); if(!input) return;
        const section=lessonData.tabs.writing, q=section[questionIndex.writing], feedback=document.getElementById('feedback');
        const valid=input.value.trim().length>=(q.minLength||0);
        if(valid){ input.style.borderColor='#22c55e'; feedback.className='feedback correct show'; feedback.innerHTML=`<strong style="color:#166534;"><i class="fa-solid fa-check"></i> Submitted!</strong><br>Great effort!`; addXP(q.xp); document.getElementById('checkBtn').innerHTML='<i class="fa-solid fa-check"></i> Submitted! Press Enter'; }
        else{ input.style.borderColor='#ef4444'; feedback.className='feedback wrong show'; feedback.innerHTML=`<strong style="color:#991b1b;"><i class="fa-solid fa-xmark"></i> Too short</strong><br>Try at least ${q.minLength} characters.`; }
        document.getElementById('checkBtn').disabled=true; saveProgress();
    };

    // ===== NAVIGATION =====
    window.retryQuestion = () => { isAnswered=false; selectedOption=null; renderCurrentTab(); };
    window.nextQuestion = () => { questionIndex[currentTab]++; isAnswered=false; selectedOption=null; hintsUsed=0; saveProgress(); renderCurrentTab(); };
    window.skipQuestion = () => { questionIndex[currentTab]++; isAnswered=false; selectedOption=null; hintsUsed=0; saveProgress(); renderCurrentTab(); };
    window.nextSection = () => { const sections=['reading','listening','speaking','writing','grammar'], i=sections.indexOf(currentTab); if(i<sections.length-1) switchTab(sections[i+1]); else showCompletion(); };

    function showCompletion() {
        const bonus=totalXP>=600?200:0, final=totalXP+600+bonus;
        mainContent.innerHTML = `
            <div class="completion-screen">
                <i class="fa-solid fa-trophy"></i>
                <h2 style="font-size:2rem;font-weight:800;margin-bottom:0.5rem;">🎉 Lesson Complete!</h2>
                <p style="color:#64748b;margin-bottom:1rem;">${lessonData.unitInfo.theme} - ${lessonData.unitInfo.level}</p>
                <div class="xp-reward">+600 XP</div>
                ${bonus>0?`<p style="color:#f59e0b;font-weight:700;">+${bonus} XP Perfect Score!</p>`:''}
                
                <div class="report-card">
                    <h3 style="font-size:1.5rem;font-weight:800;margin-bottom:1rem;">📊 Performance Report</h3>
                    <div class="report-grid">
                        <div class="report-item">
                            <div class="report-value">${final}</div>
                            <div class="report-label">Total XP Earned</div>
                        </div>
                        <div class="report-item">
                            <div class="report-value">${streak}</div>
                            <div class="report-label">Day Streak</div>
                        </div>
                        <div class="report-item">
                            <div class="report-value">60</div>
                            <div class="report-label">Questions Completed</div>
                        </div>
                        <div class="report-item">
                            <div class="report-value">${Math.round((final/800)*100)}%</div>
                            <div class="report-label">Success Rate</div>
                        </div>
                    </div>
                    <div style="margin-top:2rem;">
                        <h4 style="font-weight:700;margin-bottom:1rem;">Skills Breakdown:</h4>
                        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1rem;">
                            <div style="text-align:center;padding:1rem;background:#f8fafc;border-radius:8px;">
                                <div style="font-weight:700;color:#22c55e;">Reading</div>
                                <div style="font-size:1.5rem;font-weight:800;">10/10</div>
                            </div>
                            <div style="text-align:center;padding:1rem;background:#f8fafc;border-radius:8px;">
                                <div style="font-weight:700;color:#3b82f6;">Listening</div>
                                <div style="font-size:1.5rem;font-weight:800;">15/15</div>
                            </div>
                            <div style="text-align:center;padding:1rem;background:#f8fafc;border-radius:8px;">
                                <div style="font-weight:700;color:#f59e0b;">Speaking</div>
                                <div style="font-size:1.5rem;font-weight:800;">10/10</div>
                            </div>
                            <div style="text-align:center;padding:1rem;background:#f8fafc;border-radius:8px;">
                                <div style="font-weight:700;color:#ef4444;">Writing</div>
                                <div style="font-size:1.5rem;font-weight:800;">10/10</div>
                            </div>
                            <div style="text-align:center;padding:1rem;background:#f8fafc;border-radius:8px;">
                                <div style="font-weight:700;color:#8b5cf6;">Grammar</div>
                                <div style="font-size:1.5rem;font-weight:800;">10/10</div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <p style="color:#64748b;margin:2rem 0;">Progress saved automatically!</p>
                <div class="actions" style="justify-content:center;">
                    <button class="btn btn-primary" onclick="goHome()"><i class="fa-solid fa-house"></i> Back to Home</button>
                </div>
            </div>
        `;
        if(currentUser) updateDoc(doc(db,"usuarios",currentUser.uid),{[`progresso.u02_completed`]:true,[`progresso.u02_date`]:new Date().toISOString(),[`progresso.u02_score`]:final}).catch(console.error);
    }

    // ===== XP & PROGRESS =====
    function addXP(amount){ totalXP+=amount; score+=amount; streak++; xpDisplay.textContent=String(totalXP); streakDisplay.textContent=String(streak); checkBadges(); }
    function checkBadges(){ if(streak>=7) unlockBadge('streak_master'); if(totalXP>=1000) unlockBadge('xp_1000'); }
    function unlockBadge(id){ console.log(`Badge: ${id}`); }
    
    function updateProgress(){
        const total=60; let done=0; Object.values(questionIndex).forEach(v=>done+=v);
        const pct=Math.round((done/total)*100);
        progressBar.style.width=`${pct}%`; currentQEl.textContent=String(done); totalQEl.textContent=String(total); progressPercentEl.textContent=`${pct}%`;
        document.querySelectorAll('.tab-btn').forEach((btn,i)=>{ const sections=['video','reading','listening','speaking','writing','grammar'], sec=sections[i]; if(sec!=='video'&&questionIndex[sec]>=lessonData.tabs[sec].length) btn.classList.add('completed'); });
    }

    function saveProgress(){
        if(!currentUser) return;
        const data={}; const prefix='u02_';
        Object.keys(questionIndex).forEach(sec=>{ data[`progresso.${prefix}${sec}`]=questionIndex[sec]; });
        updateDoc(doc(db,"usuarios",currentUser.uid),{ xp:score, streak:streak, totalXP:totalXP, ...data, 'progresso.lastUpdate':new Date().toISOString(), 'notes':{ u02:userNotes } }).catch(console.error);
    }

    // ===== HINTS =====
    window.showHint = () => {
        if(hintsUsed>=3){ alert('Max hints reached'); return; }
        const cost=hintsUsed===0?5:hintsUsed===1?10:20;
        if(totalXP<cost){ alert(`Need ${cost} XP`); return; }
        totalXP-=cost; hintsUsed++; xpDisplay.textContent=String(totalXP);
        const hints=['Think about the number words you\'ve learned.','Remember: hyphens for 21-99!','Listen for the stress pattern.'];
        document.getElementById('hintText').textContent=hints[hintsUsed-1]||'Review the lesson.';
        document.getElementById('hintBox').classList.add('show');
        saveProgress();
    };

    // ===== UTILS =====
    window.goHome = () => { saveProgress(); window.location.href='index.html'; };
    window.toggleSettings = () => document.getElementById('settingsMenu').classList.toggle('show');
    window.toggleVoice = () => { voice=voice==='en-US'?'en-GB':'en-US'; document.getElementById('voiceLabel').textContent=voice==='en-US'?'US':'UK'; saveProgress(); };
    window.showNotes = () => alert('Notes saved per question. Review in each question\'s notes section.');
    window.resetProgress = () => { if(confirm('Restart lesson?')){ Object.keys(questionIndex).forEach(k=>questionIndex[k]=0); score=0; streak=0; saveProgress(); renderCurrentTab(); } };

    document.addEventListener('click',(e)=>{ if(!e.target.closest('.menu-btn')&&!e.target.closest('.settings-menu')) document.getElementById('settingsMenu').classList.remove('show'); });

    document.addEventListener('keydown',(e)=>{
        if(e.key==='Enter'&&!e.repeat&&currentTab!=='video'){
            e.preventDefault();
            const checkBtn=document.getElementById('checkBtn'), continueBtn=document.getElementById('continueBtn');
            if(checkBtn&&!checkBtn.disabled&&!isAnswered) checkAnswer();
            else if((checkBtn&&checkBtn.textContent.includes('Correct'))||(continueBtn&&!continueBtn.disabled)){
                if(['speaking','writing','grammar'].includes(currentTab)) nextQuestion();
                else{ questionIndex[currentTab]++; isAnswered=false; selectedOption=null; hintsUsed=0; saveProgress(); renderCurrentTab(); }
            }
        }
    });

    if('speechSynthesis' in window) window.speechSynthesis.onvoiceschanged=()=>{};
</script>
</body>
</html>
