<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>U02: Numbers 1-100 | EnglishPath</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --border: #334155;
            --text: #f1f5f9; --primary: #22c55e; --primary-dark: #16a34a;
            --danger: #ef4444; --warning: #f59e0b;
        }
        [data-theme="light"] {
            --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0;
            --text: #0f172a;
        }
        * { box-sizing: border-box; margin: 0; }
        html, body { 
            font-family: 'Nunito', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            height: 100%; 
            overflow: hidden; /* IMPEDIR SCROLL NA PAGINA INTEIRA */
            touch-action: manipulation;
        }
        
        /* LAYOUT PRINCIPAL */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh; /* Para mobile moderno */
        }
        
        .header {
            padding: 1rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-shrink: 0;
        }
        
        .progress-bar {
            flex: 1;
            height: 16px;
            background: var(--border);
            border-radius: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 8px;
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* AREA DE CONTEUDO (Onde a pergunta aparece) */
        .content-area {
            flex: 1;
            overflow-y: auto; /* Permitir scroll apenas se o teclado cobrir em mobile */
            padding: 1rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        
        /* PERGUNTA */
        .question-title {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        
        /* OPÇÕES */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
            width: 100%;
        }
        @media (min-width: 640px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
        }
        
        .option-btn {
            padding: 1.25rem;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            box-shadow: 0 4px 0 var(--border);
            user-select: none;
        }
        .option-btn:active { transform: translateY(4px); box-shadow: none; }
        .option-btn.selected {
            border-color: var(--primary);
            background: rgba(34,197,94,0.1);
            box-shadow: 0 4px 0 var(--primary);
        }
        .option-btn.correct {
            border-color: var(--primary);
            background: rgba(34,197,94,0.2);
            box-shadow: 0 4px 0 var(--primary);
        }
        .option-btn.wrong {
            border-color: var(--danger);
            background: rgba(239,68,68,0.2);
            box-shadow: 0 4px 0 var(--danger);
            animation: shake 0.5s;
        }
        
        /* VIDEO AREA */
        .video-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16/9;
            background: #000;
        }
        .video-wrapper iframe { width: 100%; height: 100%; }
        
        /* FOOTER / BARRA DE AÇÃO */
        .footer {
            padding: 1rem;
            border-top: 1px solid var(--border);
            background: var(--card);
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        /* FEEDBACK SHEET (Sobe de baixo) */
        .feedback-sheet {
            position: fixed;
            bottom: -200px;
            left: 0;
            right: 0;
            padding: 1.5rem;
            border-radius: 24px 24px 0 0;
            transition: bottom 0.3s ease;
            z-index: 50;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            max-width: 600px;
            margin: 0 auto;
        }
        .feedback-sheet.show { bottom: 0; }
        .feedback-sheet.correct { background: #dcfce7; color: #14532d; }
        .feedback-sheet.wrong { background: #fee2e2; color: #7f1d1d; }
        
        .action-btn {
            width: 100%;
            padding: 1rem;
            border-radius: 16px;
            font-weight: 800;
            font-size: 1.1rem;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            transition: transform 0.1s;
        }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-check { background: var(--primary); color: white; }
        .btn-check:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-continue { background: var(--primary); color: white; }
        .btn-next { background: var(--primary); color: white; }
        
        /* AUDIO BUTTON */
        .audio-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 16px;
            font-size: 2rem;
            cursor: pointer;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.3);
        }
        .audio-btn:active { transform: translateY(4px); box-shadow: none; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        /* INPUT WRITING */
        .writing-input {
            width: 100%;
            padding: 1rem;
            font-size: 1.2rem;
            border-radius: 16px;
            border: 2px solid var(--border);
            background: var(--card);
            color: var(--text);
            text-align: center;
            margin-bottom: 1rem;
        }
        .writing-input:focus { outline: none; border-color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <!-- HEADER -->
    <div class="header">
        <a href="a1.html" class="text-2xl text-muted hover:text-primary">
            <i class="fa-solid fa-xmark"></i>
        </a>
        <div class="progress-bar">
            <div id="progressBar" class="progress-fill" style="width: 0%"></div>
        </div>
        <i class="fa-solid fa-heart text-red-500 text-xl"></i>
    </div>

    <!-- CONTENT AREA (Dinâmico) -->
    <div id="gameArea" class="content-area">
        <!-- Conteúdo injetado via JS -->
    </div>

    <!-- FOOTER -->
    <div id="footerBar" class="footer">
        <button id="checkBtn" class="action-btn btn-check" onclick="checkAnswer()" disabled>
            Verificar
        </button>
    </div>
</div>

<!-- FEEDBACK SHEET -->
<div id="feedbackSheet" class="feedback-sheet">
    <div class="flex items-center gap-3">
        <div id="feedbackIcon" class="w-12 h-12 rounded-full flex items-center justify-center text-2xl bg-white"></div>
        <div>
            <h3 id="feedbackTitle" class="font-bold text-xl"></h3>
            <p id="feedbackMsg" class="text-sm"></p>
        </div>
    </div>
    <button id="continueBtn" class="action-btn btn-continue" onclick="nextQuestion()">
        Continuar
    </button>
</div>

<script type="module">
    // DADOS DAS 20 QUESTÕES (Misto de Reading, Listening, Grammar, Writing)
    const questions = [
        // VIDEO INTRO
        {
            type: 'video',
            videoId: 'YuXFxvTbviI',
            title: 'Assista ao vídeo para aprender os números!'
        },
        // READING 1
        {
            type: 'choice',
            question: 'Como se escreve o número 25 em inglês?',
            options: ['Twenty-five', 'Two-five', 'Twenty-fifth', 'Five-twenty'],
            answer: 0
        },
        // LISTENING 1
        {
            type: 'listening',
            textToSpeak: 'Fifteen',
            question: 'Qual número você ouviu?',
            options: ['5', '50', '15', '16'],
            answer: 2
        },
        // GRAMMAR 1
        {
            type: 'choice',
            question: 'Qual é a forma ordinal de "One" (1º)?',
            options: ['Oneth', 'First', 'One', 'Firstly'],
            answer: 1
        },
        // WRITING 1
        {
            type: 'writing',
            question: 'Escreva em inglês: "Dez" (número)',
            answer: 'ten'
        },
        // READING 2
        {
            type: 'choice',
            question: 'Como se escreve 100?',
            options: ['One thousand', 'Ten tens', 'One hundred', 'Hundred one'],
            answer: 2
        },
        // LISTENING 2
        {
            type: 'listening',
            textToSpeak: 'Forty-two',
            question: 'Qual número foi falado?',
            options: ['42', '24', '14', '402'],
            answer: 0
        },
        // GRAMMAR 2
        {
            type: 'choice',
            question: 'Qual está escrito corretamente?',
            options: ['Fourty', 'Fourty-two', 'Forty', 'Fort'],
            answer: 2
        },
        // WRITING 2
        {
            type: 'writing',
            question: 'Escreva em inglês: "Cinco" (número)',
            answer: 'five'
        },
        // LISTENING 3
        {
            type: 'listening',
            textToSpeak: 'Ninety-nine',
            question: 'O que você ouviu?',
            options: ['19', '90', '9', '99'],
            answer: 3
        }
    ];

    let currentQIndex = 0;
    let selectedOption = null;
    let score = 0;
    let isAnswered = false;

    const gameArea = document.getElementById('gameArea');
    const checkBtn = document.getElementById('checkBtn');
    const feedbackSheet = document.getElementById('feedbackSheet');
    const progressBar = document.getElementById('progressBar');

    // INIT
    function loadQuestion() {
        if (currentQIndex >= questions.length) {
            showCompletion();
            return;
        }

        const q = questions[currentQIndex];
        isAnswered = false;
        selectedOption = null;
        checkBtn.disabled = true;
        checkBtn.style.display = 'block';
        feedbackSheet.classList.remove('show');
        
        // Update Progress
        const pct = (currentQIndex / questions.length) * 100;
        progressBar.style.width = `${pct}%`;

        // Render Content
        gameArea.innerHTML = ''; // Clear

        if (q.type === 'video') {
            renderVideo(q);
        } else {
            renderQuestion(q);
        }
    }

    function renderVideo(q) {
        const html = `
            <h2 class="text-center font-bold text-xl mb-4">📹 Video Lesson</h2>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/${q.videoId}" frameborder="0" allowfullscreen></iframe>
            </div>
            <p class="text-center mt-4 text-muted">${q.title}</p>
        `;
        gameArea.innerHTML = html;
        checkBtn.textContent = "Começar";
        checkBtn.onclick = nextQuestion;
        checkBtn.disabled = false;
    }

    function renderQuestion(q) {
        let html = `<h2 class="question-title">${q.question}</h2>`;
        
        if (q.type === 'listening') {
            html += `<button class="audio-btn" onclick="playAudio('${q.textToSpeak}')"><i class="fa-solid fa-volume-high"></i></button>`;
        }

        html += `<div class="options-grid">`;
        
        if (q.type === 'choice' || q.type === 'listening') {
            q.options.forEach((opt, i) => {
                html += `<button class="option-btn" onclick="selectOption(this, ${i})">${opt}</button>`;
            });
        } else if (q.type === 'writing') {
            html = `<h2 class="question-title">${q.question}</h2>
                    <input type="text" id="writingInput" class="writing-input" placeholder="Type here..." oninput="enableCheck()">
                    <div class="options-grid"></div>`;
        }

        html += `</div>`;
        gameArea.innerHTML = html;

        // Bind check function for non-video
        if (q.type !== 'video') {
            checkBtn.textContent = "Verificar";
            checkBtn.onclick = checkAnswer;
            checkBtn.classList.remove('btn-continue');
            checkBtn.classList.add('btn-check');
        }
    }

    window.selectOption = (btn, index) => {
        if (isAnswered) return;
        document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedOption = index;
        checkBtn.disabled = false;
    };

    window.enableCheck = () => {
        const val = document.getElementById('writingInput').value.trim();
        checkBtn.disabled = val.length === 0;
    };

    window.checkAnswer = () => {
        if (isAnswered) return;
        isAnswered = true;
        
        const q = questions[currentQIndex];
        let isCorrect = false;

        if (q.type === 'choice' || q.type === 'listening') {
            const buttons = document.querySelectorAll('.option-btn');
            if (selectedOption === q.answer) {
                buttons[selectedOption].classList.add('correct');
                isCorrect = true;
            } else {
                buttons[selectedOption].classList.add('wrong');
                buttons[q.answer].classList.add('correct'); // Show correct one
            }
        } else if (q.type === 'writing') {
            const input = document.getElementById('writingInput');
            if (input.value.trim().toLowerCase() === q.answer.toLowerCase()) {
                input.style.borderColor = 'var(--primary)';
                input.style.background = 'rgba(34,197,94,0.1)';
                isCorrect = true;
            } else {
                input.style.borderColor = 'var(--danger)';
                input.style.background = 'rgba(239,68,68,0.1)';
            }
        }

        showFeedback(isCorrect);
    };

    function showFeedback(isCorrect) {
        const sheet = document.getElementById('feedbackSheet');
        const title = document.getElementById('feedbackTitle');
        const msg = document.getElementById('feedbackMsg');
        const icon = document.getElementById('feedbackIcon');
        const btn = document.getElementById('continueBtn');

        sheet.classList.remove('correct', 'wrong');
        
        if (isCorrect) {
            sheet.classList.add('correct');
            title.textContent = "Correto!";
            msg.textContent = "+10 XP";
            icon.innerHTML = '<i class="fa-solid fa-check"></i>';
            icon.className = 'w-12 h-12 rounded-full flex items-center justify-center text-2xl text-green-600 bg-white';
            score += 10;
        } else {
            sheet.classList.add('wrong');
            title.textContent = "Incorreto";
            msg.textContent = "A resposta correta era: " + (questions[currentQIndex].type === 'choice' || questions[currentQIndex].type === 'listening' ? questions[currentQIndex].options[questions[currentQIndex].answer] : questions[currentQIndex].answer);
            icon.innerHTML = '<i class="fa-solid fa-xmark"></i>';
            icon.className = 'w-12 h-12 rounded-full flex items-center justify-center text-2xl text-red-600 bg-white';
        }

        sheet.classList.add('show');
        checkBtn.style.display = 'none'; // Hide footer button
    }

    window.nextQuestion = () => {
        currentQIndex++;
        loadQuestion();
    };

    window.playAudio = (text) => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        speechSynthesis.speak(utterance);
    };

    function showCompletion() {
        gameArea.innerHTML = `
            <div class="text-center">
                <i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-4 animate-bounce"></i>
                <h2 class="text-3xl font-bold mb-2">Lição Completa!</h2>
                <p class="text-xl mb-6">Você ganhou ${score} XP</p>
                <a href="a1.html" class="action-btn btn-next block">Voltar para A1</a>
            </div>
        `;
        document.getElementById('footerBar').style.display = 'none';
        progressBar.style.width = '100%';
    }

    // INICIAR
    loadQuestion();
</script>
</body>
</html>
