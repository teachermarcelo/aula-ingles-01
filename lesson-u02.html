                            if (typeof data.progresso[key] === 'number') {

            case 'reading': renderReading(q); break;

            return null;
        }
        
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g, ''));
        u.lang = voice;
        u.rate = ttsRate;
        
        const voices = window.speechSynthesis.getVoices();
        const v = voices.find(x => x.lang === voice);
        if (v) u.voice = v;
        
        window.speechSynthesis.speak(u);
        return window.speechSynthesis;
    }

    window.toggleRecording = (expectedPhrase) => {
        const btn = document.getElementById('recordBtn');
        const status = document.getElementById('recordStatus');
        const scoreDiv = document.getElementById('scoreDisplay');
        const continueBtn = document.getElementById('continueBtn') || document.getElementById('submitBtn');
        
        if (!btn) return;
        
        if (!btn.classList.contains('recording')) {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) { alert('Use Chrome or Edge for voice recognition'); return; }
            
            recognition = new SR();
            recognition.lang = voice;
            recognition.continuous = false;
            recognition.interimResults = false;
            
            // Auto-stop after 3 seconds of silence
            let silenceStart = null;
            recognition.onaudiostart = () => { silenceStart = Date.now(); };
            recognition.onspeechend = () => { recognition.stop(); };
            
            btn.classList.add('recording');
            status.textContent = '🎤 Listening... Speak now! (Auto-stops when you pause)';
            if (scoreDiv) { scoreDiv.style.display = 'none'; }
            if (continueBtn) continueBtn.disabled = true;
            
            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript.trim().toLowerCase();
                const conf = e.results[0][0].confidence;
                
                // Normalize for comparison
                const clean = normalizeText(transcript);
                const expected = normalizeText(expectedPhrase || '');
                
                const match = clean.includes(expected) || expected.includes(clean) || 
                             clean.replace(/[-\s]/g,'') === expected.replace(/[-\s]/g,'');
                const acc = match ? Math.round(conf * 100) : 0;
                
                if (scoreDiv) {
                    scoreDiv.textContent = `${acc}% Accuracy`;
                    scoreDiv.className = `score-display ${acc >= 60 ? 'good' : 'bad'}`;
                    scoreDiv.style.display = 'block';
                }
                
                status.textContent = acc >= 60 ? '✅ Great job!' : '🔄 Try again';
                btn.classList.remove('recording');
                
                if (acc >= 50) {
                    addXP(10);
                    if (continueBtn) continueBtn.disabled = false;
                }
            };
            
            recognition.onerror = (e) => {
                console.error('Speech error:', e.error);
                btn.classList.remove('recording');
                status.textContent = '❌ Error. Try again.';
            };
            
            recognition.start();
        }
    };

    function normalizeText(text) {
        const map = {
            '1':'one','2':'two','3':'three','4':'four','5':'five','6':'six','7':'seven','8':'eight','9':'nine','10':'ten',
            '11':'eleven','12':'twelve','13':'thirteen','14':'fourteen','15':'fifteen','20':'twenty','30':'thirty',
            '40':'forty','50':'fifty','100':'one hundred'
        };
        let clean = text.toLowerCase().replace(/[^a-z0-9\s-]/g, '');
        Object.keys(map).forEach(k => {
            clean = clean.replace(new RegExp(`\\b${k}\\b`, 'g'), map[k]);
        });
        return clean;
    }

            } else if ((checkBtn && checkBtn.textContent.includes('Correct')) || 
                      (continueBtn && !continueBtn.disabled) ||
                      (submitBtn && !submitBtn.disabled)) {
                if (currentSection === 'speaking' || currentSection === 'writing' || currentSection === 'integrated') {
                    nextQuestion();
                } else {
                    questionIndex[currentSection]++;
                    isAnswered = false;
                    selectedOption = null;
                    hintsUsed = 0;
                    saveProgress();
                    renderCurrentSection();
                }
            }
        }
    });

    // Load voices
    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = () => {};
    }
</script>
</body>
</html>
