    let currentStepIndex = 0;
    let selectedOption = null;
    let score = 0;
    let streak = 0;
    let isAnswered = false;
    let recognition = null;
    let shuffledOptions = [];

    const gameArea = document.getElementById('gameArea');
    const actionBtn = document.getElementById('actionBtn');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const xpDisplay = document.getElementById('xpDisplay');
    const streakDisplay = document.getElementById('streakDisplay');
    const feedbackSheet = document.getElementById('feedbackSheet');

    // ===== SHUFFLE ARRAY =====
    function shuffle(array) {
        const shuffled = [...array];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        return shuffled;
    }

    // ===== THEME =====
    (function() {
        const saved = localStorage.getItem('ep_theme') || 'light';
        document.documentElement.dataset.theme = saved;
    })();

    // ===== KEYBOARD =====
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.repeat) {
            e.preventDefault();
            handleAction();
        }
    });

    // ===== LOAD PROGRESS =====
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            try {
                const userDoc = await getDoc(doc(db, "usuarios", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    score = data.xp || 0;
                    streak = data.streak || 0;
                    xpDisplay.textContent = score;
                    streakDisplay.textContent = streak;
                    if (data['progresso.u02_step'] !== undefined) {
                        currentStepIndex = data['progresso.u02_step'];
                    }
                }
            } catch (error) {
                console.error("Error loading progress:", error);
            }
        }
        renderStep();
    });

    // ===== SAVE PROGRESS =====
    async function saveProgressToFirebase() {
        if (!currentUser) return;
        try {
            const totalSteps = lessonSteps.filter(s => s.type === 'question').length;
            const completedSteps = currentStepIndex;
            const progressPercent = Math.round((completedSteps / totalSteps) * 100);
            
            await updateDoc(doc(db, "usuarios", currentUser.uid), {
                xp: score,
                streak: streak,
                'progresso.u02_step': currentStepIndex,
                'progresso.u02_percent': progressPercent,
                'progresso.u02_lastUpdate': new Date().toISOString()
            });
        } catch (error) {
            console.error("Error saving progress:", error);
        }
    }

    window.saveAndExit = async () => {
        actionBtn.disabled = true;
        actionBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...';
        await saveProgressToFirebase();
        window.location.href = 'index.html';
    };

    // ===== RENDER STEP =====
    function renderStep() {
        if (currentStepIndex >= lessonSteps.length) {
            showCompletion();
            return;
        }

        const step = lessonSteps[currentStepIndex];
        isAnswered = false;
        selectedOption = null;
        feedbackSheet.classList.remove('show');
        
        const questionSteps = lessonSteps.filter(s => s.type === 'question');
        const totalQuestions = questionSteps.length;
        const completedQuestions = lessonSteps.slice(0, currentStepIndex).filter(s => s.type === 'question').length;
        const pct = totalQuestions > 0 ? Math.round((completedQuestions / totalQuestions) * 100) : 0;
        
        progressBar.style.width = `${pct}%`;
        progressText.textContent = `Passo ${currentStepIndex + 1} de ${lessonSteps.length} • ${pct}%`;

        gameArea.innerHTML = '';
        gameArea.className = 'main-content fade-in';

        if (step.type === 'video') renderVideo(step);
        else if (step.type === 'dialogue') renderDialogue(step);
        else if (step.type === 'question') renderQuestion(step);
    }

    function renderVideo(step) {
        gameArea.innerHTML = `
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <span class="skill-badge" style="background: #fee2e2; color: #b91c1c;">
                    <i class="fa-solid fa-video"></i> Video Lesson
                </span>
            </div>
            <div class="video-wrapper">
                <iframe src="https://www.youtube.com/embed/${step.videoId}" frameborder="0" allowfullscreen title="Video lesson"></iframe>
            </div>
            <p style="text-align: center; color: #777; font-size: 1rem;">${step.title}</p>
        `;
        actionBtn.textContent = "Começar Exercícios";
        actionBtn.disabled = false;
        actionBtn.onclick = nextStep;
    }

    function renderDialogue(step) {
        const avatarClass = step.speaker === 'maria' ? 'speaker-maria' : 'speaker-john';
        const icon = step.speaker === 'maria' ? '👩' : '🏻';
        
        gameArea.innerHTML = `
            <div class="dialogue-card">
                <div class="speaker-header">
                    <div class="speaker-avatar ${avatarClass}">${icon}</div>
                    <span class="speaker-name">${step.name}</span>
                    <button class="speaker-listen" onclick="speakText('${step.text.replace(/<[^>]*>/g, '')}')" aria-label="Ouvir">
                        <i class="fa-solid fa-volume-high"></i>
                    </button>
                </div>
                <div class="speech-bubble">
                    <p>${step.text}</p>
                </div>
            </div>
        `;
        actionBtn.textContent = "Continuar";
        actionBtn.disabled = false;
        actionBtn.onclick = nextStep;
    }

    function renderQuestion(step) {
        const skillClasses = {
            reading: 'skill-reading',
            listening: 'skill-listening',
            speaking: 'skill-speaking',
            writing: 'skill-writing',
            grammar: 'skill-grammar'
        };
        const skillIcons = {
            reading: '<i class="fa-solid fa-book"></i>',
            listening: '<i class="fa-solid fa-headphones"></i>',
            speaking: '<i class="fa-solid fa-microphone"></i>',
            writing: '<i class="fa-solid fa-pen"></i>',
            grammar: '<i class="fa-solid fa-graduation-cap"></i>'
        };

        // Shuffle options for randomness
        if (step.options) {
            const originalAnswer = step.options[step.answer];
            shuffledOptions = shuffle(step.options.map((opt, i) => ({ text: opt, isCorrect: i === step.answer })));
            step.shuffledOptions = shuffledOptions;
            step.shuffledAnswer = shuffledOptions.findIndex(o => o.isCorrect);
        }

        let html = `
            <div style="text-align: center; margin-bottom: 1.5rem;">
                <span class="skill-badge ${skillClasses[step.skill]}">
                    ${skillIcons[step.skill]} ${step.skill.charAt(0).toUpperCase() + step.skill.slice(1)}
                </span>
            </div>
        `;

        // Language badge
        if (step.question.includes('inglês') || step.question.includes('Diga em') || step.question.includes('Escreva em inglês')) {
            html += `<div style="text-align:center;"><span class="lang-badge lang-en"><i class="fa-solid fa-flag-usa"></i> Inglês</span></div>`;
        } else if (step.question.includes('português') || step.question.includes('traduza')) {
            html += `<div style="text-align:center;"><span class="lang-badge lang-pt"><i class="fa-solid fa-flag"></i> Português</span></div>`;
        }

        html += `<h2 class="question-title">${step.question}</h2>`;

        if (step.textToSpeak) {
            html += `<button class="audio-btn" onclick="speakText('${step.textToSpeak}')" aria-label="Ouvir áudio"><i class="fa-solid fa-volume-high"></i></button>`;
        }

        if (step.options) {
            html += `<div class="options-grid">`;
            shuffledOptions.forEach((opt, i) => {
                html += `<div class="option-card" onclick="selectOption(this, ${i})" role="button" tabindex="0">${opt.text}</div>`;
            });
            html += `</div>`;
        } else if (step.expectedPhrase) {
            html += `
                <button class="record-btn" id="recordBtn" onclick="toggleRecording('${step.expectedPhrase}')" aria-label="Gravar voz">
                    <i class="fa-solid fa-microphone"></i>
                </button>
                <p style="text-align: center; color: #777; margin-bottom: 1rem;">Clique no microfone e fale claramente</p>
                <div id="speakingScore" style="text-align: center; font-weight: 700; display: none;"></div>
            `;
        } else if (step.answer && !step.options) {
            html += `
                <input type="text" id="writingInput" class="writing-input" placeholder="Digite sua resposta em inglês..." oninput="enableCheck()" autocomplete="off" autocapitalize="off">
            `;
        }

        gameArea.innerHTML = html;

        actionBtn.textContent = "Verificar";
        actionBtn.className = 'action-btn btn-check';
        actionBtn.onclick = checkAnswer;
        actionBtn.disabled = true;
        
        if (step.answer && !step.options) {
            setTimeout(() => {
                const input = document.getElementById('writingInput');
                if (input) input.focus();
            }, 100);
        }
    }

    window.selectOption = (el, index) => {
        if (isAnswered) return;
        document.querySelectorAll('.option-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        selectedOption = index;
        actionBtn.disabled = false;
    };

    window.enableCheck = () => {
        const val = document.getElementById('writingInput')?.value.trim();
        actionBtn.disabled = !val || val.length === 0;
    };

    window.handleAction = () => {
        if (isAnswered) nextStep();
        else checkAnswer();
    };

    window.checkAnswer = () => {
        if (isAnswered) return;
        isAnswered = true;
        
        const step = lessonSteps[currentStepIndex];
        let isCorrect = false;

        if (step.options) {
            const cards = document.querySelectorAll('.option-card');
            const correctIndex = step.shuffledAnswer;
            if (selectedOption === correctIndex) {
                cards[selectedOption].classList.add('correct');
                isCorrect = true;
            } else {
                cards[selectedOption].classList.add('wrong');
                cards[correctIndex].classList.add('correct');
            }
        } else if (step.answer && !step.options) {
            const input = document.getElementById('writingInput');
            if (input.value.trim().toLowerCase() === step.answer.toLowerCase()) {
                input.style.borderColor = '#58cc02';
                input.style.background = '#dcfce7';
                isCorrect = true;
            } else {
                input.style.borderColor = '#ff4b4b';
                input.style.background = '#fee2e2';
            }
        } else if (step.expectedPhrase) {
            return;
        }

        showFeedback(isCorrect, step);
    };

    window.toggleRecording = (expectedPhrase) => {
        const btn = document.getElementById('recordBtn');
        const scoreDiv = document.getElementById('speakingScore');
        
        if (!btn.classList.contains('recording')) {
            if (!('webkitSpeechRecognition' in window)) {
                alert('Use Chrome ou Edge para reconhecimento de voz.');
                return;
            }
            
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = false;
            recognition.interimResults = false;
            
            btn.classList.add('recording');
            btn.innerHTML = '<i class="fa-solid fa-stop"></i>';
            scoreDiv.style.display = 'block';
            scoreDiv.innerHTML = '<span style="color: #1cb0f6;"><i class="fa-solid fa-spinner fa-spin"></i> Ouvindo...</span>';
            
            recognition.onresult = (event) => {
                let transcript = event.results[0][0].transcript.trim().toLowerCase();
                const confidence = event.results[0][0].confidence;
                
                const numMap = {
                    '0':'zero','1':'one','2':'two','3':'three','4':'four','5':'five',
                    '6':'six','7':'seven','8':'eight','9':'nine','10':'ten',
                    '11':'eleven','12':'twelve','13':'thirteen','14':'fourteen','15':'fifteen',
                    '16':'sixteen','17':'seventeen','18':'eighteen','19':'nineteen',
                    '20':'twenty','21':'twenty-one','22':'twenty-two','23':'twenty-three',
                    '24':'twenty-four','25':'twenty-five','26':'twenty-six','27':'twenty-seven',
                    '28':'twenty-eight','29':'twenty-nine','30':'thirty',
                    '40':'forty','50':'fifty','60':'sixty','70':'seventy','80':'eighty',
                    '90':'ninety','100':'one hundred'
                };
                
                Object.keys(numMap).forEach(num => {
                    transcript = transcript.replace(new RegExp(`\\b${num}\\b`, 'g'), numMap[num]);
                });
                
                transcript = transcript.replace(/[.,!?]/g, '').trim();
                const expected = expectedPhrase.toLowerCase().replace(/[.,!?]/g, '');
                
                const isMatch = transcript.includes(expected) || expected.includes(transcript) ||
                               transcript.replace(/[-\s]/g, '') === expected.replace(/[-\s]/g, '');
                
                const accuracy = Math.round((isMatch ? 1 : 0) * confidence * 100);
                
                scoreDiv.innerHTML = `
                    <div style="margin-bottom: 0.5rem;">
                        <span style="color: ${accuracy >= 60 ? '#58cc02' : '#ff4b4b'}; font-size: 1.1rem;">
                            ${accuracy}% de precisão
                        </span>
                    </div>
                    <div style="font-size: 0.85rem; color: #777;">Você disse: "${transcript}"</div>
                `;
                
                showFeedback(accuracy >= 50, lessonSteps[currentStepIndex]);
                
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
            };
            
            recognition.onerror = () => {
                btn.classList.remove('recording');
                btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                scoreDiv.innerHTML = '<span style="color: #ff4b4b;">Erro ao ouvir. Tente novamente.</span>';
            };
            
            recognition.start();
        }
    };

    function showFeedback(isCorrect, step) {
        const icon = document.getElementById('feedbackIcon');
        const title = document.getElementById('feedbackTitle');
        const msg = document.getElementById('feedbackMsg');
        const explanation = document.getElementById('feedbackExplanation');
        const retryBtn = document.getElementById('retryBtn');
        const continueBtn = document.getElementById('continueBtn');

        feedbackSheet.classList.remove('correct', 'wrong');
        
        if (isCorrect) {
            feedbackSheet.classList.add('correct');
            icon.innerHTML = '<i class="fa-solid fa-check" style="color: #58cc02;"></i>';
            title.textContent = "Correto! 🎉";
            title.style.color = '#15803d';
            msg.textContent = `+10 XP • Sequência: ${streak + 1}`;
            explanation.classList.add('hidden');
            retryBtn.classList.add('hidden');
            
            score += 10;
            streak++;
            xpDisplay.textContent = score;
            streakDisplay.textContent = streak;
            
            saveProgressToFirebase();
            if (currentUser) {
                updateDoc(doc(db, "usuarios", currentUser.uid), {
                    xp: score,
                    streak: streak
                }).catch(console.error);
            }
        } else {
            feedbackSheet.classList.add('wrong');
            icon.innerHTML = '<i class="fa-solid fa-rotate-right" style="color: #ff4b4b;"></i>';
            title.textContent = "Não foi dessa vez 💪";
            title.style.color = '#b91c1c';
            
            let correctAnswer = '';
            if (step.options) correctAnswer = step.shuffledOptions ? step.shuffledOptions.find(o => o.isCorrect)?.text : step.options[step.answer];
            else if (step.answer) correctAnswer = step.answer;
            else if (step.expectedPhrase) correctAnswer = step.expectedPhrase;
            
            msg.textContent = `Resposta correta: ${correctAnswer}`;
            
            // Show explanation
            if (step.explanation) {
                explanation.textContent = `💡 ${step.explanation}`;
                explanation.classList.remove('hidden');
            } else {
                const skillExplanations = explanations[step.skill] || explanations.reading;
                explanation.textContent = skillExplanations[Math.floor(Math.random() * skillExplanations.length)];
                explanation.classList.remove('hidden');
            }
            
            retryBtn.classList.remove('hidden');
            
            streak = 0;
            streakDisplay.textContent = streak;
        }

        feedbackSheet.classList.add('show');
        actionBtn.style.display = 'none';
    }

    window.retryCurrent = () => {
        feedbackSheet.classList.remove('show');
        isAnswered = false;
        selectedOption = null;
        renderStep();
        actionBtn.style.display = 'block';
    };

    window.nextStep = () => {
        feedbackSheet.classList.remove('show');
        currentStepIndex++;
        saveProgressToFirebase();
        setTimeout(() => {
            renderStep();
            actionBtn.style.display = 'block';
        }, 300);
    };

    window.speakText = (text) => {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel(); // Stop any current speech
            const utterance = new SpeechSynthesisUtterance(text.replace(/<[^>]*>/g, ''));
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            utterance.pitch = 1;
            
            // Try to get a good English voice
            const voices = window.speechSynthesis.getVoices();
            const englishVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Female')) ||
                                voices.find(v => v.lang.startsWith('en-US')) ||
                                voices.find(v => v.lang.startsWith('en'));
            if (englishVoice) utterance.voice = englishVoice;
            
            window.speechSynthesis.speak(utterance);
        }
    };

    // Load voices
    if ('speechSynthesis' in window) {
        window.speechSynthesis.onvoiceschanged = () => {};
    }

    function showCompletion() {
        const totalQuestions = lessonSteps.filter(s => s.type === 'question').length;
        gameArea.innerHTML = `
            <div style="text-align: center; padding: 2rem 1rem;">
                <div style="font-size: 5rem; margin-bottom: 1.5rem;">🏆</div>
                <h2 style="font-size: 2rem; font-weight: 800; margin-bottom: 0.75rem; color: #58cc02;">
                    Lição Completa!
                </h2>
                <p style="font-size: 1.25rem; margin-bottom: 1.5rem;">Você ganhou <strong style="color: #58cc02;">${score} XP</strong></p>
                
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; max-width: 280px; margin: 0 auto 2rem;">
                    <div style="background: white; padding: 1.25rem; border-radius: 16px; border: 3px solid #58cc02;">
                        <div style="font-size: 1.75rem; font-weight: 800; color: #58cc02;">${streak}</div>
                        <div style="font-size: 0.8rem; color: #777;">Melhor Sequência</div>
                    </div>
                    <div style="background: white; padding: 1.25rem; border-radius: 16px; border: 3px solid #1cb0f6;">
                        <div style="font-size: 1.75rem; font-weight: 800; color: #1cb0f6;">${totalQuestions}</div>
                        <div style="font-size: 0.8rem; color: #777;">Exercícios</div>
                    </div>
                </div>
                
                <p style="color: #777; margin-bottom: 1.5rem;">Progresso salvo automaticamente!</p>
                
                <button onclick="window.location.href='index.html'" class="action-btn btn-continue" style="max-width: 280px; margin: 0 auto;">
                    <i class="fa-solid fa-house mr-2"></i> Voltar para Home
                </button>
            </div>
        `;
        document.querySelector('.bottom-bar').style.display = 'none';
        progressBar.style.width = '100%';
        progressText.textContent = 'Concluído! 🎉';
        
        if (currentUser) {
            updateDoc(doc(db, "usuarios", currentUser.uid), {
                'progresso.u02_completed': true,
                'progresso.u02_date': new Date().toISOString(),
                'progresso.u02_finalScore': score
            }).catch(console.error);
        }
    }
</script>
</body>
</html>
