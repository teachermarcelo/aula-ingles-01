<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>U02: Numbers 1-100 | EnglishPath</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { display: ['Fredoka', 'sans-serif'], body: ['Nunito', 'sans-serif'] } } } };
    </script>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --border: #334155; --text: #f1f5f9; --primary: #22c55e; --danger: #ef4444; --secondary: #3b82f6; }
        [data-theme="light"] { --bg: #f8fafc; --card: #ffffff; --border: #e2e8f0; --text: #0f172a; }
        * { box-sizing: border-box; margin: 0; }
        html, body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); height: 100%; overflow: hidden; }
        .app-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }
        .header { padding: 0.75rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-shrink: 0; background: var(--card); border-bottom: 1px solid var(--border); }
        .progress-bar { flex: 1; height: 16px; background: var(--border); border-radius: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.5s; }
        .content-area { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; max-width: 600px; width: 100%; margin: 0 auto; }
        .dialogue-box { background: var(--card); border: 2px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1rem; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .speaker-avatar { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; flex-shrink: 0; }
        .speaker-maria { background: linear-gradient(135deg, #ec4899, #f472b6); }
        .speaker-john { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
        .speaker-narrator { background: linear-gradient(135deg, #6b7280, #9ca3af); }
        .speech-bubble { padding: 1rem; border-radius: 16px; background: var(--bg); border: 1px solid var(--border); }
        .highlight-number { background: rgba(34,197,94,0.2); color: var(--primary); padding: 0.2rem 0.5rem; border-radius: 8px; font-weight: 800; cursor: pointer; }
        .question-card { background: var(--card); border: 2px solid var(--primary); border-radius: 20px; padding: 1.5rem; margin: 1rem 0; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; margin-top: 1rem; }
        @media (min-width: 640px) { .options-grid { grid-template-columns: 1fr 1fr; } }
        .option-btn { padding: 1.25rem; border-radius: 16px; border: 2px solid var(--border); background: var(--card); color: var(--text); font-weight: 700; cursor: pointer; box-shadow: 0 4px 0 var(--border); transition: all 0.2s; text-align: center; }
        .option-btn:active { transform: translateY(4px); box-shadow: none; }
        .option-btn.selected { border-color: var(--primary); background: rgba(34,197,94,0.1); box-shadow: 0 4px 0 var(--primary); }
        .option-btn.correct { border-color: var(--primary); background: rgba(34,197,94,0.2); }
        .option-btn.wrong { border-color: var(--danger); background: rgba(239,68,68,0.2); animation: shake 0.5s; }
        .audio-btn { background: var(--secondary); color: white; border: none; padding: 1rem; border-radius: 16px; font-size: 2rem; cursor: pointer; margin-bottom: 1rem; width: 100%; box-shadow: 0 4px 0 rgba(0,0,0,0.3); }
        .record-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--danger); color: white; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 1rem auto; cursor: pointer; }
        .record-btn.recording { animation: pulse 1s infinite; }
        @keyframes pulse { 50% { transform: scale(1.1); } }
        .writing-input { width: 100%; padding: 1rem; font-size: 1.2rem; border-radius: 16px; border: 2px solid var(--border); background: var(--card); color: var(--text); text-align: center; margin-bottom: 1rem; }
        .writing-input:focus { outline: none; border-color: var(--primary); }
        .footer { padding: 1rem; border-top: 1px solid var(--border); background: var(--card); flex-shrink: 0; }
        .action-btn { width: 100%; padding: 1rem; border-radius: 16px; font-weight: 800; font-size: 1.1rem; border: none; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        .action-btn:active { transform: translateY(4px); box-shadow: none; }
        .btn-check { background: var(--primary); color: white; }
        .btn-check:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-home { background: var(--border); color: var(--text); margin-top: 0.5rem; font-size: 0.9rem; padding: 0.75rem; }
        .feedback-sheet { position: fixed; bottom: -200px; left: 0; right: 0; padding: 1.5rem; border-radius: 24px 24px 0 0; transition: bottom 0.3s ease; z-index: 50; display: flex; flex-direction: column; gap: 1rem; max-width: 600px; margin: 0 auto; }
        .feedback-sheet.show { bottom: 0; }
        .feedback-sheet.correct { background: #dcfce7; color: #14532d; border: 2px solid #22c55e; }
        .feedback-sheet.wrong { background: #fee2e2; color: #7f1d1d; border: 2px solid #ef4444; }
        .theme-toggle { width: 48px; height: 26px; border-radius: 13px; background: var(--border); position: relative; cursor: pointer; border: none; }
        .theme-toggle::after { content: ''; position: absolute; top: 3px; left: 3px; width: 20px; height: 20px; border-radius: 50%; background: var(--primary); transition: transform 0.3s; }
        [data-theme="light"] .theme-toggle::after { transform: translateX(22px); background: var(--secondary); }
        .tap-hint { text-align: center; color: var(--text-muted); font-size: 0.875rem; margin-top: 0.5rem; }
        .video-wrapper { width: 100%; border-radius: 16px; overflow: hidden; aspect-ratio: 16/9; background: #000; margin-bottom: 1rem; }
        .video-wrapper iframe { width: 100%; height: 100%; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div class="app-container">
    <!-- HEADER -->
    <div class="header">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="Tema"></button>
        <div class="progress-bar"><div id="progressBar" class="progress-fill" style="width: 0%"></div></div>
        <div class="flex items-center gap-2"><i class="fa-solid fa-bolt text-yellow-400"></i><span id="xpDisplay" class="font-bold">0</span></div>
    </div>

    <!-- CONTENT -->
    <div id="gameArea" class="content-area"></div>

    <!-- FOOTER -->
    <div id="footerBar" class="footer">
        <button id="actionBtn" class="action-btn btn-check" onclick="handleAction()" disabled>Clique para continuar</button>
        <p class="tap-hint"><i class="fa-solid fa-hand-pointer mr-1"></i> Clique ou pressione <kbd>Enter</kbd></p>
        <button onclick="saveAndExit()" class="action-btn btn-home"><i class="fa-solid fa-house mr-2"></i> Sair e Salvar Progresso</button>
    </div>
</div>

<!-- FEEDBACK SHEET -->
<div id="feedbackSheet" class="feedback-sheet">
    <div class="flex items-center gap-3">
        <div id="feedbackIcon" class="w-12 h-12 rounded-full flex items-center justify-center text-2xl bg-white"></div>
        <div><h3 id="feedbackTitle" class="font-bold text-xl"></h3><p id="feedbackMsg" class="text-sm"></p></div>
    </div>
    <button id="continueBtn" class="action-btn btn-check" onclick="nextStep()">Continuar</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyCwnWDz0aCImvQNKdW6xzSRjkK_VVomGq4", authDomain: "englishpath-2d558.firebaseapp.com", projectId: "englishpath-2d558", storageBucket: "englishpath-2d558.firebasestorage.app", messagingSenderId: "384301599670", appId: "1:384301599670:web:f16d2adf8a1714fd034f17" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;

    // ===== 51 STEPS: 1 Video + 10x5 Skills =====
    const lessonSteps = [
        { type: 'video', videoId: 'YuXFxvTbviI', title: 'Assista ao vídeo para aprender os números!' },
        
        // === READING (10) ===
        { type: 'dialogue', speaker: 'maria', name: 'Maria', text: 'Hello! I am <span class="highlight-number">Maria</span>.' },
        { type: 'question', skill: 'reading', question: ' Como ela se chama?', options: ['John', 'Maria', 'Ana'], answer: 1 },
        { type: 'dialogue', speaker: 'john', name: 'John', text: 'Hi! I am <span class="highlight-number">John</span>.' },
        { type: 'question', skill: 'reading', question: ' Qual é o nome dele?', options: ['Maria', 'John', 'Peter'], answer: 1 },
        { type: 'dialogue', speaker: 'maria', name: 'Maria', text: 'I live in <span class="highlight-number">Brazil</span>.' },
        { type: 'question', skill: 'reading', question: ' Onde Maria mora?', options: ['USA', 'Brazil', 'England'], answer: 1 },
        { type: 'dialogue', speaker: 'john', name: 'John', text: 'I live in the <span class="highlight-number">USA</span>.' },
        { type: 'question', skill: 'reading', question: ' Onde John mora?', options: ['Brazil', 'USA', 'Canada'], answer: 1 },
        { type: 'dialogue', speaker: 'maria', name: 'Maria', text: 'My favorite color is <span class="highlight-number">blue</span>.' },
        { type: 'question', skill: 'reading', question: '📖 Qual a cor favorita dela?', options: ['Red', 'Blue', 'Green'], answer: 1 },

        // === LISTENING (10) ===
        { type: 'dialogue', speaker: 'john', name: 'John', text: 'Let\'s count numbers!' },
        { type: 'question', skill: 'listening', textToSpeak: 'one', question: ' Qual número?', options: ['1', '10', '11'], answer: 0 },
        { type: 'question', skill: 'listening', textToSpeak: 'five', question: '🎧 O que você ouviu?', options: ['15', '5', '50'], answer: 1 },
        { type: 'question', skill: 'listening', textToSpeak: 'ten', question: ' Qual número?', options: ['10', '11', '12'], answer: 0 },
        { type: 'question', skill: 'listening', textToSpeak: 'twenty', question: '🎧 O que foi dito?', options: ['12', '20', '2'], answer: 1 },
        { type: 'question', skill: 'listening', textToSpeak: 'thirty', question: ' Qual número?', options: ['13', '30', '3'], answer: 1 },
        { type: 'question', skill: 'listening', textToSpeak: 'forty', question: '🎧 O que você ouviu?', options: ['14', '40', '4'], answer: 1 },
        { type: 'question', skill: 'listening', textToSpeak: 'fifty', question: '🎧 Qual número?', options: ['15', '50', '5'], answer: 1 },
        { type: 'question', skill: 'listening', textToSpeak: 'sixty', question: '🎧 O que foi falado?', options: ['16', '60', '6'], answer: 1 },
        { type: 'question', skill: 'listening', textToSpeak: 'seventy', question: '🎧 Qual número?', options: ['17', '70', '7'], answer: 1 },

        // === SPEAKING (10) ===
        { type: 'dialogue', speaker: 'narrator', name: 'Professor', text: 'Now, repeat after me!' },
        { type: 'question', skill: 'speaking', expectedPhrase: 'eighty', question: '🗣️ Diga: "Oitenta"' },
        { type: 'question', skill: 'speaking', expectedPhrase: 'ninety', question: '🗣️ Diga: "Noventa"' },
        { type: 'question', skill: 'speaking', expectedPhrase: 'one hundred', question: '🗣️ Diga: "Cem"' },
        { type: 'question', skill: 'speaking', expectedPhrase: 'eleven', question: '🗣️ Diga: "Onze"' },
        { type: 'question', skill: 'speaking', expectedPhrase: 'twelve', question: '🗣️ Diga: "Doze"' },
        { type: 'question', skill: 'speaking', expectedPhrase: 'thirteen', question: '🗣️ Diga: "Treze"' },
        { type: 'question', skill: 'speaking', expectedPhrase: 'fourteen', question: '🗣️ Diga: "Quatorze"' },
        { type: 'question', skill: 'speaking', expectedPhrase: 'fifteen', question: '️ Diga: "Quinze"' },
        { type: 'question', skill: 'speaking', expectedPhrase: 'sixteen', question: '🗣️ Diga: "Dezesseis"' },

        // === WRITING (10) ===
        { type: 'dialogue', speaker: 'narrator', name: 'Professor', text: 'Now, write the numbers!' },
        { type: 'question', skill: 'writing', question: '✍️ Escreva: 17', answer: 'seventeen' },
        { type: 'question', skill: 'writing', question: '✍️ Escreva: 18', answer: 'eighteen' },
        { type: 'question', skill: 'writing', question: '✍️ Escreva: 19', answer: 'nineteen' },
        { type: 'question', skill: 'writing', question: '✍️ Escreva: 21', answer: 'twenty-one' },
        { type: 'question', skill: 'writing', question: '✍️ Escreva: 22', answer: 'twenty-two' },
        { type: 'question', skill: 'writing', question: '✍️ Escreva: 23', answer: 'twenty-three' },
        { type: 'question', skill: 'writing', question: '✍️ Escreva: 24', answer: 'twenty-four' },
        { type: 'question', skill: 'writing', question: '✍️ Escreva: 25', answer: 'twenty-five' },
        { type: 'question', skill: 'writing', question: '✍️ Escreva: 26', answer: 'twenty-six' },

        // === GRAMMAR (10) ===
        { type: 'dialogue', speaker: 'narrator', name: 'Professor', text: 'Finally, grammar rules!' },
        { type: 'question', skill: 'grammar', question: '📚 Qual a regra para 21-99?', options: ['Sem hífen', 'Com hífen', 'Espaço'], answer: 1 },
        { type: 'question', skill: 'grammar', question: '📚 Como se diz 1º?', options: ['Oneth', 'First', 'One'], answer: 1 },
        { type: 'question', skill: 'grammar', question: '📚 Como se diz 2º?', options: ['Twoth', 'Second', 'Two'], answer: 1 },
        { type: 'question', skill: 'grammar', question: ' Como se diz 3º?', options: ['Threeth', 'Third', 'Three'], answer: 1 },
        { type: 'question', skill: 'grammar', question: '📚 Qual está certo?', options: ['Fourty', 'Forty', 'Forte'], answer: 1 },
        { type: 'question', skill: 'grammar', question: ' Qual está certo?', options: ['Fivety', 'Fifty', 'Five-ty'], answer: 1 },
        { type: 'question', skill: 'grammar', question: ' Como se escreve 100?', options: ['Ten tens', 'One hundred', 'Hundred one'], answer: 1 },
        { type: 'question', skill: 'grammar', question: '📚 Em UK, como diz 105?', options: ['One hundred five', 'One hundred and five', 'One-oh-five'], answer: 1 },
        { type: 'question', skill: 'grammar', question: '📚 Qual é ordinal de 5?', options: ['Fiveth', 'Fifth', 'Five'], answer: 1 },
        
        { type: 'dialogue', speaker: 'maria', name: 'Maria', text: 'Great job! See you later!' }
    ];

    let currentStepIndex = 0;
    let selectedOption = null;
    let score = 0;
    let isAnswered = false;
    let recognition = null;

    const gameArea = document.getElementById('gameArea');
    const actionBtn = document.getElementById('actionBtn');
    const feedbackSheet = document.getElementById('feedbackSheet');
    const progressBar = document.getElementById('progressBar');
    const xpDisplay = document.getElementById('xpDisplay');

    window.toggleTheme = () => { const html = document.documentElement; html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark'; localStorage.setItem('ep_theme', html.dataset.theme); };
    (function() { const saved = localStorage.getItem('ep_theme') || 'dark'; document.documentElement.dataset.theme = saved; })();
    document.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleAction(); });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            const userDoc = await getDoc(doc(db, "usuarios", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                score = data.xp || 0;
                xpDisplay.textContent = score;
                if (data['progresso.u02_step'] !== undefined) currentStepIndex = data['progresso.u02_step'];
            }
        }
        renderStep();
    });

    async function saveProgressToFirebase() {
        if (!currentUser) return;
        try {
            await updateDoc(doc(db, "usuarios", currentUser.uid), { xp: score, 'progresso.u02_step': currentStepIndex, 'progresso.u02_lastUpdate': new Date().toISOString() });
        } catch (error) { console.error("Erro ao salvar:", error); }
    }

    window.saveAndExit = async () => {
        actionBtn.disabled = true;
        actionBtn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Salvando...';
        await saveProgressToFirebase();
        window.location.href = 'index.html';
    };

    function renderStep() {
        if (currentStepIndex >= lessonSteps.length) { showCompletion(); return; }
        const step = lessonSteps[currentStepIndex];
        isAnswered = false; selectedOption = null;
        feedbackSheet.classList.remove('show');
        progressBar.style.width = `${(currentStepIndex / lessonSteps.length) * 100}%`;
        gameArea.innerHTML = '';

        if (step.type === 'video') renderVideo(step);
        else if (step.type === 'dialogue') renderDialogue(step);
        else if (step.type === 'question') renderQuestion(step);
    }

    function renderVideo(step) {
        gameArea.innerHTML = `<div class="text-center mb-4"><span class="scenario-badge"><i class="fa-solid fa-video"></i> Video Lesson</span></div><div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${step.videoId}" frameborder="0" allowfullscreen></iframe></div><p class="text-center text-muted">${step.title}</p>`;
        actionBtn.textContent = "Começar Exercícios"; actionBtn.disabled = false; actionBtn.onclick = nextStep;
    }

    function renderDialogue(step) {
        const avatarClass = step.speaker === 'maria' ? 'speaker-maria' : step.speaker === 'john' ? 'speaker-john' : 'speaker-narrator';
        const icon = step.speaker === 'maria' ? '👩' : step.speaker === 'john' ? '👨' : '👨';
        gameArea.innerHTML = `<div class="dialogue-box"><div class="flex items-start gap-3"><div class="speaker-avatar ${avatarClass}">${icon}</div><div class="flex-1"><div class="flex items-center gap-2 mb-2"><span class="font-bold">${step.name}</span><i class="fa-solid fa-volume-high text-xs cursor-pointer hover:text-primary" onclick="speakText('${step.text.replace(/<[^>]*>/g, '')}')"></i></div><div class="speech-bubble"><p class="text-lg">${step.text}</p></div></div></div></div>`;
        actionBtn.textContent = "Continuar"; actionBtn.disabled = false; actionBtn.onclick = nextStep;
    }

    function renderQuestion(step) {
        const skillIcons = { reading: '', listening: '🎧', speaking: '🗣️', writing: '✍️', grammar: '📚' };
        let html = `<div class="text-center mb-4"><span class="scenario-badge">${skillIcons[step.skill]} ${step.skill.charAt(0).toUpperCase() + step.skill.slice(1)}</span></div><div class="question-card"><h2 class="text-xl font-bold text-center mb-4">${step.question}</h2>`;
        if (step.textToSpeak) html += `<button class="audio-btn" onclick="speakText('${step.textToSpeak}')"><i class="fa-solid fa-volume-high"></i></button>`;
        if (step.options) {
            html += `<div class="options-grid">`;
            step.options.forEach((opt, i) => html += `<button class="option-btn" onclick="selectOption(this, ${i})">${opt}</button>`);
            html += `</div>`;
        } else if (step.expectedPhrase) {
            html += `<button class="record-btn" id="recordBtn" onclick="toggleRecording('${step.expectedPhrase}')"><i class="fa-solid fa-microphone"></i></button><p class="text-center text-sm text-muted mt-2">Clique no microfone e fale</p><div id="speakingScore" class="text-center font-bold hidden mt-2"></div>`;
        } else if (step.answer && !step.options) {
            html += `<input type="text" id="writingInput" class="writing-input" placeholder="Digite sua resposta..." oninput="enableCheck()">`;
        }
        html += `</div>`;
        gameArea.innerHTML = html;
        actionBtn.textContent = "Verificar"; actionBtn.onclick = checkAnswer; actionBtn.disabled = true;
    }

    window.selectOption = (btn, index) => { if (isAnswered) return; document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected')); btn.classList.add('selected'); selectedOption = index; actionBtn.disabled = false; };
    window.enableCheck = () => { actionBtn.disabled = document.getElementById('writingInput').value.trim().length === 0; };
    window.handleAction = () => { isAnswered ? nextStep() : checkAnswer(); };

    window.checkAnswer = () => {
        if (isAnswered) return; isAnswered = true;
        const step = lessonSteps[currentStepIndex];
        let isCorrect = false;
        if (step.options) {
            const buttons = document.querySelectorAll('.option-btn');
            if (selectedOption === step.answer) { buttons[selectedOption].classList.add('correct'); isCorrect = true; }
            else { buttons[selectedOption].classList.add('wrong'); buttons[step.answer].classList.add('correct'); }
        } else if (step.answer && !step.options) {
            const input = document.getElementById('writingInput');
            if (input.value.trim().toLowerCase() === step.answer.toLowerCase()) { input.style.borderColor = 'var(--primary)'; input.style.background = 'rgba(34,197,94,0.1)'; isCorrect = true; }
            else { input.style.borderColor = 'var(--danger)'; input.style.background = 'rgba(239,68,68,0.1)'; }
        } else if (step.expectedPhrase) { return; }
        showFeedback(isCorrect, step);
    };

    window.toggleRecording = (expectedPhrase) => {
        const btn = document.getElementById('recordBtn');
        const scoreDiv = document.getElementById('speakingScore');
        if (!btn.classList.contains('recording')) {
            if (!('webkitSpeechRecognition' in window)) { alert('Use Chrome ou Edge.'); return; }
            recognition = new webkitSpeechRecognition();
            recognition.lang = 'en-US'; recognition.continuous = false;
            btn.classList.add('recording'); btn.innerHTML = '<i class="fa-solid fa-stop"></i>'; scoreDiv.classList.add('hidden');
            recognition.onresult = (event) => {
                let transcript = event.results[0][0].transcript.trim().toLowerCase();
                const confidence = event.results[0][0].confidence;
                const numMap = { '70':'seventy', '80':'eighty', '90':'ninety', '100':'one hundred', '25':'twenty-five', '42':'forty-two', '99':'ninety-nine', '15':'fifteen', '12':'twelve', '50':'fifty', '33':'thirty-three', '88':'eighty-eight', '77':'seventy-seven', '17':'seventeen', '18':'eighteen', '19':'nineteen', '21':'twenty-one', '22':'twenty-two', '23':'twenty-three', '24':'twenty-four', '26':'twenty-six', '11':'eleven', '13':'thirteen', '14':'fourteen', '16':'sixteen' };
                Object.keys(numMap).forEach(k => { if(transcript.includes(k)) transcript = transcript.replace(k, numMap[k]); });
                const expected = expectedPhrase.toLowerCase();
                const isMatch = transcript.includes(expected) || expected.includes(transcript) || transcript.replace(/[-\s]/g, '') === expected.replace(/[-\s]/g, '');
                const accuracy = Math.round((isMatch ? 1 : 0) * confidence * 100);
                scoreDiv.innerHTML = `<span class="${accuracy >= 70 ? 'text-primary' : 'text-danger'}">${accuracy}% - Você disse: "${transcript}"</span>`;
                scoreDiv.classList.remove('hidden');
                showFeedback(accuracy >= 60, lessonSteps[currentStepIndex]);
                btn.classList.remove('recording'); btn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
            };
            recognition.onerror = () => { btn.classList.remove('recording'); btn.innerHTML = '<i class="fa-solid fa-microphone"></i>'; };
            recognition.start();
        }
    };

    function showFeedback(isCorrect, step) {
        const sheet = document.getElementById('feedbackSheet');
        const title = document.getElementById('feedbackTitle');
        const msg = document.getElementById('feedbackMsg');
        const icon = document.getElementById('feedbackIcon');
        sheet.classList.remove('correct', 'wrong');
        if (isCorrect) {
            sheet.classList.add('correct'); title.textContent = "Correto! 🎉"; msg.textContent = "+10 XP";
            icon.innerHTML = '<i class="fa-solid fa-check"></i>'; icon.className = 'w-12 h-12 rounded-full flex items-center justify-center text-2xl text-green-600 bg-white';
            score += 10; xpDisplay.textContent = score; saveProgressToFirebase();
        } else {
            sheet.classList.add('wrong');
            let correctAnswer = step.options ? step.options[step.answer] : (step.answer || step.expectedPhrase);
            title.textContent = "Incorreto"; msg.textContent = `Resposta correta: ${correctAnswer}`;
            icon.innerHTML = '<i class="fa-solid fa-xmark"></i>'; icon.className = 'w-12 h-12 rounded-full flex items-center justify-center text-2xl text-red-600 bg-white';
        }
        sheet.classList.add('show'); actionBtn.style.display = 'none';
    }

    window.nextStep = () => { currentStepIndex++; saveProgressToFirebase(); renderStep(); };
    window.speakText = (text) => { const utterance = new SpeechSynthesisUtterance(text); utterance.lang = 'en-US'; utterance.rate = 0.9; speechSynthesis.speak(utterance); };

    function showCompletion() {
        gameArea.innerHTML = `<div class="text-center"><i class="fa-solid fa-trophy text-6xl text-yellow-400 mb-4 animate-bounce"></i><h2 class="text-3xl font-bold mb-2">Lição Completa! 🎉</h2><p class="text-xl mb-2">Você ganhou ${score} XP</p><a href="index.html" class="action-btn btn-check block mt-4">Voltar para Home</a></div>`;
        document.getElementById('footerBar').style.display = 'none'; progressBar.style.width = '100%'; saveProgressToFirebase();
    }
</script>
</body>
</html>
