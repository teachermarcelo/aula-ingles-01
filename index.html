<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English with Marcelo</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .header { text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 40px 20px; border-radius: 20px; margin-bottom: 30px; }
        .header h1 { margin: 0; font-size: 2.5em; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 15px; text-align: center; text-decoration: none; color: #333; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .icon { font-size: 4em; margin-bottom: 10px; display: block; }
        h2 { color: #667eea; margin: 10px 0; }
        .level { display: inline-block; background: #e0e7ff; color: #4338ca; padding: 5px 10px; border-radius: 20px; font-size: 0.8em; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>📚 English Lessons</h1>
        <p>Escolha uma aula para começar!</p>
    </div>

    <div class="grid">
        <!-- Link para aula de cores -->
        <a href="colors.html" class="card">
            <span class="icon">🎨</span>
            <h2>Colors</h2>
            <p>Aprenda as cores</p>
            <span class="level">Nível A1</span>
        </a>

        <!-- Link para aula de números -->
        <a href="numbers.html" class="card">
            <span class="icon">🔢</span>
            <h2>Numbers</h2>
            <p>Conte de 1 a 10</p>
            <span class="level">Nível A1</span>
        </a>

        <!-- Link para aula de animais (você criará depois) -->
        <a href="animals.html" class="card">
            <span class="icon">🦁</span>
            <h2>Animals</h2>
            <p>Em breve!</p>
            <span class="level">Nível A1</span>
        </a>
    </div>

</body>
</html>
