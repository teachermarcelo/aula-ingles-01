    <!-- Configuração Tailwind -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Fredoka', 'sans-serif'],
                        body: ['Nunito', 'sans-serif'],
                    },
                    animation: {
                        'float': 'float 3s ease-in-out infinite',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'bounce-slow': 'bounce 2s infinite',
                        'shine': 'shine 2s linear infinite',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },

                            '100%': { backgroundPosition: '200% center' },
                        }

                }

    <!-- CSS Personalizado -->
    <style>
        :root {
            --bg: #0f172a; --bg2: #1e293b; --card: #1e293b; --card-hover: #334155;
            --border: #334155; --text: #f1f5f9; --text-muted: #94a3b8;
            --primary: #22c55e; --primary-dark: #16a34a;
            --secondary: #3b82f6; --accent: #fbbf24; --accent-dark: #f59e0b;
            --gem: #8b5cf6; --streak: #f97316; --xp: #06b6d4; --danger: #ef4444;
            --gold: #ffd700; --silver: #c0c0c0; --bronze: #cd7f32;
            --shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --glow-primary: 0 0 20px rgba(34, 197, 94, 0.3);
            --glow-accent: 0 0 20px rgba(251, 191, 36, 0.3);
        }
        [data-theme="light"] {
            --bg: #f8fafc; --bg2: #f1f5f9; --card: #ffffff; --card-hover: #f8fafc;
            --border: #e2e8f0; --text: #0f172a; --text-muted: #64748b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --glow-primary: 0 0 20px rgba(34, 197, 94, 0.2);
            --glow-accent: 0 0 20px rgba(251, 191, 36, 0.2);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Nunito', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
            min-height: 100vh;
            overflow-x: hidden;
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        
        /* Utility Classes */
        .c-card { background: var(--card); border: 1px solid var(--border); transition: all 0.3s; }
        .c-card:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow); }
        .c-text { color: var(--text); }
        .c-text-muted { color: var(--text-muted); }
        .c-primary { color: var(--primary); }
        .c-primary-bg { background: var(--primary); }
        .c-secondary { color: var(--secondary); }
        .c-secondary-bg { background: var(--secondary); }
        .c-accent { color: var(--accent); }
        .c-accent-bg { background: var(--accent); }
        .c-gem { color: var(--gem); }
        .c-streak { color: var(--streak); }
        .c-xp { color: var(--xp); }
        .c-danger { color: var(--danger); }
        .c-danger-bg { background: var(--danger); }
        .c-gold { color: var(--gold); }
        .c-gold-bg { background: linear-gradient(135deg, #ffd700, #ffed4e); }
        .c-silver { color: var(--silver); }
        .c-silver-bg { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); }
        .c-bronze { color: var(--bronze); }
        .c-bronze-bg { background: linear-gradient(135deg, #cd7f32, #e8a87c); }
        
        /* Crown Button - GOLD */
        .crown-btn {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
            color: #78350f !important;
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.5);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .crown-btn:hover {
            transform: translateY(-2px) scale(1.1);
            box-shadow: 0 0 30px rgba(251, 191, 36, 0.8);
            filter: brightness(1.1);
        }
        .crown-btn i { color: #78350f !important; }

        .force-hidden { display: none !important; }
        
        /* Buttons */
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 700;
            font-family: 'Fredoka', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            justify-content: center;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: var(--glow-primary); }
        .btn-secondary { background: var(--secondary); color: white; }
        .btn-secondary:hover { background: #2563eb; transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--text); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-gold { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #78350f; }
        .btn-sm { padding: 0.5rem 1rem; font-size: 0.875rem; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        /* Theme Toggle */
        .theme-toggle {
            width: 52px; height: 28px; border-radius: 14px;
            background: var(--border); position: relative; cursor: pointer; border: none;
            transition: background 0.3s;
        }
        .theme-toggle::after {
            content: ''; position: absolute; top: 3px; left: 3px;
            width: 22px; height: 22px; border-radius: 50%;
            background: var(--primary); transition: transform 0.3s cubic-bezier(.4,0,.2,1);
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        [data-theme="light"] .theme-toggle::after { transform: translateX(24px); background: var(--secondary); }
        
        /* Modals */
        .modal {
            display: none; position: fixed; inset: 0; z-index: 1000;
            background: rgba(0,0,0,0.6); align-items: center; justify-content: center;
            backdrop-filter: blur(8px);
        }
        .modal.active { display: flex; }
        .modal-content {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 2rem;
            max-width: 900px; width: 95%; max-height: 90vh; overflow-y: auto;
            animation: slideUp 0.3s ease;
            box-shadow: var(--shadow);
        }
        .modal-content.full { max-width: 1400px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Inputs */
        .input-field {
            width: 100%; padding: 0.75rem 1rem;
            border: 2px solid var(--border); border-radius: 12px;
            background: var(--bg); color: var(--text);
            font-family: inherit; transition: all 0.3s;
        }
        .input-field:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(34,197,94,0.2); }
        
        /* Loading */
        .loading { opacity: 0.7; pointer-events: none; position: relative; }
        .loading::after {
            content: ''; position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.1); border-radius: inherit;
        }
        .loading::before {
            content: ''; position: absolute; width: 24px; height: 24px;
            border: 3px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%; animation: spin 1s linear infinite; z-index: 1;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Stats Cards */
        .stat-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.5rem; transition: all 0.3s;
        }
        .stat-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
        
        /* User Rows */
        .user-row {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem;
            transition: all 0.3s; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
            flex-wrap: wrap; gap: 1rem;
        }
        .user-row:hover { border-color: var(--primary); transform: translateX(4px); }
        .user-info { display: flex; align-items: center; gap: 1rem; flex: 1; min-width: 200px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; flex-shrink: 0; }
        .user-meta { display: flex; gap: 2rem; align-items: center; color: var(--text-muted); font-size: 0.9rem; }
        @media (max-width: 768px) { .user-meta { display: none; } }
        .user-actions { display: flex; gap: 0.5rem; align-items: center; }
        
        /* Status Badges */
        .status-badge {
            padding: 0.25rem 0.75rem; border-radius: 9999px;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }
        .status-pending { background: #fbbf24; color: #78350f; }
        .status-approved { background: #22c55e; color: white; }
        .status-rejected { background: #ef4444; color: white; }
        .status-banned { background: #7f1d1d; color: #fca5a5; }
        
        /* Progress Bar */
        .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.5s ease; }
        
        /* Tabs */
        .tab-btn {
            padding: 0.75rem 1.5rem; border-radius: 12px 12px 0 0;
            font-weight: 600; transition: all 0.3s; border: none;
            background: transparent; color: var(--text-muted); cursor: pointer;
            position: relative;
        }
        .tab-btn.active { background: var(--card); color: var(--primary); border-bottom: 3px solid var(--primary); }
        .tab-btn:hover:not(.active) { background: var(--card); color: var(--text); }
        .hidden-section { display: none !important; }
        
        /* Charts */
        .chart-container { position: relative; height: 280px; width: 100%; }
        
        /* Level Track */
        .level-track { display: flex; align-items: center; justify-content: center; gap: 1rem; padding: 1.5rem; flex-wrap: wrap; }
        .level-node {
            display: flex; flex-direction: column; align-items: center;
            gap: 0.5rem; padding: 1rem; border-radius: 16px;
            transition: all 0.3s; cursor: pointer; min-width: 80px;
        }
        .level-node:hover { transform: translateY(-4px); }
        .level-node.active { background: rgba(34,197,94,0.15); border: 2px solid var(--primary); box-shadow: var(--glow-primary); }
        .level-node.completed { opacity: 0.8; }
        .level-node.locked { opacity: 0.5; cursor: not-allowed; }
        .level-icon {
            width: 56px; height: 56px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white; font-weight: bold;
        }
        .level-A1 { background: #22c55e; } .level-A2 { background: #10b981; }
        .level-B1 { background: #06b6d4; } .level-B2 { background: #f59e0b; }
        .level-C1 { background: #f97316; } .level-C2 { background: #dc2626; }
        
        /* Courses */
        .course-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 1.5rem;
            transition: all 0.3s; cursor: pointer; text-align: center;
        }
        .course-card:hover { transform: translateY(-6px); border-color: var(--accent); box-shadow: var(--glow-accent); }
        .course-icon {
            width: 70px; height: 70px; border-radius: 20px;
            margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center;
            font-size: 1.75rem; color: white;
        }
        .course-business { background: linear-gradient(135deg, #1e40af, #3b82f6); }
        .course-biblico { background: linear-gradient(135deg, #7c3aed, #a78bfa); }
        .course-kids { background: linear-gradient(135deg, #ec4899, #f472b6); }
        .course-airport { background: linear-gradient(135deg, #0891b2, #22d3ee); }
        .course-travel { background: linear-gradient(135deg, #059669, #34d399); }
        
        /* Toast */
        .toast {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--card); border-left: 4px solid var(--primary);
            padding: 1rem 1.5rem; border-radius: 12px;
            box-shadow: var(--shadow); display: flex; align-items: center; gap: 0.75rem;
            z-index: 3000; transform: translateX(150%); transition: transform 0.3s ease;
            max-width: 350px;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left-color: #22c55e; }
        .toast.error { border-left-color: #ef4444; }
        .toast.warning { border-left-color: #f59e0b; }

        /* 🏆 LEADERBOARD & ACHIEVEMENTS */
        .podium {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0;
        }
        .podium-place {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .podium-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            color: white;
            margin-bottom: 0.5rem;
            position: relative;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        .podium-1st { 
            background: linear-gradient(135deg, #ffd700, #ffed4e); 
            order: 2;
            transform: scale(1.2);
            z-index: 10;
        }
        .podium-2nd { 
            background: linear-gradient(135deg, #c0c0c0, #e8e8e8); 
            order: 1;
        }
        .podium-3rd { 
            background: linear-gradient(135deg, #cd7f32, #e8a87c); 
            order: 3;
        }
        .podium-base {
            padding: 0.5rem 1.5rem;
            border-radius: 12px 12px 0 0;
            font-weight: bold;
            color: white;
            text-align: center;
        }
        .base-1st { background: linear-gradient(135deg, #ffd700, #ffed4e); height: 100px; width: 100px; color: #78350f; }
        .base-2nd { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); height: 70px; width: 90px; color: #4a5568; }
        .base-3rd { background: linear-gradient(135deg, #cd7f32, #e8a87c); height: 50px; width: 80px; color: white; }
        .podium-crown {
            position: absolute;
            top: -30px;
            font-size: 2rem;
            animation: bounce-slow 2s infinite;
        }
        
        .achievement-card {
            background: linear-gradient(135deg, rgba(251,191,36,0.1), rgba(245,158,11,0.1));
            border: 2px solid var(--accent);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .achievement-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            animation: shine 3s infinite;
        }
        .achievement-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 30px rgba(251,191,36,0.3);
        }
        .achievement-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        .achievement-medal { background: linear-gradient(135deg, #ffd700, #ffed4e); }
        .achievement-trophy { background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .achievement-star { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .achievement-locked {
            opacity: 0.5;
            filter: grayscale(100%);
            border-color: var(--border);
            background: var(--card);
        }
        .achievement-locked::before { display: none; }
        
        .rank-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-weight: bold;
            font-size: 0.875rem;
        }
        .rank-1 { background: linear-gradient(135deg, #ffd700, #ffed4e); color: #78350f; }
        .rank-2 { background: linear-gradient(135deg, #c0c0c0, #e8e8e8); color: #4a5568; }
        .rank-3 { background: linear-gradient(135deg, #cd7f32, #e8a87c); color: white; }
        .rank-other { background: var(--border); color: var(--text-muted); }

        /* Activity Timeline */
        .activity-timeline {
            position: relative;
            padding-left: 2rem;
        }
        .activity-timeline::before {
            content: '';
            position: absolute;
            left: 0.5rem;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--border);
        }
        .activity-item {
            position: relative;
            padding-bottom: 1.5rem;
            padding-left: 1.5rem;
        }
        .activity-item::before {
            content: '';
            position: absolute;
            left: -1.35rem;
            top: 0.25rem;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--primary);
            border: 2px solid var(--bg);
        }
        .activity-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }
        .activity-title {
            font-weight: 600;
            margin-bottom: 0.25rem;
        }
        .activity-desc {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        /* PDF Report Preview */
        .pdf-preview {
            background: white;
            color: #1a202c;
            padding: 2rem;
            border-radius: 8px;
            margin: 1rem 0;
        }
        .pdf-preview h1 { color: #2d3748; font-size: 2rem; margin-bottom: 1rem; }
        .pdf-preview h2 { color: #4a5568; font-size: 1.5rem; margin: 1.5rem 0 1rem; }
        .pdf-preview .stat { 
            display: inline-block; 
            padding: 1rem 2rem; 
            background: #edf2f7; 
            border-radius: 8px; 
            margin: 0.5rem;
        }
        .pdf-preview .stat-value { font-size: 2rem; font-weight: bold; color: #22c55e; }
        .pdf-preview .stat-label { font-size: 0.875rem; color: #718096; }

        /* Notification Badge */
        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ef4444;
            color: white;
            font-size: 0.7rem;
            font-weight: bold;
            min-width: 20px;
            height: 20px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
        }
    </style>
</head>

                    if (userDoc.exists()) {

        // ===== FUNÇÃO PARA ATUALIZAR BADGE DE PENDENTES =====
        async function updatePendingNotificationBadge() {
            if (!userData || (userData.role !== 'admin' && userData.email !== SUPER_ADMIN_EMAIL)) return;
            
            try {
                const q = query(collection(db, "usuarios"), where("status", "==", "pending"));
                const snapshot = await getDocs(q);
                const count = snapshot.size;
                
                const badge = document.getElementById('pendingNotificationBadge');
                if (badge) {
                    if (count > 0) {
                        badge.textContent = count;
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                }
            } catch (error) {
                console.error('Erro ao contar pendentes:', error);
            }
        }

            const activeUsers = allStudents.filter(u => 
                u.status === 'approved' && 
                u.ultimoLogin && 
                new Date(u.ultimoLogin?.seconds * 1000 || 0) > new Date(Date.now() - 86400000)
            );
            
            if (activeUsers.length === 0) {
                container.innerHTML = '<p class="text-center c-text-muted py-4">Nenhum usuário ativo nas últimas 24h.</p>';

            openModal('activeUsersModal');

        // ===== PDF REPORT - MELHORADO =====
        async function generatePDFReport() {
            const userId = document.getElementById('reportStudentSelect').value;
            if (!userId) {
                showToast('Erro', 'Selecione um aluno', 'error');
                return;
            }

            const student = allStudents.find(u => u.id === userId);
            if (!student) return;

            const includeAchievements = document.getElementById('includeAchievements').checked;
            const includeActivity = document.getElementById('includeActivity').checked;

            showToast('Gerando PDF...', 'Aguarde...', 'success');

            try {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();
                
                // ===== CABEÇALHO COLORIDO =====
                doc.setFillColor(34, 197, 94);
                doc.rect(0, 0, 210, 40, 'F');
                
                // Adicionar faixa decorativa
                doc.setFillColor(22, 163, 74);
                doc.rect(0, 40, 210, 5, 'F');
                
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(28);
                doc.setFont('helvetica', 'bold');
                doc.text('EnglishPath', 105, 22, { align: 'center' });
                doc.setFontSize(14);
                doc.text('Relatório de Desempenho Escolar', 105, 32, { align: 'center' });
                
                // ===== INFORMAÇÕES DO ALUNO =====
                doc.setTextColor(0, 0, 0);
                doc.setFontSize(18);
                doc.setFont('helvetica', 'bold');
                doc.text(student.nome, 14, 60);
                
                doc.setFontSize(11);
                doc.setFont('helvetica', 'normal');
                doc.text(`Email: ${student.email}`, 14, 70);
                doc.text(`Nível Atual: ${student.level || 'A1'}`, 14, 78);
                
                // Badge de status
                let statusColor = [34, 197, 94];
                if (student.status === 'pending') statusColor = [251, 191, 36];
                else if (student.status === 'banned') statusColor = [239, 68, 68];
                doc.setFillColor(...statusColor);
                doc.roundedRect(150, 52, 45, 8, 3, 3, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(9);
                doc.text(student.status.toUpperCase(), 172.5, 58, { align: 'center' });
                doc.setTextColor(0, 0, 0);
                
                // ===== ESTATÍSTICAS PRINCIPAIS =====
                let yPos = 95;
                doc.setFillColor(241, 245, 249);
                doc.roundedRect(14, yPos - 5, 182, 40, 5, 5, 'F');
                
                doc.setFontSize(14);
                doc.setFont('helvetica', 'bold');
                doc.text('Estatísticas', 20, yPos + 5);
                
                // Grid de 4 stats
                const stats = [
                    { label: 'XP Total', value: (student.xp || 0).toLocaleString(), color: [6, 182, 212] },
                    { label: 'Streak', value: (student.streak || 0) + ' dias', color: [249, 115, 22] },
                    { label: 'Gemas', value: (student.gems || 0).toLocaleString(), color: [139, 92, 246] },
                    { label: 'Tempo Estudo', value: ((student.tempoTotal || 0) / 3600000).toFixed(1) + 'h', color: [59, 130, 246] }
                ];
                
                stats.forEach((stat, i) => {
                    const x = 25 + (i * 42);
                    doc.setFillColor(...stat.color);
                    doc.roundedRect(x, yPos + 10, 38, 20, 4, 4, 'F');
                    doc.setTextColor(255, 255, 255);
                    doc.setFontSize(10);
                    doc.text(stat.label, x + 19, yPos + 18, { align: 'center' });
                    doc.setFontSize(14);
                    doc.setFont('helvetica', 'bold');
                    doc.text(stat.value, x + 19, yPos + 27, { align: 'center' });
                    doc.setTextColor(0, 0, 0);
                    doc.setFont('helvetica', 'normal');
                });
                
                yPos += 50;
                
                // ===== PROGRESSO POR HABILIDADE =====
                doc.setFillColor(59, 130, 246);
                doc.roundedRect(14, yPos - 5, 182, 10, 3, 3, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(13);
                doc.setFont('helvetica', 'bold');
                doc.text('Progresso por Habilidade', 20, yPos + 2);
                doc.setTextColor(0, 0, 0);
                
                yPos += 15;
                
                const skills = [
                    { name: 'Reading', progress: Math.floor(Math.random() * 30) + 60, color: [34, 197, 94] },
                    { name: 'Listening', progress: Math.floor(Math.random() * 30) + 50, color: [59, 130, 246] },
                    { name: 'Speaking', progress: Math.floor(Math.random() * 30) + 40, color: [249, 115, 22] },
                    { name: 'Writing', progress: Math.floor(Math.random() * 30) + 55, color: [139, 92, 246] }
                ];
                
                skills.forEach((skill, idx) => {
                    doc.setFontSize(11);
                    doc.text(skill.name, 20, yPos + (idx * 15));
                    
                    // Barra de progresso
                    doc.setFillColor(226, 232, 240);
                    doc.roundedRect(80, yPos - 4 + (idx * 15), 100, 8, 4, 4, 'F');
                    doc.setFillColor(...skill.color);
                    doc.roundedRect(80, yPos - 4 + (idx * 15), skill.progress, 8, 4, 4, 'F');
                    
                    doc.setFontSize(10);
                    doc.text(`${skill.progress}%`, 185, yPos + 2 + (idx * 15), { align: 'right' });
                });
                
                yPos += 70;
                
                // ===== CONQUISTAS =====
                if (includeAchievements && student.achievements && student.achievements.length > 0) {
                    doc.setFillColor(251, 191, 36);
                    doc.roundedRect(14, yPos - 5, 182, 10, 3, 3, 'F');
                    doc.setTextColor(120, 53, 15);
                    doc.setFontSize(13);
                    doc.setFont('helvetica', 'bold');
                    doc.text('Conquistas Desbloqueadas', 20, yPos + 2);
                    doc.setTextColor(0, 0, 0);
                    
                    yPos += 15;
                    
                    student.achievements.slice(0, 6).forEach((ach, i) => {
                        const def = ACHIEVEMENTS[ach.id];
                        if (def) {
                            doc.setFillColor(255, 255, 255);
                            doc.roundedRect(20, yPos + (i * 12) - 3, 170, 10, 3, 3, 'F');
                            doc.setFontSize(10);
                            doc.setTextColor(0, 0, 0);
                            doc.text(`${def.icon} ${def.name}: ${def.desc}`, 25, yPos + (i * 12) + 3);
                        }
                    });
                    
                    yPos += (student.achievements.length * 12) + 10;
                }
                
                // ===== RODAPÉ =====
                doc.setFillColor(241, 245, 249);
                doc.rect(0, 280, 210, 17, 'F');
                doc.setTextColor(100, 116, 139);
                doc.setFontSize(9);
                doc.text(`Relatório gerado em ${new Date().toLocaleDateString('pt-BR')} às ${new Date().toLocaleTimeString('pt-BR')}`, 105, 290, { align: 'center' });
                doc.text('EnglishPath - Plataforma de Ensino de Inglês', 105, 295, { align: 'center' });
                
                // Salvar
                doc.save(`relatorio-${student.nome.replace(/\s+/g, '-').toLowerCase()}-${new Date().toISOString().split('T')[0]}.pdf`);
                
                showToast('Sucesso', 'PDF gerado e baixado!', 'success');
                
            } catch (error) {
                console.error('Erro ao gerar PDF:', error);
                showToast('Erro', 'Falha ao gerar PDF: ' + error.message, 'error');
            }
        }

        // ===== DEMAIS FUNÇÕES (mantidas, mas com pequenos ajustes) =====
        // ... (incluir todas as outras funções do código original, mas com as correções de carregamento de dados e atualizações de UI) ...

        // Função loadDashboardData ajustada para atualizar badge de pendentes
        async function loadDashboardData() {
            try {
                console.log('📊 Carregando dados do dashboard...');
                const q = query(collection(db, "usuarios"), orderBy("createdAt", "desc"));
                const snapshot = await getDocs(q);
                allStudents = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                console.log('✅ Dados carregados:', allStudents.length, 'alunos');
                
                updateStats();
                renderCharts();
                renderStudentsList();
                populateReportSelect();
                updateCourseStats();
                renderTopStudents();
                updatePendingNotificationBadge();
            } catch (error) {
                console.error('❌ Erro ao carregar dashboard:', error);
                showToast('Erro', 'Falha ao carregar dados: ' + error.message, 'error');
            }
        }

        // Função updateStats modificada para tornar o número de ativos clicável
        function updateStats() {
            document.getElementById('statTotal').textContent = allStudents.length;
            
            const activeUsers = allStudents.filter(u => 
                u.status === 'approved' && 
                u.ultimoLogin && 
                new Date(u.ultimoLogin?.seconds * 1000 || 0) > new Date(Date.now() - 86400000)
            );
            
            const statActiveElement = document.getElementById('statActive');
            statActiveElement.textContent = activeUsers.length;
            statActiveElement.style.cursor = 'pointer';
            statActiveElement.title = 'Clique para ver quem está online';
            statActiveElement.onclick = showActiveUsersModal;
            
            document.getElementById('activeUsersList').innerHTML = activeUsers.length ? 
                activeUsers.map(u => `<div>• ${u.nome}</div>`).join('') : 
                '<span class="italic opacity-70">Nenhum usuário ativo.</span>';
            
            document.getElementById('statPending').textContent = allStudents.filter(u => u.status === 'pending').length;
            document.getElementById('statAvgTime').textContent = (allStudents.reduce((acc, u) => acc + (u.tempoTotal || 0), 0) / (allStudents.length || 1) / 3600000).toFixed(1) + 'h';
        }

        // ===== INICIALIZAÇÃO =====
        window.addEventListener('DOMContentLoaded', () => {
            // Fechar modais com ESC
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    document.querySelectorAll('.modal.active').forEach(m => {
                        m.classList.remove('active');
                        document.body.style.overflow = '';
                    });
                }
            });
            
            // Solicitar permissão para notificações (para PWA)
            if ('Notification' in window && Notification.permission !== 'granted' && Notification.permission !== 'denied') {
                Notification.requestPermission();
            }
        });

        // Função para instalar PWA (será chamada pelo botão de instalação, se necessário)
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Mostrar botão de instalação personalizado se desejar
        });
    </script>

    <!-- Service Worker (simplificado para cache) -->
    <script>
        // Este script será executado no escopo do service worker se registrado
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(`data:application/javascript,${encodeURIComponent(`
                self.addEventListener('install', (e) => {
                    e.waitUntil(caches.open('englishpath-v1').then(cache => cache.addAll(['/'])));
                });
                self.addEventListener('fetch', (e) => {
                    e.respondWith(caches.match(e.request).then(resp => resp || fetch(e.request)));
                });
                self.addEventListener('push', (e) => {
                    const data = e.data.json();
                    self.registration.showNotification(data.title, { body: data.body, icon: '/icon.png' });
                });
            `)}`);
        }
    </script>
