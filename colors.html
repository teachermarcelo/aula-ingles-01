<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colors - English Lesson</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .back-btn { display: inline-block; padding: 10px 20px; background: #333; color: white; text-decoration: none; border-radius: 10px; margin-bottom: 20px; }
        h1 { text-align: center; color: #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { padding: 20px; border-radius: 15px; color: white; text-align: center; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.95); }
        .red { background: #e74c3c; }
        .blue { background: #3498db; }
        .green { background: #2ecc71; }
        .yellow { background: #f1c40f; color: #333; }
        .word { font-size: 2em; font-weight: bold; display: block; }
        .trans { font-size: 1em; opacity: 0.9; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">⬅️ Voltar ao Menu</a>
        <h1>🎨 Colors</h1>
        <p style="text-align:center">Clique no botão de áudio para ouvir!</p>

        <div class="grid">
            <div class="card red" onclick="speak('Red')">
                <span class="word">RED</span>
                <span class="trans">Vermelho</span>
                <br>🔊 Play
            </div>
            
            <div class="card blue" onclick="speak('Blue')">
                <span class="word">BLUE</span>
                <span class="trans">Azul</span>
                <br>🔊 Play
            </div>

            <div class="card green" onclick="speak('Green')">
                <span class="word">GREEN</span>
                <span class="trans">Verde</span>
                <br>🔊 Play
            </div>

            <div class="card yellow" onclick="speak('Yellow')">
                <span class="word">YELLOW</span>
                <span class="trans">Amarelo</span>
                <br>🔊 Play
            </div>
        </div>
    </div>

    <script>
        function speak(text) {
            let msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            window.speechSynthesis.speak(msg);
        }
    </script>

</body>
</html>
